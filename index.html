function ggArmsActive(d){
  const day=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);
  return day>=GG_ARMS_START;
}

function getBridalArmsDay(){
  const today=new Date(currentDate.getFullYear(),currentDate.getMonth(),currentDate.getDate(),12,0,0);
  if(!ggArmsActive(today))return null;
  const diff=Math.floor((today-GG_ARMS_START)/864e5);
  return(diff%14)+1;
}

function renderBridalArms(){
  if(!ggArmsActive(currentDate))return"";
  var d=getBridalArmsDay();
  return'<div class="bridal-arms-card">'
    +'<div class="bridal-arms-header" style="margin-bottom:10px">'
    +'<div class="bridal-arms-title">\uD83D\uDCAA Gabby George Arms \u2014 Day '+d+' of 14</div>'
    +'<div class="bridal-arms-badge">\uD83C\uDF36 Daily</div>'

function getWeek(d,b){const c=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);return Math.floor((c-parseLocal(b.startDate))/(864e5*7))+1}

const FORM={"Banded glute bridge (warm-up)":{form:"Feet flat hip-width. Drive through heels. Squeeze glutes hard at top \u2014 2-sec hold. Don't let knees cave.",link:"https://www.youtube.com/watch?v=GmRSV_n2E_0"},"Hip thrust (booty builder)":{form:"Shoulder blades on pad edge. Chin tucked, look forward. Drive through heels. At lockout:ribs down, pelvis tucked (posterior pelvic tilt). Pause 2 sec and squeeze.",link:"https://www.youtube.com/watch?v=xDmFkJxPzeM"},"Single-leg glute bridge":{form:"Back flat, one foot planted, other leg extended or knee held to chest. Drive through the planted heel. Hips level \u2014 don't let the free side drop. Squeeze glute at top for 2 sec.",link:"https://www.youtube.com/watch?v=AVAXhy6pl7o"},"DB bench press":{form:"Retract shoulder blades \u2014 squeeze them together and down. Slight arch in upper back. Lower DBs to chest, elbows at 45\u00B0. Press up and slightly inward.",link:"https://www.youtube.com/watch?v=VmB1G1K7v94"},"DB shoulder press":{form:"Start with DBs at ear height, palms forward. Press straight up \u2014 don't let the weights drift forward. Brace core, don't arch back. Lower controlled to ear level.",link:"https://www.youtube.com/watch?v=qEwKCR5JCog"},"Pallof press":{form:"Stand side-on to cable at chest height. Hold handle at chest. Press straight out \u2014 resist the rotation. Arms fully extended, hold 1 sec, return. Your core is fighting the cable's pull.",link:"https://www.youtube.com/watch?v=AH_QZLm_0-s"},"Dead bug":{form:"Back flat, arms straight up, knees at 90\u00B0. Press lower back into the floor \u2014 it must NOT leave the ground. Extend opposite arm and leg simultaneously. Breathe out as you extend.",link:"https://www.youtube.com/watch?v=I5xbsA71v1A"},"Banded clamshells (warm-up)":{form:"Side-lying, band above knees, heels together. Open top knee like a clamshell \u2014 rotate from the hip, not lower back. Keep hips stacked vertically. Slow and controlled.",link:"https://www.youtube.com/watch?v=cEaCnbGKmMQ"},"Romanian deadlift":{form:"Feet hip-width, soft knees locked in position. Push hips BACK \u2014 bar slides down your thighs. Feel the hamstring stretch. Back stays flat \u2014 the moment it rounds, that's your range. Drive hips forward to return.",link:"https://www.youtube.com/watch?v=JCXUYuzwNrM"},"Cable kickback":{form:"Face the cable, ankle strap on. Slight forward lean, brace core. Extend leg straight back \u2014 squeeze glute at top. Don't arch lower back to get more range. Controlled, no swinging.",link:"https://www.youtube.com/watch?v=dXMvr3uMmDc"},"Nordic curl eccentric":{form:"Kneel on a pad, anchor ankles. Hands ready to catch yourself. Slowly lower body forward \u2014 fight gravity with hamstrings for 5-sec count. Push back up with hands. Training the lowering phase only.",link:"https://www.youtube.com/watch?v=BpKadYwbGPo"},"Lat pulldown":{form:"Grip just wider than shoulders. Lean back ~15\u00B0. Pull bar to upper chest \u2014 lead with elbows, drive them down and back. Squeeze shoulder blades at the bottom. Control the return.",link:"https://www.youtube.com/watch?v=CAwf7n6Luuc"},"Seated cable row":{form:"Sit tall, slight knee bend. Pull handle to lower ribcage \u2014 drive elbows straight back. Squeeze shoulder blades 1 sec. Don't lean back to cheat. Torso stays still.",link:"https://www.youtube.com/watch?v=GZbfZ033f74"},"Bird dog":{form:"All fours, wrists under shoulders, knees under hips. Extend opposite arm and leg \u2014 reach long. Keep hips level (don't let them rotate or drop). Pause 2 sec extended, return controlled.",link:"https://www.youtube.com/watch?v=wiFNA3sqjCA"},"Banded lateral walks":{form:"Band just above knees (or ankles for harder). Quarter-squat position \u2014 stay low throughout. Step sideways, leading with the heel. Keep toes forward, don't let knees cave.",link:"https://www.youtube.com/watch?v=zTOPFZrekbE"},"Single-leg hip thrust":{form:"Shoulder blades on bench, one foot planted. Drive through heel. At the top:ribs down, squeeze glute, hold 1\u20132 sec. Keep hips level. If you feel it in your lower back, reset your pelvis.",link:"https://www.youtube.com/watch?v=BXKB1YE5ufY"},"Single-leg hip thrust (weighted)":{form:"Same as bodyweight version but with a plate on your hip. Shoulder blades on bench, one foot planted. Drive through heel, squeeze at top with posterior pelvic tilt. Hold 1\u20132 sec.",link:"https://www.youtube.com/watch?v=BXKB1YE5ufY"},"Step-ups (low box)":{form:"Forward lean of ~20\u00B0 \u2014 this shifts the load onto your glute instead of your quad. Step up driving through the heel of the working leg. Do NOT push off the back foot \u2014 that is cheating. Stand fully, squeeze glute, then lower controlled.",link:"https://www.youtube.com/watch?v=dQqApCGd5Ss"},"Frog pumps":{form:"Lie on back, soles of feet together, knees out wide like a frog. Drive hips up squeezing glutes hard at top. Short range of motion \u2014 this is about the squeeze, not the height. High reps, constant tension.",link:"https://www.youtube.com/watch?v=3idsBMaqsR4"},"Plank variations":{form:"Start with standard forearm plank. Progress to shoulder taps, plank walks, or plank with leg lift. Key cue for all:pelvis tucked, glutes engaged, no hip rocking side to side.",link:"https://www.youtube.com/watch?v=ASdvN_XEl_c"},"Abductor machine":{form:"Sit tall or lean your chest forward ~30\u00B0 (forward lean biases the upper glute/medius). Push the pads out with your glutes, pause and squeeze at the widest point, then return slowly \u2014 don\'t let them slam back.",link:"https://www.youtube.com/watch?v=I1Arg7t9Yd8"},"Donkey kick":{form:"Ankle strap or band. Slight forward lean, brace the core. Drive the heel straight back and up using the glute \u2014 don\'t arch the lower back to get more height. Squeeze hard at the top, slow return.",link:"https://www.youtube.com/watch?v=SJ1Xuz9D-ZQ"},"DB lateral raise":{form:"Slight bend in the elbows, lead with the elbows not the hands. Raise to shoulder height \u2014 no higher, no swinging or momentum. Pinky slightly higher than thumb. Lower under control over 2 sec.",link:"https://www.youtube.com/watch?v=3VcKaXpzqRo"},"Rear delt fly":{form:"Hinge forward or use the cable/pec-deck reversed. Lead with the elbows, squeeze the shoulder blades together at the back. Keep the neck relaxed and don\'t use the traps \u2014 think \u2018pour water from the elbows\u2019.",link:"https://www.youtube.com/watch?v=EA7u4Q_8HQ0"},"Cable crunch":{form:"Kneel facing the cable, rope behind the head. Crunch from the abs \u2014 curl the ribcage toward the pelvis, hips stay still. It\'s a short range: round the spine, don\'t just hinge at the hips. Slow back up.",link:"https://www.youtube.com/watch?v=2fbujd-Ci48"},"Banded lateral walk":{form:"Band just above the knees (or ankles for harder). Quarter-squat position \u2014 stay low throughout. Step sideways leading with the heel, keep toes forward and don\'t let the knees cave in.",link:"https://www.youtube.com/watch?v=zTOPFZrekbE"},};

function getForm(name){if(FORM[name])return FORM[name];for(const k in FORM){if(name.includes(k)||k.includes(name))return FORM[k]}return null}

const isBodyweight=!ex.load||ex.load.toLowerCase().includes("bodyweight")||["plank","bird dog","dead bug","banded","frog","nordic"].some(k=>ex.name.toLowerCase().includes(k));
let trackerHtml="";
if(!isBodyweight){trackerHtml='<div class="ex-tracker" style="grid-column:2/-1;margin-top:4px;display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:#A898B0">Log:</span><input type="number" placeholder="kg" id="exw-'+(i)+'" data-exn="'+encodeURIComponent(ex.name)+'" style="width:50px;padding:3px 6px;border-radius:4px;border:0.5px solid rgba(180,160,190,0.3);font-size:11px;background:rgba(255,255,255,0.5);color:#3D2E4A" onchange="saveExLog('+(i)+')"><span style="font-size:10px;color:#A898B0">\u00D7</span><input type="number" placeholder="reps" id="exr-'+(i)+'" style="width:50px;padding:3px 6px;border-radius:4px;border:0.5px solid rgba(180,160,190,0.3);font-size:11px;background:rgba(255,255,255,0.5);color:#3D2E4A" onchange="saveExLog('+(i)+')"></div>'}
return'<div class="exercise" id="ex-'+i+'"><div class="ex-check" onclick="toggleEx('+i+')"></div><div class="ex-name">'+ex.name+'</div><div class="ex-sets">'+ex.sets+' \u00D7 '+ex.reps+'</div>'+(tags?'<div class="ex-tags">'+tags+'</div>':'')+trackerHtml+formHtml+'</div>';
}

function getFuel(r){
if(!r||r.type.includes("RACE"))return null;
const km=parseFloat(r.km)||0;
const isTempo=r.type.toLowerCase().includes("tempo")||r.type.toLowerCase().includes("interval")||r.type.toLowerCase().includes("hill")||r.type.toLowerCase().includes("speed");
const isLong=r.type.toLowerCase().includes("long");
let pre="",during="",after="";
if(km<=5&&!isTempo){pre="\u2615 Optional: coffee + small banana. Stay hydrated.";during="\uD83D\uDCA7 No fuel needed.";after="\uD83E\uDD5B Small snack if hungry."}
else if(km<=7&&!isTempo){pre="\uD83C\uDF4C Small banana or toast with honey 30\u201360 min before.";during="\uD83D\uDCA7 No fuel needed. Carry water if hot.";after="\uD83E\uDD5B 20\u201330g protein within 45 min."}
else if(isTempo){pre="\uD83C\uDF5E Carb-rich snack 60\u201390 min before: toast + banana, oats, or rice cakes with honey.";during=km>8?"\uD83D\uDCA7 Carry water. Consider a gel if session is 60+ min.":"\uD83D\uDCA7 Carry water. No gel needed under 60 min.";after="\uD83E\uDD5B Recovery meal within 30 min: 20\u201330g protein + carbs."}
else if(isLong&&km>=14){pre="\uD83C\uDF5A Proper meal 2\u20133 hrs before: oats + banana + honey, toast with PB, or rice + eggs.";during=km>=16?"\u26A1 Gel at km 7 and km 14. Water every 3\u20134 km.":"\uD83D\uDCA7 Water every 3\u20134 km. Optional: 1 gel at km 8\u201310.";after="\uD83E\uDD5B Recovery meal within 30 min: protein + carbs + electrolytes."}
else{pre="\uD83C\uDF4C Toast + banana 60\u201390 min before if needed.";during="\uD83D\uDCA7 Carry water.";after="\uD83E\uDD5B 20\u201330g protein + carbs within 45 min."}
return{pre,during,after};
}

function renderRun(r){
if(!r)return"";

if(fuel){fuelHtml='<div class="fuel-card"><div class="fuel-title">\uD83C\uDF7D\uFE0F Fuelling</div><div class="fuel-row"><span class="fuel-label">Before:</span> '+fuel.pre+'</div><div class="fuel-row"><span class="fuel-label">During:</span> '+fuel.during+'</div><div class="fuel-row"><span class="fuel-label">After:</span> '+fuel.after+'</div></div>';}

let stravaData=null,stravaLoaded=false,stravaError=null;
async function loadStrava(){
  if(stravaLoaded)return renderStravaWidgets();
  stravaError=null;
  try{
    const res=await fetch("https://vermillion-donut-bd1fcf.netlify.app/.netlify/functions/strava?t="+Date.now(),{cache:"no-store"});
    const text=await res.text();
    let data;
    try{data=JSON.parse(text);}catch(e){
      console.error("Strava parse error:",text.slice(0,200));
      showStravaError("Strava returned an unreadable response (HTTP "+res.status+"). The backend may be down.");return;
    }
    if(data.error){
      console.error("Strava error:",data.error,data.detail);
      showStravaError("Strava connection error: "+data.error+(data.detail?" \u00B7 "+data.detail:"")+". This usually means the access token expired \u2014 re-authorise Strava in your Netlify function.");return;
    }
    if(data.activities){
      stravaData=data.activities;
      stravaLoaded=true;
      console.log("Strava loaded:",stravaData.length,"activities");
      renderStravaWidgets();
      if(viewMode==="coach")renderCoachTab();
    }else{
      showStravaError("Strava replied but with no activities. Connection may be live but unauthorised.");
    }
  }catch(e){console.error("Strava fetch error:",e.message);showStravaError("Couldn't reach Strava: "+e.message+". Check your connection, then tap refresh.");}
}

function renderStravaWidgets(){

const dayActivities=stravaData.filter(a=>a.date.startsWith(dateStr));
// Strava labels vary a lot (VirtualRide, Workout, StairStepper, studio-app names).

const sType=a=>String(a.sport_type||a.type||"").toLowerCase();

// Single source of truth for what a day requires + whether it's done.
// Honours sessions moved OUT (no longer required) and moved IN (now required).
function getNeededForDay(d,st){
  st=st||{};
  const plan=getPlan(d);
  const mOut=getMovedOut(d);
  const mIn=getMovedIn(d);
  const needRun=(!!plan.run&&!mOut.includes('run'))||mIn.some(x=>x.type==='run');
  const needStr=(!!plan.str&&!mOut.includes('str'))||mIn.some(x=>x.type==='str');
  const needSpin=(!!plan.spin&&!mOut.includes('spin'))||mIn.some(x=>x.type==='spin');
  const needPil=(!!(plan.other&&plan.other.toLowerCase().includes('pilates'))&&!mOut.includes('pilates'))||mIn.some(x=>x.type==='pilates');
  const needed=[];
  if(needRun)needed.push(!!st.run);
  if(needStr){needed.push(!!st.str);needed.push(!!st.tm);}
  if(needSpin)needed.push(!!st.spin);
  if(needPil)needed.push(!!st.pil);
  if(ggArmsActive(d))needed.push(!!st.ba);
  needed.push(!!st.steps);needed.push(!!st.water);
  return needed;
}
function isPerfectDay(){
  const needed=getNeededForDay(currentDate,getState());
  return needed.length>=3&&needed.every(v=>v===true);
}
function checkPerfectDay(){
  const allDone=isPerfectDay();
  const existing=$("perfect-day-banner");
  if(allDone&&!existing){
    const banner=document.createElement("div");
    banner.id="perfect-day-banner";banner.className="perfect-day";
    banner.innerHTML='<div class="perfect-day-icon">\u2B50</div><div class="perfect-day-title">PERFECT DAY</div><div class="perfect-day-sub">Every box ticked. That\'s how champions are built.</div>';
    const c=$("content");
    if(c&&c.style.display!=="none"){const fc=c.firstChild;if(fc)c.insertBefore(banner,fc);else c.appendChild(banner);}
  } else if(!allDone&&existing){existing.remove();}
}

function saveMeasurement(){
  var g=function(id){var el=$(id);return el&&el.value!==""?parseFloat(el.value):null;};
  var rec={waist:g("m-waist"),hips:g("m-hips"),thigh:g("m-thigh"),weight:g("m-weight"),bodyfat:g("m-bf"),muscle:g("m-muscle")};
  if(["waist","hips","thigh","weight","bodyfat","muscle"].every(function(k){return rec[k]===null;})){showToast("Enter at least one number");return;}
  var today=currentDate.getFullYear()+"-"+String(currentDate.getMonth()+1).padStart(2,"0")+"-"+String(currentDate.getDate()).padStart(2,"0");
  var arr=getMeasurements();
  var ex=arr.filter(function(e){return e.d===today;})[0];

function deleteMeasurement(d){

function mFirstWith(arr,k){for(var i=0;i<arr.length;i++)if(arr[i][k]!=null)return arr[i];return null;}
function mLastWith(arr,k){for(var i=arr.length-1;i>=0;i--)if(arr[i][k]!=null)return arr[i];return null;}
function mLastBoth(arr,a,b){for(var i=arr.length-1;i>=0;i--)if(arr[i][a]!=null&&arr[i][b]!=null)return arr[i];return null;}
function mFirstBoth(arr,a,b){for(var i=0;i<arr.length;i++)if(arr[i][a]!=null&&arr[i][b]!=null)return arr[i];return null;}
function mFmtDate(s){var d=new Date(s+"T12:00:00");var M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return d.getDate()+" "+M[d.getMonth()];}

    +'</div>';

  if(!arr.length){
    html+='<div style="background:rgba(255,255,255,0.4);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(180,160,190,0.15);font-size:12px;color:#A898B0;line-height:1.5">Log your first set above. Once you\u2019ve got two readings a few weeks apart, you\u2019ll see waist-to-hip ratio and recomp trends here \u2014 framed as feedback on your training, not a scorecard.</div>';
    return html;
  }

  // --- insights ---
  function row(label,val,note,col){return '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:0.5px solid rgba(180,160,190,0.1)"><span style="font-size:13px;color:#3D2E4A">'+label+'</span><span style="font-size:13px;color:#7A6B8A"><b style="color:#3D2E4A">'+val+'</b> <span style="font-size:11px;color:'+col+';font-weight:600">'+note+'</span></span></div>';}
  function trend(label,k,unit,goodDir){
    var fw=mFirstWith(arr,k),lw=mLastWith(arr,k);
    if(!lw)return"";
    if(fw&&fw!==lw){
      var d=Math.round((lw[k]-fw[k])*10)/10;
      var ar=d>0?"\u2197":d<0?"\u2198":"\u2192";
      var good=goodDir==="down"?d<0:goodDir==="up"?d>0:Math.abs(d)<0.5;

  if(whL){

    var note="single reading";var col="#7A6B8A";
    if(whF&&whF!==whL){var dd=Math.round((now-(whF.waist/whF.hips))*1000)/1000;note=(dd<0?"\u2198 ":dd>0?"\u2197 ":"\u2192 ")+(dd>0?"+":"")+dd;col=dd<0?"#2D6A4F":dd>0?"#B8883E":"#7A6B8A";}

  // recomp verdict — body-comp (fat/muscle) leads when available; tape is the backup

  var bfD=mD("bodyfat"),muD=mD("muscle"),waistD=mD("waist"),hipsD=mD("hips"),thighD=mD("thigh");
  var title=null,body="",col="#2D6A4F",bg="rgba(45,106,79,0.08)",bd="rgba(45,106,79,0.2)",ic="\u2705",scaleNote=false;

  if(bfD!=null||muD!=null){

    if((bfD!=null&&bfD<0)&&(muD==null||muD>=0)){title="Textbook recomp";body="Body fat is down"+(muD!=null&&muD>0?" and muscle is up":muD!=null?" with muscle held":"")+" \u2014 the exact change you\u2019re training for. Expect the scale to barely move while this happens; that\u2019s the point.";}

    if(waistD!=null&&waistD!==0)body+=" Waist "+(waistD<0?"down "+Math.abs(waistD):"up "+waistD)+" cm backs it up.";

    html+='<div style="background:'+bg+';border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid '+bd+'">'
      +'<div style="font-size:13px;font-weight:700;color:'+col+';margin-bottom:6px">'+ic+' '+title+'</div>'

      html+='</div>';
    }
    html+='</div>';
    var tooFast=paceNums.filter(function(p){return p<5.83;}).length;
    if(tooFast>=Math.ceil(paceNums.length*0.5)){
      html+='<div style="background:rgba(251,191,36,0.1);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(251,191,36,0.3)">'
        +'<div style="font-size:13px;font-weight:700;color:#B8883E;margin-bottom:6px">\u26A0\uFE0F Most easy runs are too fast</div>'
        +'<div style="font-size:13px;color:#4A3D5A;line-height:1.6">'+tooFast+' of your last '+paceNums.length+' easy runs were faster than 5:50/km. This is the #1 mistake distance runners make \u2014 running easy days too hard. It feels productive but it accumulates fatigue and blunts your quality sessions. Your Tuesday speedwork and Sunday long run suffer when Wednesday and Friday aren\u2019t genuinely easy. Aim for 5:50\u20136:10/km even if it feels embarrassingly slow. You should be able to hold a full conversation.</div></div>';
    } else if(inZoneCount>=Math.ceil(paceNums.length*0.6)){
      html+='<div style="background:rgba(45,106,79,0.08);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(45,106,79,0.2)">'
        +'<div style="font-size:13px;font-weight:700;color:#2D6A4F;margin-bottom:6px">\u2705 Easy paces are on point</div>'
        +'<div style="font-size:13px;color:#4A3D5A;line-height:1.6">Most of your easy runs are hitting the 5:50\u20136:10/km target zone. This is exactly right \u2014 the aerobic base you\u2019re building now is what will carry you to sub-2:00. Keep doing this.</div></div>';
    }
    // aerobic efficiency (HR-aware): distance covered per heartbeat, trended over time
    var effRuns=easyRuns.filter(function(r){return r.avg_hr&&r.moving_time_min&&r.distance_km;});
    if(effRuns.length>=2){
      var chrono=effRuns.slice().reverse();
      var effOf=function(r){var spd=r.distance_km/(r.moving_time_min/60);return spd/r.avg_hr*1000;};
      var effs=chrono.map(effOf);
      var hrsE=chrono.map(function(r){return Math.round(r.avg_hr);});
      var half=Math.max(1,Math.floor(effs.length/2));
      var oldA=effs.slice(0,half).reduce(function(a,b){return a+b;},0)/half;
      var newA=effs.slice(effs.length-half).reduce(function(a,b){return a+b;},0)/half;
      var dPct=Math.round((newA-oldA)/oldA*1000)/10;
      var medHR=hrsE.slice().sort(function(a,b){return a-b;})[Math.floor(hrsE.length/2)];
      var eTitle,eBody,eCol="#2D6A4F",eBg="rgba(45,106,79,0.08)",eBd="rgba(45,106,79,0.2)",eIc="\u2705";
      if(dPct>=2){eTitle="Aerobic engine is growing";eBody="Across your recent easy runs you\u2019re covering more ground per heartbeat \u2014 efficiency up about "+dPct+"%. Same effort, more speed. That\u2019s the quiet signal the base work is paying off toward sub-2:00.";}
      else if(dPct<=-2){eTitle="Efficiency dipped recently";eBody="You\u2019re getting a little less pace per heartbeat lately (down ~"+Math.abs(dPct)+"%). One-off causes are usual \u2014 heat, a hard block, poor sleep, under-fuelling. If it persists over a couple of weeks, an easier week usually resets it.";eCol="#B8883E";eBg="rgba(184,136,62,0.1)";eBd="rgba(184,136,62,0.3)";eIc="\uD83D\uDCA1";}
      else{eTitle="Aerobic efficiency steady";eBody="Pace-per-heartbeat is holding roughly flat across your recent easy runs. Keep the easy days genuinely easy and it should trend up over the block.";eCol="#6B5B8A";eBg="rgba(107,91,138,0.07)";eBd="rgba(107,91,138,0.2)";eIc="\u2192";}
      var lr=effRuns[0],others=effRuns.slice(1);
      if(lr.avg_hr&&others.length){
        var omed=others.map(function(r){return r.avg_hr;}).sort(function(a,b){return a-b;})[Math.floor(others.length/2)];
        var lrPn=parsePace(lr.pace_per_km);
        if(lr.avg_hr-omed>=6&&!(lrPn>0&&lrPn<5.83)){eBody+=" Heads-up: your most recent easy run\u2019s HR (\u2764\uFE0F"+Math.round(lr.avg_hr)+") ran high for the pace versus your usual ~\u2764\uFE0F"+Math.round(omed)+" \u2014 more likely fatigue, heat or under-recovery than slacking. An extra easy or rest day can help.";}
      }
      html+='<div style="background:'+eBg+';border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid '+eBd+'">'
        +'<div style="font-size:13px;font-weight:700;color:'+eCol+';margin-bottom:6px">'+eIc+' '+eTitle+'</div>'
        +'<div style="font-size:13px;color:#4A3D5A;line-height:1.6">'+eBody+'</div>'
        +'<div style="font-size:11px;color:#A898B0;margin-top:8px">Typical easy-run HR \u2764\uFE0F'+medHR+' \u00B7 from your last '+effRuns.length+' easy runs with HR data</div></div>';
    } else {
      html+='<div style="background:rgba(107,91,138,0.05);border-radius:14px;padding:12px 16px;margin-bottom:10px;border:0.5px dashed rgba(107,91,138,0.2)"><div style="font-size:12px;color:#7A6B8A;line-height:1.5">\u2764\uFE0F Wear your HR monitor on easy runs and you\u2019ll get an aerobic-efficiency trend here \u2014 the best single signal that your engine is improving (more pace at the same heart rate).</div></div>';
    }
  }

  // \u2500\u2500 Long Run Progression \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  if(longRuns.length>=2){
    var maxLR=Math.max.apply(null,longRuns.map(function(r){return r.distance_km||0;}));
    var latestLR=longRuns[longRuns.length-1];
    var prevKm=longRuns.length>1?(longRuns[longRuns.length-2].distance_km||0):0;
    var trend=latestLR.distance_km>prevKm?"\u2191 building":latestLR.distance_km<prevKm?"\u2193 down":"= steady";
    var totalLRkm=Math.round(longRuns.reduce(function(s,r){return s+(r.distance_km||0);},0)*10)/10;
    var raceKm=21.1;
    var pctOfRace=Math.round((maxLR/raceKm)*100);

    html+='<div style="background:rgba(255,255,255,0.55);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(180,160,190,0.15)">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">'
      +'<div style="font-size:15px;font-weight:700;color:#3D2E4A">Long run progression</div>'
      +'<div style="font-size:11px;background:rgba(45,106,79,0.1);color:#2D6A4F;padding:3px 10px;border-radius:10px;font-weight:600">'+longRuns.length+' long runs logged</div>'
      +'</div>'
      // Stats row - LATEST / LONGEST EVER / TOTAL
      +'<div style="display:flex;gap:8px;margin-bottom:16px">'
      +'<div style="flex:1;background:white;border-radius:12px;padding:12px;text-align:center;border:0.5px solid rgba(180,160,190,0.15)">'
      +'<div style="font-size:9px;font-weight:600;letter-spacing:1px;color:#A898B0;margin-bottom:6px">LATEST</div>'
      +'<div style="font-size:28px;font-weight:700;color:#2D6A4F;line-height:1">'+(latestLR.distance_km||0)+'</div>'
      +'<div style="font-size:11px;color:#A898B0;margin-top:2px">km</div>'
      +(latestLR.pace_per_km?'<div style="font-size:11px;color:#7A6B8A;margin-top:4px">'+latestLR.pace_per_km+'/km</div>':"")
      +'</div>'
      +'<div style="flex:1;background:white;border-radius:12px;padding:12px;text-align:center;border:0.5px solid rgba(180,160,190,0.15)">'
      +'<div style="font-size:9px;font-weight:600;letter-spacing:1px;color:#A898B0;margin-bottom:6px">LONGEST EVER</div>'
      +'<div style="font-size:28px;font-weight:700;color:#2D6A4F;line-height:1">'+maxLR+'</div>'
      +'<div style="font-size:11px;color:#A898B0;margin-top:2px">km</div>'
      +'<div style="font-size:11px;color:#7A6B8A;margin-top:4px">'+trend+'</div>'
      +'</div>'
      +'<div style="flex:1;background:white;border-radius:12px;padding:12px;text-align:center;border:0.5px solid rgba(180,160,190,0.15)">'
      +'<div style="font-size:9px;font-weight:600;letter-spacing:1px;color:#A898B0;margin-bottom:6px">TOTAL</div>'
      +'<div style="font-size:22px;font-weight:700;color:#3D2E4A;line-height:1">'+totalLRkm+'</div>'
      +'<div style="font-size:11px;color:#A898B0;margin-top:2px">km</div>'
      +'<div style="font-size:11px;color:#7A6B8A;margin-top:4px">long run km</div>'
      +'</div>'
      +'</div>'
      // Bar chart with km labels above and dates below
      +'<div style="display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:4px;padding:0 2px">';
    longRuns.forEach(function(r,i){
      var km=r.distance_km||0;
      var h=Math.max(Math.round((km/maxLR)*100),8);
      var isLatest=(i===longRuns.length-1);
      var d=new Date(r.date+"T12:00:00");
      var dayNum=d.getDate();
      var mon=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
      html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">'
        +'<div style="font-size:9px;font-weight:'+(isLatest?"700":"400")+';color:'+(isLatest?"#2D6A4F":"#A898B0")+'">'+km+'</div>'
        +'<div style="width:100%;height:'+h+'%;background:'+(isLatest?"#2D6A4F":"rgba(45,106,79,0.2)")+';border-radius:3px 3px 0 0;min-height:4px"></div>'
        +'<div style="font-size:8px;color:#A898B0;text-align:center;line-height:1.3">'+dayNum+'<br>'+mon+'</div>'
        +'</div>';
    });
    html+='</div>'
      // Race distance context bar
      +'<div style="background:rgba(107,91,138,0.06);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px">'
      +'<span style="font-size:18px">\uD83C\uDFC1</span>'
      +'<div><div style="font-size:12px;font-weight:600;color:#C4607A">Race distance: 21.1 km</div>'
      +'<div style="font-size:11px;color:#7A6B8A">Your longest run is '+pctOfRace+'% of race distance</div></div>'
      +'</div>'
      +'</div>';

    // Long run insight card
    var lrInsightTitle="",lrInsightBody="",lrInsightColor="#2D6A4F",lrInsightBg="rgba(45,106,79,0.08)",lrInsightBorder="rgba(45,106,79,0.2)",lrIcon="\u2705";
    if(pctOfRace>=85){
      lrInsightTitle="Long run endurance is race-ready";
      lrInsightBody="Your longest run is "+pctOfRace+"% of race distance. You're well prepared physically. The taper will do the rest \u2014 trust your training.";
    } else if(pctOfRace>=70){
      lrInsightTitle="Long run endurance building nicely";
      lrInsightBody="Your latest long run was "+(latestLR.distance_km||0)+" km at "+(latestLR.pace_per_km||"??")+"/km. This is strong prep for the half marathon. You're proving your body can handle the distance \u2014 now it's about sharpening the pace.";
    } else if(pctOfRace>=55){
      lrInsightTitle="Building the aerobic base";
      lrInsightBody="At "+pctOfRace+"% of race distance, you're making good progress. Keep prioritising the Sunday long run \u2014 it's the single most important session for your half marathon goal.";
      lrIcon="\uD83D\uDCA1";lrInsightColor="#B8883E";lrInsightBg="rgba(184,136,62,0.08)";lrInsightBorder="rgba(184,136,62,0.2)";
    } else {
      lrInsightTitle="Long run needs attention";
      lrInsightBody="Your longest run so far is "+pctOfRace+"% of race distance. The long run is non-negotiable for half marathon prep. Prioritise it every Sunday even if you miss other sessions.";
      lrIcon="\u26A0\uFE0F";lrInsightColor="#DC2626";lrInsightBg="rgba(220,38,38,0.08)";lrInsightBorder="rgba(220,38,38,0.2)";
    }
    html+='<div style="background:'+lrInsightBg+';border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid '+lrInsightBorder+'">'
      +'<div style="font-size:13px;font-weight:700;color:'+lrInsightColor+';margin-bottom:6px">'+lrIcon+' '+lrInsightTitle+'</div>'
      +'<div style="font-size:13px;color:#4A3D5A;line-height:1.6">'+lrInsightBody+'</div>'
      +'</div>';
  }

  // Strength insights — each weight is stored against its exercise NAME (never a slot index),
  // so a number can never appear under the wrong lift. Legacy index-keyed logs are ignored.
  var exData={};
  var sd2=new Date(currentDate);
  for(var di=0;di<120;di++){
    var dk2=sd2.getFullYear()+"-"+(sd2.getMonth()+1)+"-"+sd2.getDate();
    try{
      var lg=JSON.parse(localStorage.getItem("tp-exlog-"+dk2)||"{}");
      var ds3=("0"+sd2.getDate()).slice(-2)+"/"+(sd2.getMonth()+1);
      Object.keys(lg).forEach(function(nm){
        if(/^\d+$/.test(nm))return;
        var rec=lg[nm];if(!rec)return;
        var w=parseFloat(rec.w);if(!(w>0))return;
        if(!exData[nm])exData[nm]=[];
        exData[nm].unshift({d:ds3,w:w,r:rec.r});
      });
    }catch(e2){}
    sd2.setDate(sd2.getDate()-1);
  }
  var sessionDefs=[["\uD83D\uDCAA Strength A \u2014 Mon",SA,"#8B5CF6"],["\uD83D\uDCAA Strength B \u2014 Wed",SB,"#2D6A4F"],["\uD83D\uDCAA Strength C \u2014 Fri",SC,"#6B5B8A"]];
  var nameToSession={},sessionOrder={};
  sessionDefs.forEach(function(sd,si){try{var def=sd[1]("base");def.exercises.forEach(function(ex,xi){nameToSession[ex.name]=si;sessionOrder[ex.name]=xi;});}catch(e){}});
  function insightFor(nm){
    var data=exData[nm];
    var latest=data[data.length-1],first=data[0],n=data.length;
    var maxW=Math.max.apply(null,data.map(function(d){return d.w;}));
    var head='<div style="font-size:13px;font-weight:600;color:#3D2E4A">'+nm+'</div>';
    var sub='Last: <b>'+latest.w+' kg</b>'+(latest.r?' \u00D7 '+latest.r+' reps':'')+' \u00B7 '+latest.d;
    var verdict='';
    if(n>=2){
      var gain=Math.round((latest.w-first.w)*10)/10;
      if(gain>0)verdict='\u2197\uFE0F Up '+gain+' kg across '+n+' logged sessions \u2014 progressive overload on track.';
      else if(gain<0)verdict='\u2198\uFE0F Down '+Math.abs(gain)+' kg since your first logged session. Fine if it was a deload or a higher-rep day; otherwise work back up.';
      else verdict='\u2192 Steady at '+latest.w+' kg over '+n+' sessions. If the last set felt easy, add 1\u20132.5 kg next time.';
      if(latest.w<maxW)verdict+=' Peak so far: '+maxW+' kg.';
    }else{
      verdict='First logged session \u2014 one more and you\u2019ll see the trend.';
    }
    return '<div style="padding:9px 0;border-bottom:0.5px solid rgba(180,160,190,0.1)">'+head+'<div style="font-size:12px;color:#7A6B8A;margin-top:2px">'+sub+'</div><div style="font-size:12px;color:#4A3D5A;margin-top:4px;line-height:1.5">'+verdict+'</div></div>';
  }
  var loggedNames=Object.keys(exData);
  if(loggedNames.length){
    html+='<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:#A898B0;margin:14px 0 8px">STRENGTH INSIGHTS</div>';
    sessionDefs.forEach(function(sd,si){
      var names=loggedNames.filter(function(nm){return nameToSession[nm]===si;}).sort(function(a,b){return (sessionOrder[a]||0)-(sessionOrder[b]||0);});
      if(!names.length)return;
      html+='<div style="background:rgba(255,255,255,0.55);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(180,160,190,0.15)"><div style="font-size:13px;font-weight:700;color:'+sd[2]+';margin-bottom:4px">'+sd[0]+'</div>'+names.map(insightFor).join("")+'</div>';
    });
    var orphans=loggedNames.filter(function(nm){return nameToSession[nm]===undefined;}).sort();
    if(orphans.length){
      html+='<div style="background:rgba(255,255,255,0.55);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(180,160,190,0.15)"><div style="font-size:13px;font-weight:700;color:#A898B0;margin-bottom:4px">Other logged lifts</div>'+orphans.map(insightFor).join("")+'</div>';
    }
    html+='<div style="text-align:center;margin:2px 0 6px"><button onclick="clearExLogs()" style="background:none;border:1px dashed rgba(196,96,122,0.4);border-radius:8px;padding:7px 14px;font-size:11px;color:#C4607A;cursor:pointer;-webkit-appearance:none">\uD83D\uDDD1\uFE0F Reset weight history</button></div>';
  } else {
    html+='<div style="background:rgba(255,255,255,0.55);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(180,160,190,0.15)"><div style="font-size:13px;font-weight:700;color:#3D2E4A;margin-bottom:6px">Strength Insights</div><div style="font-size:12px;color:#A898B0">Log a weight in any gym session (the \u201CLog: kg \u00D7 reps\u201D field) and insights appear here. Each weight is tied to its exercise by name, so it can never show under the wrong lift.</div></div>';
  }
  html+=renderMeasurements();
  cv.innerHTML=html;
}

function clearExLogs(){
  if(!confirm('Clear all logged weights? This cannot be undone.'))return;
  var keys=[];
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.startsWith('tp-exlog-'))keys.push(k);
  }
  keys.forEach(function(k){localStorage.removeItem(k);});
  alert('Done! All weight logs cleared.');
  renderCoachTab();
}


if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',function(){render();});}else{render();}
</script>
