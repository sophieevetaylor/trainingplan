const FORM={"Banded glute bridge (warm-up)":{form:"Feet flat hip-width. Drive through heels. Squeeze glutes hard at top \u2014 2-sec hold. Don't let knees cave.",link:"https://www.youtube.com/watch?v=GmRSV_n2E_0"},"Hip thrust (booty builder)":{form:"Shoulder blades on pad edge. Chin tucked, look forward. Drive through heels. At lockout:ribs down, pelvis tucked (posterior pelvic tilt). Pause 2 sec and squeeze.",link:"https://www.youtube.com/watch?v=xDmFkJxPzeM"},"Single-leg glute bridge":{form:"Back flat, one foot planted, other leg extended or knee held to chest. Drive through the planted heel. Hips level \u2014 don't let the free side drop. Squeeze glute at top for 2 sec.",link:"https://www.youtube.com/watch?v=AVAXhy6pl7o"},"DB bench press":{form:"Retract shoulder blades \u2014 squeeze them together and down. Slight arch in upper back. Lower DBs to chest, elbows at 45\u00B0. Press up and slightly inward.",link:"https://www.youtube.com/watch?v=VmB1G1K7v94"},"DB shoulder press":{form:"Start with DBs at ear height, palms forward. Press straight up \u2014 don't let the weights drift forward. Brace core, don't arch back. Lower controlled to ear level.",link:"https://www.youtube.com/watch?v=qEwKCR5JCog"},"Pallof press":{form:"Stand side-on to cable at chest height. Hold handle at chest. Press straight out \u2014 resist the rotation. Arms fully extended, hold 1 sec, return. Your core is fighting the cable's pull.",link:"https://www.youtube.com/watch?v=AH_QZLm_0-s"},"Dead bug":{form:"Back flat, arms straight up, knees at 90\u00B0. Press lower back into the floor \u2014 it must NOT leave the ground. Extend opposite arm and leg simultaneously. Breathe out as you extend.",link:"https://www.youtube.com/watch?v=I5xbsA71v1A"},"Banded clamshells (warm-up)":{form:"Side-lying, band above knees, heels together. Open top knee like a clamshell \u2014 rotate from the hip, not lower back. Keep hips stacked vertically. Slow and controlled.",link:"https://www.youtube.com/watch?v=cEaCnbGKmMQ"},"Romanian deadlift":{form:"Feet hip-width, soft knees locked in position. Push hips BACK \u2014 bar slides down your thighs. Feel the hamstring stretch. Back stays flat \u2014 the moment it rounds, that's your range. Drive hips forward to return.",link:"https://www.youtube.com/watch?v=JCXUYuzwNrM"},"Cable kickback":{form:"Face the cable, ankle strap on. Slight forward lean, brace core. Extend leg straight back \u2014 squeeze glute at top. Don't arch lower back to get more range. Controlled, no swinging.",link:"https://www.youtube.com/watch?v=dXMvr3uMmDc"},"Nordic curl eccentric":{form:"Kneel on a pad, anchor ankles. Hands ready to catch yourself. Slowly lower body forward \u2014 fight gravity with hamstrings for 5-sec count. Push back up with hands. Training the lowering phase only.",link:"https://www.youtube.com/watch?v=BpKadYwbGPo"},"Lat pulldown":{form:"Grip just wider than shoulders. Lean back ~15\u00B0. Pull bar to upper chest \u2014 lead with elbows, drive them down and back. Squeeze shoulder blades at the bottom. Control the return.",link:"https://www.youtube.com/watch?v=CAwf7n6Luuc"},"Seated cable row":{form:"Sit tall, slight knee bend. Pull handle to lower ribcage \u2014 drive elbows straight back. Squeeze shoulder blades 1 sec. Don't lean back to cheat. Torso stays still.",link:"https://www.youtube.com/watch?v=GZbfZ033f74"},"Bird dog":{form:"All fours, wrists under shoulders, knees under hips. Extend opposite arm and leg \u2014 reach long. Keep hips level (don't let them rotate or drop). Pause 2 sec extended, return controlled.",link:"https://www.youtube.com/watch?v=wiFNA3sqjCA"},"Banded lateral walks":{form:"Band just above knees (or ankles for harder). Quarter-squat position \u2014 stay low throughout. Step sideways, leading with the heel. Keep toes forward, don't let knees cave.",link:"https://www.youtube.com/watch?v=zTOPFZrekbE"},"Single-leg hip thrust":{form:"Shoulder blades on bench, one foot planted. Drive through heel. At the top:ribs down, squeeze glute, hold 1\u20132 sec. Keep hips level. If you feel it in your lower back, reset your pelvis.",link:"https://www.youtube.com/watch?v=BXKB1YE5ufY"},"Single-leg hip thrust (weighted)":{form:"Same as bodyweight version but with a plate on your hip. Shoulder blades on bench, one foot planted. Drive through heel, squeeze at top with posterior pelvic tilt. Hold 1\u20132 sec.",link:"https://www.youtube.com/watch?v=BXKB1YE5ufY"},"Step-ups (low box)":{form:"Forward lean of ~20\u00B0 \u2014 this shifts the load onto your glute instead of your quad. Step up driving through the heel of the working leg. Do NOT push off the back foot \u2014 that is cheating. Stand fully, squeeze glute, then lower controlled.",link:"https://www.youtube.com/watch?v=dQqApCGd5Ss"},"Frog pumps":{form:"Lie on back, soles of feet together, knees out wide like a frog. Drive hips up squeezing glutes hard at top. Short range of motion \u2014 this is about the squeeze, not the height. High reps, constant tension.",link:"https://www.youtube.com/watch?v=3idsBMaqsR4"},"Plank variations":{form:"Start with standard forearm plank. Progress to shoulder taps, plank walks, or plank with leg lift. Key cue for all:pelvis tucked, glutes engaged, no hip rocking side to side.",link:"https://www.youtube.com/watch?v=ASdvN_XEl_c"},};

function getFuel(r){
if(!r||r.type.includes("RACE"))return null;
const km=parseFloat(r.km)||0;
const isTempo=r.type.toLowerCase().includes("tempo")||r.type.toLowerCase().includes("interval")||r.type.toLowerCase().includes("hill")||r.type.toLowerCase().includes("speed");
const isLong=r.type.toLowerCase().includes("long");
let pre="",during="",after="";
if(km<=5&&!isTempo){pre="\u2615 Optional: coffee + small banana. Stay hydrated.";during="\uD83D\uDCA7 No fuel needed.";after="\uD83E\uDD5B Small snack if hungry."}
else if(km<=7&&!isTempo){pre="\uD83C\uDF4C Small banana or toast with honey 30\u201360 min before.";during="\uD83D\uDCA7 No fuel needed. Carry water if hot.";after="\uD83E\uDD5B 20\u201330g protein within 45 min."}
else if(isTempo){pre="\uD83C\uDF5E Carb-rich snack 60\u201390 min before: toast + banana, oats, or rice cakes with honey.";during=km>8?"\uD83D\uDCA7 Carry water. Consider a gel if session is 60+ min.":"\uD83D\uDCA7 Carry water. No gel needed under 60 min.";after="\uD83E\uDD5B Recovery meal within 30 min: 20\u201330g protein + carbs."}
else if(isLong&&km>=14){pre="\uD83C\uDF5A Proper meal 2\u20133 hrs before: oats + banana + honey, toast with PB, or rice + eggs.";during=km>=16?"\u26A1 Gel at km 7 and km 14. Water every 3\u20134 km.":"\uD83D\uDCA7 Water every 3\u20134 km. Optional: 1 gel at km 8\u201310.";after="\uD83E\uDD5B Recovery meal within 30 min: protein + carbs + electrolytes."}
else{pre="\uD83C\uDF4C Toast + banana 60\u201390 min before if needed.";during="\uD83D\uDCA7 Carry water.";after="\uD83E\uDD5B 20\u201330g protein + carbs within 45 min."}
return{pre,during,after};
}

let stravaData=null,stravaLoaded=false;
async function loadStrava(){
  if(stravaLoaded)return renderStravaWidgets();
  try{
    const res=await fetch("https://vermillion-donut-bd1fcf.netlify.app/.netlify/functions/strava");
    const text=await res.text();
    let data;
    try{data=JSON.parse(text);}catch(e){
      console.error("Strava parse error:",text.slice(0,200));return;
    }
    if(data.error){console.error("Strava error:",data.error,data.detail);return;}
    if(data.activities){
      stravaData=data.activities;
      stravaLoaded=true;
      console.log("Strava loaded:",stravaData.length,"activities");
      renderStravaWidgets();
      if(viewMode==="coach")renderCoachTab();
    }
  }catch(e){console.error("Strava fetch error:",e.message);}
}

function getCalTarget(date){
  var plan=getPlan(date);
  var hasHard=plan.run&&(plan.run.type.toLowerCase().indexOf("tempo")>=0||plan.run.type.toLowerCase().indexOf("interval")>=0||plan.run.type.toLowerCase().indexOf("hill")>=0||plan.run.type.toLowerCase().indexOf("race")>=0||plan.run.type.toLowerCase().indexOf("long")>=0);
  var hasSession=!!(plan.run||plan.str||plan.spin);
  if(hasHard)return 2000;
  if(hasSession)return 1900;
  return 1700;

var _pfTimer=null;
window._pfProducts=[];

function pfSearch(val){
  clearTimeout(_pfTimer);
  var re=document.getElementById("pf-results");
  if(!re)return;
  if(!val||val.length<2){re.style.display="none";return;}
  re.style.display="block";
  re.innerHTML='<div class="pf-loading">Searching...</div>';
  _pfTimer=setTimeout(function(){pfFetch(val);},500);
}

function pfFetch(query){
  var re=document.getElementById("pf-results");if(!re)return;
  var url="https://vermillion-donut-bd1fcf.netlify.app/.netlify/functions/food-search?q="+encodeURIComponent(query);
  fetch(url).then(function(r){return r.text();}).then(function(text){
    var data;try{data=JSON.parse(text);}catch(e){if(re)re.innerHTML='<div class="pf-no-results">Search unavailable. Try again shortly.</div>';return;}
    if(!re)return;
    var items=[];

    if(data.source==="off"){
      items=(data.products||[]).map(function(p){
        var c100=Math.round(p.nutriments["energy-kcal_100g"]||0);
        var pr100=Math.round((p.nutriments["proteins_100g"]||0)*10)/10;
        var ch100=Math.round((p.nutriments["carbohydrates_100g"]||0)*10)/10;
        var f100=Math.round((p.nutriments["fat_100g"]||0)*10)/10;
        var brand=p.brands?(p.brands.split(",")[0].trim()):"";
        var srv=p.serving_quantity?Math.round(p.serving_quantity)+"g serving":"per 100g";
        return {name:p.product_name,brand:brand,cal100:c100,prot100:pr100,carb100:ch100,fat100:f100,srv:srv,defG:p.serving_quantity?Math.round(p.serving_quantity):100};
      });
    } else {
      items=(data.foods||[]).map(function(f){
        var nuts=f.foodNutrients||[];
        function gn(name){var n=nuts.find(function(x){return x.nutrientName&&x.nutrientName.toLowerCase().indexOf(name)>=0;});return n?n.value:0;}
        var cal=gn("energy")||gn("kcal");
        if(cal>900)cal=Math.round(cal/4.184);
        var srv=f.servingSize?Math.round(f.servingSize)+"g":f.householdServingFullText||"per 100g";
        var defG=f.servingSize?Math.round(f.servingSize):100;
        return {name:f.description,brand:f.brandOwner||f.brandName||"",cal100:Math.round(cal),prot100:Math.round(gn("protein")*10)/10,carb100:Math.round(gn("carbohydrate")*10)/10,fat100:Math.round(gn("total lipid")*10)/10,srv:srv,defG:defG};
      });
    }

    if(!items.length){re.innerHTML='<div class="pf-no-results">No results. Try different search terms.</div>';return;}
    window._pfProducts=items;
    re.innerHTML=items.map(function(p,i){
      return '<div class="pf-result" onclick="pfSelect('+i+')"><div class="pf-result-name">'+p.name+'</div>'
        +(p.brand?'<div class="pf-result-brand">'+p.brand+'</div>':"")
        +'<div class="pf-result-macros"><div class="pf-result-macro">'+p.cal100+'<span> kcal</span></div><div class="pf-result-macro">'+p.prot100+'g<span> prot</span></div><div class="pf-result-macro">'+p.carb100+'g<span> carbs</span></div><div class="pf-result-macro">'+p.fat100+'g<span> fat</span></div><div class="pf-result-macro" style="color:#B0A0B8;font-weight:400">'+p.srv+'</div></div></div>';
    }).join("");
  }).catch(function(){if(re)re.innerHTML='<div class="pf-no-results">Search failed. Check your connection.</div>';});
}

function pfSelect(i){
  var p=window._pfProducts[i];if(!p)return;
  var re=document.getElementById("pf-results");
  var pe=document.getElementById("pf-portion");
  var si=document.getElementById("pf-search-input");
  if(re)re.style.display="none";
  if(si)si.value="";
  if(!pe)return;
  window._pfSelected={
    name:p.name+(p.brand?" \u00B7 "+p.brand:""),
    c100:p.cal100||0,
    pr100:p.prot100||0,
    ch100:p.carb100||0,
    f100:p.fat100||0,
    defG:p.defG||100
  };
  var s=window._pfSelected;
  var half=Math.round(s.defG/2);
  var dbl=Math.round(s.defG*2);
  pe.style.display="block";
  pe.innerHTML='<div class="pf-portion-name">'+s.name+'</div><div class="pf-portion-row"><button onclick="pfAdjG(-5)" style="width:34px;height:34px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:18px;color:#6B5B8A;cursor:pointer;flex-shrink:0">\u2212</button><input type="number" class="pf-portion-input" id="pf-pg" value="'+s.defG+'" min="1" max="2000" oninput="pfPreview()"><button onclick="pfAdjG(5)" style="width:34px;height:34px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:18px;color:#6B5B8A;cursor:pointer;flex-shrink:0">+</button><span class="pf-portion-unit">g</span></div><div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap"><button onclick="pfSetG('+half+')" style="padding:4px 10px;border-radius:12px;border:0.5px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.5);font-size:11px;color:#6B5B8A;cursor:pointer">\u00BD serve ('+half+'g)</button><button onclick="pfSetG('+s.defG+')" style="padding:4px 10px;border-radius:12px;border:0.5px solid rgba(107,91,138,0.3);background:rgba(107,91,138,0.08);font-size:11px;color:#6B5B8A;font-weight:600;cursor:pointer">1 serve ('+s.defG+'g)</button><button onclick="pfSetG('+dbl+')" style="padding:4px 10px;border-radius:12px;border:0.5px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.5);font-size:11px;color:#6B5B8A;cursor:pointer">2 serves ('+dbl+'g)</button><button onclick="pfSetG(100)" style="padding:4px 10px;border-radius:12px;border:0.5px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.5);font-size:11px;color:#6B5B8A;cursor:pointer">100g</button></div><div class="pf-portion-preview" id="pf-prev"></div><div class="pf-portion-btns"><button class="pf-portion-cancel" onclick="pfCancel()">Cancel</button><button class="pf-portion-add" onclick="pfAddSelected()">Add to log</button></div>';

function pfAdjG(delta){
  var el=document.getElementById("pf-pg");
  if(!el)return;
  var v=Math.max(1,Math.min(2000,(parseFloat(el.value)||100)+delta));
  el.value=Math.round(v);
  el.dispatchEvent(new Event("input"));
}
function pfSetG(g){
  var el=document.getElementById("pf-pg");
  if(!el)return;
  el.value=g;
  el.dispatchEvent(new Event("input"));
}

function pfPreview(){
  var s=window._pfSelected;if(!s)return;
  var g=parseFloat((document.getElementById("pf-pg")||{}).value)||0;
  var el=document.getElementById("pf-prev");if(!el)return;
  el.textContent=g+"g = "+Math.round(s.c100*g/100)+" kcal \u00B7 "+Math.round(s.pr100*g/100*10)/10+"g protein \u00B7 "+Math.round(s.ch100*g/100*10)/10+"g carbs \u00B7 "+Math.round(s.f100*g/100*10)/10+"g fat";

function guessFoodEmoji(n){
  n=n.toLowerCase();
  if(/chicken|poultry|hen/.test(n))return"\uD83C\uDF57";
  if(/beef|steak|mince|burger|brisket|rump/.test(n))return"\uD83E\uDD69";
  if(/salmon|tuna|fish|cod|snapper|barramundi|trout|seafood|prawn|shrimp/.test(n))return"\uD83D\uDC1F";
  if(/egg/.test(n))return"\uD83E\uDD5A";
  if(/milk|dairy|whey|casein/.test(n))return"\uD83E\uDD5B";
  if(/yogurt|yoghurt|chobani|yopro/.test(n))return"\uD83E\uDD44";
  if(/cheese|cottage/.test(n))return"\uD83E\uDDC0";
  if(/protein|shake|powder|bar|quest/.test(n))return"\uD83D\uDCAA";
  if(/oat|porridge|granola|muesli/.test(n))return"\uD83E\uDD63";
  if(/bread|toast|wrap|tortilla|bagel/.test(n))return"\uD83C\uDF5E";
  if(/rice|pasta|noodle|spaghetti/.test(n))return"\uD83C\uDF5A";
  if(/banana|apple|berry|fruit|mango|orange/.test(n))return"\uD83C\uDF4C";
  if(/salad|spinach|lettuce|greens|kale/.test(n))return"\uD83E\uDD57";
  if(/vegetable|broccoli|carrot|potato|zucchini/.test(n))return"\uD83E\uDD66";
  if(/nut|almond|peanut|cashew|walnut/.test(n))return"\uD83E\uDD5C";
  if(/coffee|latte|flat white|espresso/.test(n))return"\u2615";
  if(/chocolate|choc/.test(n))return"\uD83C\uDF6B";
  if(/soup|stew|chili|chilli|curry/.test(n))return"\uD83C\uDF2E";
  if(/pizza/.test(n))return"\uD83C\uDF55";
  if(/sandwich|sub/.test(n))return"\uD83E\uDD6A";
  if(/smoothie|juice/.test(n))return"\uD83E\uDD64";
  if(/turkey/.test(n))return"\uD83E\uDD83";
  if(/pork|ham|bacon/.test(n))return"\uD83D\uDC37";
  if(/lamb/.test(n))return"\uD83D\uDC11";
  if(/tofu|soy|tempeh/.test(n))return"\uD83E\uDDC6";
  return"\uD83C\uDF7D\uFE0F";
}

function pfAdd(name,c100,pr100,ch100,f100,g){
  if(g===undefined)g=parseFloat((document.getElementById("pf-pg")||{}).value)||100;
  var log=getProteinLog();
  var emoji=guessFoodEmoji(name);
  log.push({emoji:emoji,name:name+(g!==100?" ("+g+"g)":""),g:Math.round(pr100*g/100*10)/10,cal:Math.round(c100*g/100),carbs:Math.round(ch100*g/100*10)/10,fat:Math.round(f100*g/100*10)/10});
  saveProteinLog(log);pfCancel();renderProtein();
}

function pfAddSelected(){
  var s=window._pfSelected;if(!s)return;
  var g=parseFloat((document.getElementById("pf-pg")||{}).value)||s.defG||100;
  pfAdd(s.name,s.c100,s.pr100,s.ch100,s.f100,g);
}

function pfCancel(){
  var pe=document.getElementById("pf-portion");var re=document.getElementById("pf-results");var si=document.getElementById("pf-search-input");
  if(pe)pe.style.display="none";if(re)re.style.display="none";if(si)si.value="";

function adjustCals(delta){var el=document.getElementById("cf-cals");if(!el)return;el.textContent=Math.max(0,Math.min(2000,(parseInt(el.textContent)||200)+delta));}
function toggleCustomForm(){var f=document.getElementById("custom-food-form");if(!f)return;f.style.display=f.style.display==="none"?"block":"none";}
function addCustomFood(){
  var en=document.getElementById("cf-emoji"),nn=document.getElementById("cf-name"),gn=document.getElementById("cf-grams"),cn=document.getElementById("cf-cals");
  var emoji=en?en.value.trim()||"\uD83C\uDF7D\uFE0F":"\uD83C\uDF7D\uFE0F";
  var name=nn?nn.value.trim():"";
  var g=gn?parseInt(gn.textContent)||0:0;
  var cal=cn?parseInt(cn.textContent)||0:0;

  if(needsSave)saveProteinLog(log);

  var totalProt=log.reduce(function(s,f){return s+(f.g||0);},0);
  var totalCal=log.reduce(function(s,f){return s+resolveCal(f);},0);
  var calTarget=getCalTarget(currentDate);

  var protRemaining=Math.max(protTarget-totalProt,0);
  var calOver=totalCal>calTarget;
  var calColor=calOver?"#DC2626":calPct>=85?"#B8883E":"#6B5B8A";

  if(se){

    else if(totalProt>0){se.textContent=Math.round(protRemaining)+"g protein to go";se.style.color="#6B5B8A";}
    else{se.textContent="Search any food or tap quick-add below";se.style.color="#A898B0";}
  }

  if(le){
    le.innerHTML=log.length===0?'<div style="text-align:center;padding:8px;color:#B8A5C0;font-size:11px">Nothing logged yet</div>':
    log.map(function(f,i){
      var cal=resolveCal(f);
      return '<div class="protein-log-item"><span class="protein-log-name">'+(f.emoji||"\uD83C\uDF7D\uFE0F")+' '+(f.name||"")+'</span><span class="protein-log-macros"><span class="protein-log-g">'+Math.round((f.g||0)*10)/10+'g</span><span class="protein-log-cal">'+(cal||0)+' cal</span><span class="protein-log-x" onclick="removeProtein('+i+')">\u00D7</span></span></div>';
    }).join("");
  }

  var cb=document.getElementById("cal-bar-section");
  if(!cb){
    cb=document.createElement("div");cb.id="cal-bar-section";
    cb.style.cssText="margin-top:10px;padding:10px 12px;background:rgba(107,91,138,0.05);border-radius:10px;border:0.5px solid rgba(107,91,138,0.12)";
    var protCard=document.querySelector(".protein-card");
    if(protCard)protCard.appendChild(cb);
  }
  var overMsg=calOver?"<span style=\"color:#DC2626;font-weight:600\">\u26A0\uFE0F "+(totalCal-calTarget)+" cal over</span>":calRemaining+" cal remaining";
  cb.innerHTML='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px"><div style="font-size:12px;font-weight:700;color:#6B5B8A">\uD83D\uDD25 Calories \u2014 '+dayLabel+'</div><div style="font-size:11px;font-weight:700;color:'+calColor+'">'+totalCal+' <span style="font-weight:400;color:#A898B0">/ '+calTarget+'</span></div></div><div style="background:rgba(180,160,190,0.15);border-radius:4px;height:7px;overflow:hidden;margin-bottom:6px"><div style="height:100%;width:'+Math.min(calPct,100)+'%;background:'+(calOver?'linear-gradient(90deg,#DC2626,#EF4444)':'linear-gradient(90deg,#6B5B8A,rgba(107,91,138,0.6))')+';border-radius:4px;transition:width 0.3s"></div></div><div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#A898B0">'+overMsg+'</span><span style="color:#A898B0">500 cal deficit</span></div>';

  if(fe){

    qh+=PFOODS.map(function(f,i){return '<div class="pf-quick-pill" onclick="addProtein('+i+',false)">'+(f.emoji)+' '+(f.name)+' <span class="pg">'+f.g+'g \u00B7 '+f.cal+'cal</span></div>';}).join("");
    var cf=getCustomFoods();
    if(cf.length){qh+=cf.map(function(f,i){return '<div class="pf-quick-pill" onclick="addProtein('+i+',true)">'+(f.emoji||"\uD83C\uDF7D\uFE0F")+' '+(f.name)+' <span class="pg">'+f.g+'g'+(f.cal?' \u00B7 '+f.cal+'cal':'')+' <span onclick="event.stopPropagation();deleteCustomFood('+i+')" style="color:#C4607A;margin-left:4px;cursor:pointer">\u00D7</span></span></div>';}).join("");}
    qh+='</div>';
    qh+='<div id="custom-food-form" style="display:none;margin-top:10px;padding:12px;background:rgba(107,91,138,0.06);border-radius:10px;border:0.5px solid rgba(107,91,138,0.2)"><div style="font-size:12px;font-weight:700;color:#6B5B8A;margin-bottom:8px">Add Custom Food</div><div style="display:flex;gap:8px;margin-bottom:8px"><input id="cf-emoji" type="text" placeholder="\uD83C\uDF7D\uFE0F" maxlength="2" style="width:48px;text-align:center;font-size:18px;border:1px solid rgba(180,160,190,0.3);border-radius:8px;padding:6px;background:rgba(255,255,255,0.6);outline:none"><input id="cf-name" type="text" placeholder="Food name" style="flex:1;border:1px solid rgba(180,160,190,0.3);border-radius:8px;padding:6px 10px;font-size:13px;background:rgba(255,255,255,0.6);outline:none;color:#3D2E4A"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px"><div><div style="font-size:11px;color:#A898B0;margin-bottom:4px">Protein (g)</div><div style="display:flex;align-items:center;gap:6px"><button onclick="adjustGrams(-5)" style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:16px;color:#6B5B8A;cursor:pointer">\u2212</button><span id="cf-grams" style="font-size:16px;font-weight:700;color:#3D2E4A;min-width:28px;text-align:center">20</span><button onclick="adjustGrams(5)" style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:16px;color:#6B5B8A;cursor:pointer">+</button></div></div><div><div style="font-size:11px;color:#A898B0;margin-bottom:4px">Calories</div><div style="display:flex;align-items:center;gap:6px"><button onclick="adjustCals(-25)" style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:16px;color:#6B5B8A;cursor:pointer">\u2212</button><span id="cf-cals" style="font-size:16px;font-weight:700;color:#3D2E4A;min-width:32px;text-align:center">200</span><button onclick="adjustCals(25)" style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:16px;color:#6B5B8A;cursor:pointer">+</button></div></div></div><div style="display:flex;gap:8px"><button onclick="toggleCustomForm()" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);background:none;font-size:13px;color:#A898B0;cursor:pointer">Cancel</button><button onclick="addCustomFood()" style="flex:2;padding:8px;border-radius:8px;border:none;background:#6B5B8A;font-size:13px;color:white;font-weight:600;cursor:pointer">Save Food</button></div></div>';
    fe.innerHTML=qh;

  if(tip){

    else if(totalProt>=protTarget&&totalCal<=calTarget)tip.innerHTML="\u2705 Protein and calories on track. Perfect day.";
    else if(totalProt>=protTarget)tip.innerHTML="\u2705 Protein hit. "+calRemaining+" cal left \u2014 veg and protein only.";

  }
}catch(e){console.error("renderProtein error:",e.message,e.stack);}}

function sleepKey(d){return"tp-sleep-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}

function setSleepQuality(val){document.querySelectorAll(".sleep-pill").forEach(p=>p.classList.remove("active"));const el=document.querySelector('.sleep-pill[data-val="'+val+'"]');if(el)el.classList.add("active");saveSleep()}
function restoreSleep(){const sc=$("sleep-score"),ho=$("sleep-hours"),qd=$("sleep-quality");if(!sc)return;qd.innerHTML=['\uD83D\uDE34 Poor','\uD83D\uDE10 OK','\uD83D\uDE0A Good','\uD83C\uDF1F Great'].map((l,i)=>{const v=["poor","ok","good","great"][i];return'<div class="sleep-pill" data-val="'+(v)+'" onclick="setSleepQuality(\''+(v)+'\')">'+(l)+'</div>'}).join("");const data=getSleep(currentDate);if(data){if(data.score)sc.value=data.score;if(data.hours)ho.value=data.hours;if(data.quality){const el=document.querySelector('.sleep-pill[data-val="'+data.quality+'"]');if(el)el.classList.add("active")}$("sleep-saved").textContent="\u2713"}renderSleepSpark()}

c.innerHTML='<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="margin-top:8px;overflow:visible" preserveAspectRatio="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/><stop offset="100%" stop-color="#6366F1" stop-opacity="0"/></linearGradient></defs><polygon points="'+area+'" fill="url(#sg)"/><polyline points="'+poly+'" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+dotS+'</svg><div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px"><span style="color:#A898B0">Avg: '+avg+'/100</span><span style="font-weight:700;color:'+latestColor+'">'+latest+'/100</span></div>';}

function weightKey(d){return"tp-weight-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
function getWeight(d){try{const v=localStorage.getItem(weightKey(d));return v?JSON.parse(v):null}catch(e){return null}}

function deleteSession(type){

  var fk=movedKeyFor(currentDate);
  var fm=JSON.parse(localStorage.getItem(fk)||"[]");

  var wasMovedIn=getMovedIn(currentDate).find(function(x){return x.type===type;});
  if(wasMovedIn){
    localStorage.setItem(fk,JSON.stringify(fm));
  } else {
    fm.push({type:type,label:type,action:"removed"});
    localStorage.setItem(fk,JSON.stringify(fm));

}catch(e){}

function renderWaistSpark(){

const entries=[];const d=new Date(currentDate);

const latest=vals[vals.length-1],first=vals[0],diff=Math.round((latest-first)*10)/10;

const pts=vals.map((v,i)=>{const x=padX+i*((W-padX*2)/(vals.length-1));const y=padY+(1-(v-min)/range)*(H-padY*2);return[Math.round(x*10)/10,Math.round(y*10)/10]});
const poly=pts.map(p=>p[0]+","+p[1]).join(" ");
const area=poly+" "+pts[pts.length-1][0]+","+(H+2)+" "+pts[0][0]+","+(H+2);
const lp=pts[pts.length-1];
const mns=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const firstLabel=entries[0].date.getDate()+" "+mns[entries[0].date.getMonth()];
const lastLabel=entries[entries.length-1].date.getDate()+" "+mns[entries[entries.length-1].date.getMonth()];
const dotWst=pts.map(function(p,i){return i===pts.length-1?'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="4" fill="#C4607A" stroke="white" stroke-width="2"/>':'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.5" fill="rgba(196,96,122,0.4)"/>';}).join('');
const diffSign2=diff<0?'':'+';
c.innerHTML='<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="margin-top:10px;overflow:visible" preserveAspectRatio="none"><defs><linearGradient id="wstg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C4607A" stop-opacity="0.15"/><stop offset="100%" stop-color="#C4607A" stop-opacity="0"/></linearGradient></defs><polygon points="'+area+'" fill="url(#wstg)"/><polyline points="'+poly+'" fill="none" stroke="#C4607A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+dotWst+'</svg><div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px"><span style="color:#A898B0">'+firstLabel+' \u2014 '+lastLabel+'</span><span style="font-weight:700;color:'+diffColor+'">'+diffSign2+diff+' cm</span></div>';

  if(easyRuns.length>0){
    html+='<div style="background:rgba(255,255,255,0.55);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(180,160,190,0.15)">'
      +'<div style="font-size:15px;font-weight:700;color:#3D2E4A;margin-bottom:12px">Easy Run Analysis</div>';
    var paceNums=[];
    easyRuns.forEach(function(run){
      var pn=parsePace(run.pace_per_km);
      if(pn>0)paceNums.push(pn);
      var inZ=pn>0&&inZone(pn);
      var dot=inZ?'<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#2D6A4F;margin-left:6px;vertical-align:middle"></span>':'<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#DC2626;margin-left:6px;vertical-align:middle"></span>';
      html+='<div style="display:flex;align-items:center;padding:7px 0;border-bottom:0.5px solid rgba(180,160,190,0.1)">'
        +'<div style="flex:2;font-size:12px;color:#7A6B8A">'+fmtDate(run.date)+'</div>'
        +'<div style="flex:1.5;font-size:12px;color:#3D2E4A;text-align:center">'+run.distance_km+' km</div>'
        +'<div style="flex:1.5;display:flex;align-items:center;justify-content:flex-end;font-size:13px;font-weight:700;color:'+(inZ?"#2D6A4F":"#DC2626")+'">'+run.pace_per_km+'/km'+dot+'</div></div>';
    });
    if(paceNums.length>0){
      var avg=paceNums.reduce(function(a,b){return a+b;},0)/paceNums.length;
      var fastest=Math.min.apply(null,paceNums);
      var slowest=Math.max.apply(null,paceNums);
      function toStr(n){var m=Math.floor(n);var s=Math.round((n-m)*60);return m+":"+(s<10?"0":"")+s;}
      var inZoneCount=paceNums.filter(inZone).length;
      html+='<div style="display:flex;justify-content:space-around;padding:12px 0;border-bottom:0.5px solid rgba(180,160,190,0.1);margin-top:4px">'
        +'<div style="text-align:center"><div style="font-size:9px;font-weight:600;letter-spacing:1px;color:#A898B0;margin-bottom:4px">AVERAGE</div><div style="font-size:22px;font-weight:700;color:#3D2E4A">'+toStr(avg)+'</div><div style="font-size:10px;color:#A898B0">/km</div></div>'
        +'<div style="text-align:center"><div style="font-size:9px;font-weight:600;letter-spacing:1px;color:#A898B0;margin-bottom:4px">FASTEST</div><div style="font-size:22px;font-weight:700;color:#DC2626">'+toStr(fastest)+'</div><div style="font-size:10px;color:#A898B0">/km</div></div>'
        +'<div style="text-align:center"><div style="font-size:9px;font-weight:600;letter-spacing:1px;color:#A898B0;margin-bottom:4px">SLOWEST</div><div style="font-size:22px;font-weight:700;color:#2D6A4F">'+toStr(slowest)+'</div><div style="font-size:10px;color:#A898B0">/km</div></div>'
        +'</div>'
        +'<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:4px">'
        +'<div style="font-size:11px;color:#A898B0">Target zone: 5:50\u20136:10/km</div>'
        +'<div style="font-size:11px;font-weight:600;color:'+(inZoneCount>=paceNums.length*0.6?"#2D6A4F":"#B8883E")+'">'+inZoneCount+'/'+paceNums.length+' in zone</div></div>'
        +'<div style="display:flex;gap:3px">';
      paceNums.forEach(function(p){html+='<div style="flex:1;height:5px;border-radius:3px;background:'+(inZone(p)?"#2D6A4F":"#DC2626")+'"></div>';});
      html+='</div>';
    }
    html+='</div>';
    var tooFast=paceNums.filter(function(p){return p<5.83;}).length;
    if(tooFast>=Math.ceil(paceNums.length*0.5)){
      html+='<div style="background:rgba(251,191,36,0.1);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(251,191,36,0.3)">'
        +'<div style="font-size:13px;font-weight:700;color:#B8883E;margin-bottom:6px">\u26A0\uFE0F Most easy runs are too fast</div>'
        +'<div style="font-size:13px;color:#4A3D5A;line-height:1.6">'+tooFast+' of your last '+paceNums.length+' easy runs were faster than 5:50/km. This is the #1 mistake distance runners make \u2014 running easy days too hard. It feels productive but it accumulates fatigue and blunts your quality sessions. Your Tuesday speedwork and Sunday long run suffer when Wednesday and Friday aren\u2019t genuinely easy. Aim for 5:50\u20136:10/km even if it feels embarrassingly slow. You should be able to hold a full conversation.</div></div>';
    } else if(inZoneCount>=Math.ceil(paceNums.length*0.6)){
      html+='<div style="background:rgba(45,106,79,0.08);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(45,106,79,0.2)">'
        +'<div style="font-size:13px;font-weight:700;color:#2D6A4F;margin-bottom:6px">\u2705 Easy paces are on point</div>'
        +'<div style="font-size:13px;color:#4A3D5A;line-height:1.6">Most of your easy runs are hitting the 5:50\u20136:10/km target zone. This is exactly right \u2014 the aerobic base you\u2019re building now is what will carry you to sub-2:00. Keep doing this.</div></div>';
    }
  }

  // \u2500\u2500 Long Run Progression \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  if(longRuns.length>=2){
    var maxLR=Math.max.apply(null,longRuns.map(function(r){return r.distance_km||0;}));
    var latestLR=longRuns[longRuns.length-1];
    var prevKm=longRuns.length>1?(longRuns[longRuns.length-2].distance_km||0):0;
    var trend=latestLR.distance_km>prevKm?"\u2191 building":latestLR.distance_km<prevKm?"\u2193 down":"= steady";
    var totalLRkm=Math.round(longRuns.reduce(function(s,r){return s+(r.distance_km||0);},0)*10)/10;
    html+='<div style="background:rgba(255,255,255,0.55);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(180,160,190,0.15)">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">'
      +'<div style="font-size:15px;font-weight:700;color:#3D2E4A">Long run progression</div>'
      +'<div style="font-size:11px;background:rgba(107,91,138,0.1);color:#6B5B8A;padding:3px 10px;border-radius:10px;font-weight:600">'+longRuns.length+' long runs logged</div></div>'
      +'<div style="display:flex;gap:8px;margin-bottom:12px">'
      +'<div style="flex:1;background:rgba(45,106,79,0.06);border-radius:10px;padding:10px;text-align:center"><div style="font-size:9px;font-weight:600;letter-spacing:1px;color:#A898B0;margin-bottom:4px">LATEST</div><div style="font-size:24px;font-weight:700;color:#2D6A4F">'+(latestLR.distance_km||0)+'</div><div style="font-size:10px;color:#A898B0">km</div>'+(latestLR.pace_per_km?'<div style="font-size:11px;color:#7A6B8A;margin-top:2px">'+latestLR.pace_per_km+'/km</div>':"")+'</div>'
      +'<div style="flex:1;background:rgba(107,91,138,0.06);border-radius:10px;padding:10px;text-align:center"><div style="font-size:9px;font-weight:600;letter-spacing:1px;color:#A898B0;margin-bottom:4px">LONGEST EVER</div><div style="font-size:24px;font-weight:700;color:#6B5B8A">'+maxLR+'</div><div style="font-size:10px;color:#A898B0">km</div><div style="font-size:11px;color:#7A6B8A;margin-top:2px">'+trend+'</div></div>'
      +'<div style="flex:1;background:rgba(180,160,190,0.08);border-radius:10px;padding:10px;text-align:center"><div style="font-size:9px;font-weight:600;letter-spacing:1px;color:#A898B0;margin-bottom:4px">TOTAL</div><div style="font-size:24px;font-weight:700;color:#3D2E4A">'+totalLRkm+'</div><div style="font-size:10px;color:#A898B0">km</div><div style="font-size:11px;color:#7A6B8A;margin-top:2px">long run km</div></div>'
      +'</div>'
      +'<div style="display:flex;align-items:flex-end;gap:4px;height:50px;margin-bottom:4px">';
    longRuns.forEach(function(r,i){
      var km=r.distance_km||0;var h=Math.max(Math.round((km/maxLR)*100),8);var isLatest=(i===longRuns.length-1);
      html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px"><div style="font-size:8px;color:'+(isLatest?"#2D6A4F":"#A898B0")+';font-weight:'+(isLatest?"700":"400")+'">'+km+'</div><div style="width:100%;height:'+h+'%;background:'+(isLatest?"#2D6A4F":"rgba(107,91,138,0.3)")+';border-radius:2px 2px 0 0;min-height:3px"></div></div>';
    });
    html+='</div></div>';
  }

  // \u2500\u2500 Strength Progression \u2014 ALL exercises from last 8 weeks \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  // Map: {day: 1=Mon, 3=Wed, 5=Fri} \u2192 exercise index \u2192 name
  var exMap={
    1:{1:"Hip Thrust",2:"DB Sumo Squat",3:"Adductor Machine",4:"Chest Press",5:"Shoulder Press"},
    3:{1:"Romanian Deadlift",2:"Cable Kickback",3:"Abductor Machine",5:"Lat Pulldown",6:"Machine Row"},
    5:{1:"Hip Thrust (Fri)",2:"Single-leg Hip Thrust",3:"DB Lateral Lunge",4:"Face Pulls",5:"Bicep Curl"}
  };

  // Scan last 56 days
  var exData={};
  var sd=new Date(currentDate);
  for(var di=0;di<56;di++){
    var dk="tp-exlog-"+sd.getFullYear()+"-"+(sd.getMonth()+1)+"-"+sd.getDate();
    var sdow=sd.getDay();
    var dayMap=exMap[sdow];
    if(dayMap){
      try{
        var lg=JSON.parse(localStorage.getItem(dk)||"{}");
        var ds2=("0"+sd.getDate()).slice(-2)+"/"+(sd.getMonth()+1);
        Object.keys(dayMap).forEach(function(idx){
          var exName=dayMap[idx];
          if(lg[idx]&&lg[idx].w&&parseFloat(lg[idx].w)>0){
            if(!exData[exName])exData[exName]=[];
            exData[exName].unshift({d:ds2,w:parseFloat(lg[idx].w)||0,r:lg[idx].r||""});
          }
        });
      }catch(e){}
    }
    sd.setDate(sd.getDate()-1);
  }

  var exNames=Object.keys(exData).filter(function(n){return exData[n].length>0;});

  if(exNames.length>0){
    // Group by session
    var saEx=["Hip Thrust","DB Sumo Squat","Adductor Machine","Chest Press","Shoulder Press"];
    var sbEx=["Romanian Deadlift","Cable Kickback","Abductor Machine","Lat Pulldown","Machine Row"];
    var scEx=["Hip Thrust (Fri)","Single-leg Hip Thrust","DB Lateral Lunge","Face Pulls","Bicep Curl"];

    function renderExSection(sessionName,exList,color){
      var hasData=exList.filter(function(n){return exData[n]&&exData[n].length>0;});
      if(!hasData.length)return'';
      var h='<div style="background:rgba(255,255,255,0.55);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(180,160,190,0.15)">'
        +'<div style="font-size:15px;font-weight:700;color:#3D2E4A;margin-bottom:12px">'+sessionName+'</div>';
      hasData.forEach(function(exName){
        var data=exData[exName];
        if(data.length<1)return;
        var maxW=Math.max.apply(null,data.map(function(d){return d.w;}));
        var minW=Math.min.apply(null,data.map(function(d){return d.w;}));
        var rng=maxW-minW||1;
        var latest=data[data.length-1];
        var gain=data.length>1?Math.round((latest.w-data[0].w)*10)/10:0;
        h+='<div style="margin-bottom:12px">'
          +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">'
          +'<div style="font-size:13px;font-weight:600;color:#3D2E4A">\uD83D\uDCAA '+exName+'</div>'
          +'<div style="font-size:12px;color:'+(gain>0?color:gain<0?"#DC2626":"#A898B0")+'">'+latest.w+' kg'+(data.length>1?' ('+(gain>0?"+":"")+gain+' kg)':'')+'</div>'
          +'</div>'
          +'<div style="display:flex;align-items:flex-end;gap:3px;height:50px">';
        data.forEach(function(d,i){
          var barH=Math.max(Math.round(((d.w-minW)/rng)*60+15),5);
          var isLatest=(i===data.length-1);
          h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">'
            +'<div style="font-size:7px;color:'+(isLatest?color:"#C0B0CC")+';font-weight:'+(isLatest?"700":"400")+'">'+d.w+'</div>'
            +'<div style="width:100%;height:'+barH+'px;background:'+(isLatest?color:"rgba(107,91,138,0.2)")+';border-radius:2px 2px 0 0"></div>'
            +'<div style="font-size:7px;color:#C0B0CC">'+d.d+'</div>'
            +'</div>';
        });
        h+='</div>'+(data.length>1?'<div style="font-size:10px;color:#A898B0;margin-top:3px">'+data.length+' sessions logged</div>':"")+'</div>';
      });
      h+='</div>';
      return h;
    }

    html+='<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:#A898B0;margin:14px 0 8px">STRENGTH PROGRESSION</div>';
    html+=renderExSection("\uD83D\uDCAA Strength A \u2014 Mon (Glute + Push)",saEx,"#8B5CF6");
    html+=renderExSection("\uD83D\uDCAA Strength B \u2014 Wed (Posterior + Pull)",sbEx,"#2D6A4F");
    html+=renderExSection("\uD83D\uDCAA Strength C \u2014 Fri (Glute + Arms)",scEx,"#6B5B8A");
  } else {
    html+='<div style="background:rgba(255,255,255,0.55);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid rgba(180,160,190,0.15)">'
      +'<div style="font-size:15px;font-weight:700;color:#3D2E4A;margin-bottom:8px">Strength Progression</div>'
      +'<div style="font-size:13px;color:#A898B0;line-height:1.6">Log weights in your daily gym sessions to track progressive overload here. Each exercise you log will show a bar chart of your progress over the last 8 weeks.</div>'
      +'</div>';
  }

  html+='</div>';
  cv.innerHTML=html;
}

try{if(!localStorage.getItem("tp-move-cleanup-v3")){for(let ci=localStorage.length-1;ci>=0;ci--){const ck=localStorage.key(ci);if(ck&&ck.startsWith("tp-moved"))localStorage.removeItem(ck)}localStorage.setItem("tp-move-cleanup-v3","done")}}catch(e){}

window.addEventListener('error',function(e){
  if(!e||!e.message)return;
  var m=e.message.toLowerCase();
  if(m.indexOf('notfounderror')>=0||m.indexOf('can not be found')>=0||m.indexOf('cannot find')>=0||m.indexOf('hierarchyrequesterror')>=0)return;
  var d=document.getElementById('content');
  if(d)d.innerHTML='<div style="padding:20px;color:red;font-size:12px;font-family:monospace"><b>JS ERROR:</b><br>'+(e.message)+'<br>Line: '+(e.lineno)+'</div>';
});
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', function(){
    try{render();}catch(e){
      var d=document.getElementById('dashboard');
      if(d){d.style.display='block';d.innerHTML='<div style="padding:20px;color:red;font-size:13px">RENDER ERROR: '+e.message+'</div>';}
    }
  });
} else {
  try{render();}catch(e){
    var d=document.getElementById('dashboard');
    if(d){d.style.display='block';d.innerHTML='<div style="padding:20px;color:red;font-size:13px">RENDER ERROR: '+e.message+'</div>';}
  }
}
</script>
</body>
</html>
