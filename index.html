<!DOCTYPE html>

<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:520px;margin:0 auto;-webkit-tap-highlight-color:transparent;min-height:100vh}
.header{background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:10}
.label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;margin-bottom:4px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nav button{background:rgba(255,255,255,0.08);border:none;border-radius:8px;padding:8px 14px;color:#e0e0e0;cursor:pointer;font-size:16px;-webkit-appearance:none}
.nav button:active{background:rgba(255,255,255,0.15)}
.date-display{text-align:center;font-size:18px;font-weight:700;color:#f8fafc}
.quick-nav{display:flex;gap:6px}
.quick-nav button{flex:1;padding:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#94a3b8;cursor:pointer;-webkit-appearance:none}
.quick-nav button:active{background:rgba(255,255,255,0.12)}
.quick-nav .race-btn{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:#fca5a5}
.block-info{margin-top:12px;padding:10px 12px;border-radius:8px}
.block-name{font-size:14px;font-weight:700}
.block-detail{font-size:12px;color:#9ca3af;margin-top:2px}
.content{padding:16px;display:flex;flex-direction:column;gap:14px}
.race-banner{text-align:center;padding:16px;background:linear-gradient(135deg,#7f1d1d,#991b1b,#7f1d1d);border-radius:12px;border:2px solid #f87171}
.race-banner .icon{font-size:28px;margin-bottom:4px}
.race-banner .title{font-size:18px;font-weight:800;color:#fca5a5;letter-spacing:1px}
.race-banner .sub{font-size:13px;color:#fecaca;margin-top:4px}
.run-card{border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,0.08)}
.run-card.normal{background:linear-gradient(135deg,#1e3a5f,#1e4976)}
.run-card.race{background:linear-gradient(135deg,#7f1d1d,#991b1b);border-color:#f87171}
.run-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.run-type{font-size:16px;font-weight:700}
.run-type.normal{color:#93c5fd}
.run-type.race{color:#fca5a5}
.run-km{font-size:13px;font-weight:600;background:rgba(255,255,255,0.12);padding:3px 10px;border-radius:20px;color:#e0e0e0}
.run-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.run-label{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px}
.run-value{font-size:14px;color:#f0f0f0;font-weight:600}
.run-note{margin-top:10px;font-size:13px;color:#d1d5db;line-height:1.5;border-top:1px solid rgba(255,255,255,0.08);padding-top:8px}
.strength-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,0.08)}
.strength-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.strength-name{font-size:16px;font-weight:700;color:#a78bfa}
.strength-dur{font-size:12px;color:#9ca3af;background:rgba(255,255,255,0.08);padding:3px 8px;border-radius:12px}
.exercise{display:grid;grid-template-columns:22px 1fr auto;gap:4px 10px;padding:10px 14px;border-radius:8px;border-left:3px solid rgba(255,255,255,0.1);align-items:start}
.exercise:nth-child(odd){background:rgba(255,255,255,0.04)}
.ex-name{font-weight:600;color:#f0f0f0;font-size:14px}
.ex-sets{color:#93c5fd;font-weight:600;font-size:14px;text-align:right;white-space:nowrap}
.ex-tags{grid-column:2/-1;display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.tag{font-size:12px;padding:2px 8px;border-radius:4px}
.tag-load{background:rgba(147,197,253,0.15);color:#93c5fd}
.tag-tempo{background:rgba(251,191,36,0.15);color:#fbbf24}
.tag-note{font-size:12px;color:#9ca3af;font-style:italic}
.other-card{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 16px;border:1px solid rgba(255,255,255,0.06)}
.other-card.pilates{background:linear-gradient(135deg,rgba(236,72,153,0.12),rgba(219,39,119,0.08));border:1px solid rgba(236,72,153,0.25)}
.other-label{font-size:13px;color:#9ca3af}
.other-label.pilates{color:#f9a8d4;font-weight:600}
.other-text{font-size:14px;color:#e0e0e0;font-weight:500;margin-top:2px}
.other-text.pilates{color:#fce7f3}
.notes-card{background:rgba(251,191,36,0.08);border-radius:12px;padding:12px 16px;border:1px solid rgba(251,191,36,0.2)}
.notes-title{font-size:13px;color:#fbbf24;font-weight:600;margin-bottom:4px}
.notes-text{font-size:13px;color:#d1d5db;line-height:1.5}
.rest-card{text-align:center;padding:40px 20px;background:rgba(255,255,255,0.03);border-radius:12px}
.rest-icon{font-size:32px;margin-bottom:8px}
.rest-title{font-size:16px;font-weight:600;color:#64748b}
.rest-sub{font-size:13px;color:#475569;margin-top:4px}
.ex-form{grid-column:2/-1;margin-top:6px;padding:8px 10px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15);border-radius:6px}
.ex-form-text{font-size:12px;color:#a7f3d0;line-height:1.5}
.ex-video-link{display:inline-block;margin-top:6px;font-size:12px;font-weight:600;color:#34d399;text-decoration:none;padding:3px 10px;background:rgba(16,185,129,0.15);border-radius:4px;border:1px solid rgba(16,185,129,0.25)}
.ex-video-link:active{background:rgba(16,185,129,0.25)}
.fuel-card{margin-top:10px;padding:10px 12px;background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.2);border-radius:8px}
.fuel-title{font-size:13px;font-weight:700;color:#fb923c;margin-bottom:6px}
.fuel-row{font-size:12px;color:#d1d5db;line-height:1.6;margin-bottom:4px}
.fuel-label{font-weight:600;color:#fdba74}
.ex-check{display:flex;align-items:center;justify-content:center;width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid rgba(255,255,255,0.2);cursor:pointer;transition:all 0.2s;grid-row:1}
.ex-check.done{background:#10b981;border-color:#10b981}
.ex-check.done::after{content:"✓";color:white;font-size:13px;font-weight:700}
.exercise.checked .ex-name,.exercise.checked .ex-sets{opacity:0.4;text-decoration:line-through}
.run-check-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08);cursor:pointer}
.run-check-box{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.run-check-box.done{background:#10b981;border-color:#10b981}
.run-check-box.done::after{content:"✓";color:white;font-size:13px;font-weight:700}
.run-check-label{font-size:13px;color:#9ca3af}
.run-check-label.done{color:#10b981;font-weight:600}
.treadmill-card{background:linear-gradient(135deg,rgba(234,179,8,0.1),rgba(202,138,4,0.08));border-radius:12px;padding:16px;border:1px solid rgba(234,179,8,0.2)}
.treadmill-header{font-size:16px;font-weight:700;color:#fbbf24;margin-bottom:8px}
.treadmill-detail{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.treadmill-note{font-size:12px;color:#d1d5db;line-height:1.5}
.steps-card{background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(79,70,229,0.08));border-radius:12px;padding:14px 16px;border:1px solid rgba(99,102,241,0.25)}
.steps-header{font-size:16px;font-weight:700;color:#a5b4fc;margin-bottom:4px}
.steps-target{font-size:14px;color:#c7d2fe;font-weight:500;margin-bottom:4px}
</style>
</head>

const FORM={
"Banded glute bridge (warm-up)":{form:"Feet flat, hip-width. Drive through heels, not toes. Squeeze glutes at top — imagine cracking a walnut between your cheeks. Don't arch lower back.",link:"https://www.youtube.com/watch?v=GmRSV_n2E_0"},
"Hip thrust (booty builder)":{form:"Set up with shoulder blades on the pad edge. Chin tucked, look forward not up. Drive through heels. At lockout, ribs down, pelvis tucked — posterior pelvic tilt. No lower back extension. Pause 2 sec and squeeze hard at top.",link:"https://www.youtube.com/watch?v=xDmFkJxPzeM"},
"Cable pull-through":{form:"Face away from cable, straddle the rope. Soft knee bend — this is a hip hinge, not a squat. Push hips back until you feel hamstring stretch, then snap hips forward and squeeze glutes hard. Arms are just hooks.",link:"https://www.youtube.com/watch?v=AhmEpyDMEEE"},
"Bulgarian split squat (light)":{form:"Rear foot laces-down on bench. Front foot far enough forward that your knee stays behind toes. Lean torso forward 30° for glute emphasis. Drive through front heel. Keep hips square — don't rotate.",link:"https://www.youtube.com/watch?v=2C-uNgKwPLE"},
"DB bench press":{form:"Retract shoulder blades — squeeze them together and down. Slight arch in upper back, feet flat on floor. Lower DBs to chest level with elbows at ~45° (not flared 90°). Press up and slightly inward.",link:"https://www.youtube.com/watch?v=VmB1G1K7v94"},
"Bench press (barbell)":{form:"Retract shoulder blades, slight upper back arch. Grip just outside shoulders. Bar path: lower to mid-chest, press back up toward face in a slight arc. Elbows ~45° — not flared wide.",link:"https://www.youtube.com/watch?v=rT7DgCr-3pg"},
"DB shoulder press":{form:"Seated or standing. Start with DBs at ear height, palms forward. Press straight up — don't let the weights drift forward. Brace core, don't arch back. Lower controlled to ear level.",link:"https://www.youtube.com/watch?v=qEwKCR5JCog"},
"Tricep pushdowns":{form:"Stand close to cable, slight forward lean. Pin elbows to your sides — they don't move. Extend forearms down, squeeze triceps at bottom. Slow return. If elbows swing, the weight is too heavy.",link:"https://www.youtube.com/watch?v=2-LAMcpzODU"},
"Pallof press":{form:"Stand side-on to cable at chest height. Hold handle at chest. Press straight out — resist the rotation. Arms fully extended, hold 1 sec, return. Your core is fighting the cable's pull. No twisting.",link:"https://www.youtube.com/watch?v=AH_QZLm_0-s"},
"Banded clamshells (warm-up)":{form:"Side-lying, band above knees, heels together. Open top knee like a clamshell — rotate from the hip, not the lower back. Keep hips stacked vertically. Slow and controlled, feel it in the side of your glute.",link:"https://www.youtube.com/watch?v=cEaCnbGKmMQ"},
"Single-leg glute bridge":{form:"Back flat on floor, one foot planted, other leg extended or knee held to chest. Drive through the planted heel. Hips level — don't let the free side drop. Squeeze glute at top for 2 sec.",link:"https://www.youtube.com/watch?v=AVAXhy6pl7o"},
"Romanian deadlift":{form:"Feet hip-width, soft knees (slight bend, locked in position). Push hips BACK — the bar slides down your thighs. Feel the hamstring stretch. Back stays flat — the moment it rounds, that's your range of motion. Drive hips forward to return.",link:"https://www.youtube.com/watch?v=JCXUYuzwNrM"},
"Good mornings (light)":{form:"Bar on upper back (like a squat), feet hip-width. Soft knees, hinge at hips — push them back. Lower until torso is close to parallel. Flat back throughout. This is controlled and light — it's for injury prevention, not ego.",link:"https://www.youtube.com/watch?v=YA-h3n9L4YU"},
"Cable kickback":{form:"Face the cable, ankle strap on. Slight forward lean, brace core. Extend leg straight back — squeeze glute at the top. Don't arch your lower back to get more range. Controlled, no swinging.",link:"https://www.youtube.com/watch?v=dXMvr3uMmDc"},
"Nordic curl eccentric":{form:"Kneel on a pad, anchor your ankles (under a bar or have someone hold them). Hands ready to catch yourself. Slowly lower your body forward — fight gravity with your hamstrings for a full 5-sec count. Push back up with your hands. You're training the lowering phase only.",link:"https://www.youtube.com/watch?v=BpKadYwbGPo"},
"Lat pulldown":{form:"Grip just wider than shoulders. Lean back slightly (~15°). Pull the bar to your upper chest — lead with your elbows, drive them down and back. Squeeze your shoulder blades together at the bottom. Control the return.",link:"https://www.youtube.com/watch?v=CAwf7n6Luuc"},
"Seated cable row":{form:"Sit tall, slight knee bend. Pull handle to lower ribcage — drive elbows straight back. Squeeze shoulder blades together for 1 sec. Don't lean back to cheat — your torso stays still. Control the release.",link:"https://www.youtube.com/watch?v=GZbfZ033f74"},
"Bicep curls":{form:"Stand with elbows pinned to your sides. Curl up, rotating palms toward shoulders. Don't swing — if your torso rocks, the weight is too heavy. Slow lowering (2–3 sec eccentric).",link:"https://www.youtube.com/watch?v=ykJmrZ5v0Oo"},
"Dead bug":{form:"Lie on back, arms straight up, knees at 90°. Press lower back into the floor — it must NOT leave the ground. Extend opposite arm and leg simultaneously. Breathe out as you extend. If your back lifts, you've gone too far.",link:"https://www.youtube.com/watch?v=I5xbsA71v1A"},
"Banded lateral walks":{form:"Band just above knees (or ankles for harder). Quarter-squat position — stay low throughout. Step sideways, leading with the heel. Keep toes forward, don't let knees cave in. Feel the burn in the side of your glutes (gluteus medius).",link:"https://www.youtube.com/watch?v=zTOPFZrekbE"},
"Single-leg hip thrust":{form:"Shoulder blades on bench, one foot planted, other leg extended. Drive through the planted heel. At the top: ribs down, squeeze glute, hold 1–2 sec. Keep hips level. If you feel it in your lower back, reset your pelvis position.",link:"https://www.youtube.com/watch?v=BXKB1YE5ufY"},
"Single-leg hip thrust (weighted)":{form:"Same as bodyweight version but with a plate on your hip. Shoulder blades on bench, one foot planted. Drive through heel, squeeze at top with posterior pelvic tilt. Hold 1–2 sec. Keep hips level.",link:"https://www.youtube.com/watch?v=BXKB1YE5ufY"},
"Step-ups (low box)":{form:"Forward lean of ~20° — this shifts the load onto your glute instead of your quad. Step up driving through the heel of the working leg. Do NOT push off the back foot — that's cheating. Stand fully, squeeze glute, then lower controlled.",link:"https://www.youtube.com/watch?v=dQqApCGd5Ss"},
"Abductor machine":{form:"Sit tall with back against the pad — don't lean back or forward. Push knees apart against the pads, driving from the glutes. Squeeze hard at full open and hold 1 sec. Control the return — don't let the weight slam. You should feel this in the side of your glutes, not your hip flexors.",link:"https://www.youtube.com/watch?v=GNwKUo2FYGE"},
"Adductor machine":{form:"Sit tall, back against pad. Squeeze knees together against the pads, driving from your inner thighs. Hold at full close for 1 sec. Slow release — don't let the weight pull your legs apart. Keep your core braced throughout.",link:"https://www.youtube.com/watch?v=1e0dqMnkXYI"},
"Frog pump":{form:"Lie on back, soles of feet together, knees out wide (like a frog). Drive hips up squeezing glutes hard at top. Short range of motion — this is about the squeeze, not the height. High reps, constant tension.",link:"https://www.youtube.com/watch?v=3idsBMaqsR4"},
"Plank hold":{form:"Forearms and toes. Body in a straight line — no sagging hips, no piking up. Tuck your pelvis slightly (posterior tilt). Squeeze glutes, brace core like you're about to be punched. Breathe normally. If your form breaks, the set is over.",link:"https://www.youtube.com/watch?v=ASdvN_XEl_c"},
"Plank variations":{form:"Start with standard forearm plank. Progress to shoulder taps, plank walks, or plank with leg lift. Key cue for all: pelvis tucked, glutes engaged, no hip rocking side to side during variations.",link:"https://www.youtube.com/watch?v=ASdvN_XEl_c"},
"Bird dog":{form:"On all fours, wrists under shoulders, knees under hips. Extend opposite arm and leg simultaneously — reach long. Keep hips level (put a water bottle on your lower back — it shouldn't fall). Pause 2 sec extended, return controlled.",link:"https://www.youtube.com/watch?v=wiFNA3sqjCA"},
"Single-leg calf raises":{form:"Stand on the edge of a step on one foot. Lower heel below the step for full stretch. Rise up onto your toes, pause 1 sec at the top. Slow lowering. Hold a wall for balance if needed. Full range of motion matters here.",link:"https://www.youtube.com/watch?v=OsTQ4GKMMVU"},
"Face pulls":{form:"Cable at face height, rope attachment. Pull toward your face, splitting the rope — hands finish beside your ears. Elbows high, squeeze shoulder blades together. This is a rear delt/rotator cuff exercise — keep it light.",link:"https://www.youtube.com/watch?v=V8dZ3pyiCBo"},
"Incline treadmill walk":{form:"Set incline to 10–12%, speed 5.5–6.5 km/h. Walk tall — don't lean on the console or hold the handrails. Swing your arms naturally. Push through your heels on each step to engage glutes. You should feel this in your glutes and hamstrings, not your calves. If you're gripping the rails, drop the incline or speed.",link:"https://www.youtube.com/watch?v=aTxEJG2L-GI"},
};

// Normalize exercise name for lookup (strip weighted/barbell variants)
function getForm(name){
if(FORM[name])return FORM[name];
// Try partial matches
for(const k in FORM){if(name.includes(k)||k.includes(name))return FORM[k]}
return null;
}

function renderExercise(ex,i){
const f=getForm(ex.name);
let tags="";
if(ex.load)tags+=`<span class="tag tag-load">⚖️ ${ex.load}</span>`;
if(ex.tempo)tags+=`<span class="tag tag-tempo">⏱️ ${ex.tempo}</span>`;
if(ex.note)tags+=`<span class="tag-note">${ex.note}</span>`;

let formHtml="";
if(f){
formHtml=`<div class="ex-form"><div class="ex-form-text">📐 ${f.form}</div>${f.link?`<a href="${f.link}" target="_blank" rel="noopener" class="ex-video-link">▶ Watch form video</a>`:""}</div>`;
}

return`<div class="exercise" id="ex-${i}" style="${i%2===0?"background:rgba(255,255,255,0.04)":""}"><div class="ex-check" onclick="toggleEx(${i})"></div><div class="ex-name">${ex.name}</div><div class="ex-sets">${ex.sets} × ${ex.reps}</div>${tags?`<div class="ex-tags">${tags}</div>`:""}${formHtml}</div>`;
}

function getFuel(r){
if(!r||r.type.includes("RACE"))return null;
const km=parseFloat(r.km)||0;
const isQuality=r.int&&(r.int.includes("3")||r.int.includes("4")||r.int.includes("5"));
const isTempo=r.type.toLowerCase().includes("tempo")||r.type.toLowerCase().includes("interval")||r.type.toLowerCase().includes("hill")||r.type.toLowerCase().includes("speed");
const isLong=r.type.toLowerCase().includes("long");
const isRecovery=r.type.toLowerCase().includes("recovery")||r.type.toLowerCase().includes("opener");

let pre="",during="",after="";

if(km<=5&&!isTempo){
// Short easy run
pre="☕ Optional: coffee + small banana or nothing if running within 60 min of waking. Stay hydrated.";
during="💧 No fuel needed. Sip water if hot.";
after="🥛 Glass of water + small snack if hungry. No rush on recovery meal.";
}else if(km<=7&&!isTempo){
// Medium easy run
pre="🍌 Small banana or toast with honey 30–60 min before. Coffee fine.";
during="💧 No fuel needed. Carry water if hot/humid.";
after="🥛 20–30g protein within 45 min (yoghurt + fruit, protein shake, eggs on toast).";
}else if(isTempo||isQuality){
// Quality session (tempo, intervals, hills, speed)
pre="🍞 Carb-rich snack 60–90 min before: toast + banana, oats, or rice cakes with honey. You need fuel for intensity.";
during=km>8?"💧 Carry water. If session is 60+ min, consider a gel or 2–3 chews at the halfway mark.":"💧 Carry water. No gel needed for sessions under 60 min.";
after="🥛 Recovery meal within 30 min: 20–30g protein + carbs. E.g. protein shake + banana, eggs on toast, yoghurt + granola.";
}else if(isLong&&km>=14){
// Long run 14km+
pre="🍚 Proper meal 2–3 hrs before: oats with banana + honey, toast with PB, or rice + eggs. This is your fuel tank.";
during=km>=16?"⚡ Gel or chews at km 7 and km 14. Water every 3–4 km. PRACTISE this now — don't try new fuel on race day.":"💧 Water every 3–4 km. Optional: 1 gel at km 8–10 if going beyond 75 min.";
after="🥛 Recovery meal within 30 min: protein + carbs + electrolytes. E.g. protein shake + banana + pinch of salt, or a proper meal.";
}else if(isLong||km>=10){
// Moderate long run 10-13km
pre="🍌 Toast + banana or oats 60–90 min before. Don't skip this.";
during="💧 Carry water. If running 75+ min, take 1 gel or a few chews at ~45 min.";
after="🥛 20–30g protein + carbs within 45 min. Chocolate milk works in a pinch.";
}else if(isRecovery){
pre="☕ Light or nothing. This is a jog, not a session.";
during="💧 Sip water if needed.";
after="🥛 Normal meal timing, no rush.";
}else{
// Default medium run
pre="🍌 Small snack 30–60 min before if needed. Coffee fine.";
during="💧 Carry water if warm. No fuel needed under 60 min.";
after="🥛 20–30g protein within 45 min.";
}

return{pre,during,after};
}

function renderRun(r){
if(!r)return"";
const isRace=r.type.includes("RACE");
let fuelHtml="";
const fuel=getFuel(r);
if(fuel){
fuelHtml=`<div class="fuel-card"><div class="fuel-title">🍽️ Fuelling</div><div class="fuel-row"><span class="fuel-label">Before:</span> ${fuel.pre}</div><div class="fuel-row"><span class="fuel-label">During:</span> ${fuel.during}</div><div class="fuel-row"><span class="fuel-label">After:</span> ${fuel.after}</div></div>`;
}
return`<div class="run-card ${isRace?"race":"normal"}"><div class="run-header"><div class="run-type ${isRace?"race":"normal"}">${isRace?"🏁 ":"🏃‍♀️ "}${r.type}</div><div class="run-km">${r.km} km</div></div><div class="run-grid"><div><div class="run-label">Pace</div><div class="run-value">${r.pace}</div></div><div><div class="run-label">Intensity</div><div class="run-value">${r.int}</div></div></div>${r.note?`<div class="run-note">${r.note}</div>`:""}${fuelHtml}<div class="run-check-row" onclick="toggleRun()"><div class="run-check-box" id="run-check"></div><div class="run-check-label" id="run-label">Mark run complete</div></div></div>`;
}

function renderStrength(s){
if(!s)return"";
return`<div class="strength-card"><div class="strength-header"><div class="strength-name">💪 ${s.name}</div><div class="strength-dur">${s.duration}</div></div><div style="display:flex;flex-direction:column;gap:4px">${s.exercises.map((e,i)=>renderExercise(e,i)).join("")}<div class="run-check-row" onclick="toggleStrength()"><div class="run-check-box" id="str-check"></div><div class="run-check-label" id="str-label">Mark session complete</div></div></div></div>`+renderTreadmill();
}

function renderTreadmill(){
return`<div class="treadmill-card"><div class="treadmill-header">🚶‍♀️ Incline Treadmill Walk — 30 min</div><div class="treadmill-detail"><span class="tag tag-load">📐 10–12% incline, 5.5–6.5 km/h</span></div><div class="treadmill-note">Finish every gym session with this. Don't hold the handrails — swing your arms. Strong glute drive on the incline.</div><div class="run-check-row" onclick="toggleTreadmill()"><div class="run-check-box" id="tm-check"></div><div class="run-check-label" id="tm-label">Mark treadmill complete</div></div></div>`;
}

function render(){
$("dateDisplay").textContent=fmt(currentDate);
const plan=getPlan(currentDate);
const bi=$("blockInfo");
let html="";

if(plan.block){
bi.style.display="block";
bi.style.background=plan.block.color+"22";
bi.style.border="1px solid "+plan.block.color+"44";
bi.innerHTML=`<div class="block-name" style="color:${plan.block.color}">${plan.block.name}</div><div class="block-detail">Week ${plan.week} of ${plan.block.weeks} • ${plan.block.weeklyKm} km/week • ${plan.block.focus}</div>`;
}else{
bi.style.display="none";
}

if(plan.race){
html+=`<div class="race-banner"><div class="icon">🏁</div><div class="title">RACE DAY</div><div class="sub">Trust the work. Execute the plan.</div></div>`;
}

html+=renderRun(plan.run);
html+=renderStrength(plan.str);

if(plan.other){
const isPilates=plan.other.toLowerCase().includes("pilates");
const emoji=isPilates?"🧘‍♀️ ":"";
const label=isPilates?"Pilates":"Also today";
html+=`<div class="other-card ${isPilates?"pilates":""}"><div class="other-label ${isPilates?"pilates":""}">${emoji}${label}</div><div class="other-text ${isPilates?"pilates":""}">${plan.other}</div>${isPilates?`<div class="run-check-row" onclick="togglePilates()"><div class="run-check-box" id="pil-check"></div><div class="run-check-label" id="pil-label">Mark Pilates complete</div></div>`:""}</div>`;
}

if(plan.notes&&plan.notes.length){
html+=`<div class="notes-card"><div class="notes-title">📝 Notes</div>${plan.notes.map(n=>`<div class="notes-text">${n}</div>`).join("")}</div>`;
}

if(!plan.run&&!plan.str&&!plan.other&&(!plan.notes||!plan.notes.length)){
if(plan.block){
html+=`<div class="rest-card"><div class="rest-icon">😴</div><div class="rest-title">Rest Day</div><div class="rest-sub">Recovery is training. Foam roll, stretch, eat well.</div></div>`;
}else{
html+=`<div class="rest-card"><div class="rest-title">${plan.message||"No training scheduled."}</div><div class="rest-sub">Navigate to Apr 2026 – Aug 2027</div></div>`;
}
}

$("content").innerHTML=html;

// Always add steps card (every day, even rest days)
const stepsHtml=`<div class="steps-card"><div class="steps-header">👟 Daily Steps</div><div class="steps-target">Target: 14,000 steps</div><div class="run-check-row" onclick="toggleSteps()"><div class="run-check-box" id="steps-check"></div><div class="run-check-label" id="steps-label">Mark 14k steps complete</div></div></div>`;
$("content").innerHTML+=stepsHtml;

restoreChecks();
}

function nav(days){const d=new Date(currentDate);d.setDate(d.getDate()+days);currentDate=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);render()}
$("prev").onclick=()=>nav(-1);
$("next").onclick=()=>nav(1);
$("goToday").onclick=()=>{const n=new Date();currentDate=new Date(n.getFullYear(),n.getMonth(),n.getDate(),12,0,0);render()};
$("goStart").onclick=()=>{currentDate=new Date(2026,2,30,12,0,0);render()};
$("goRace").onclick=()=>{currentDate=new Date(2026,4,3,12,0,0);render()};

// Checkbox state storage (persists while app is open)
const checkState={};
function dateKey(d){return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
function getState(){const k=dateKey(currentDate);if(!checkState[k])checkState[k]={ex:{},run:false,str:false,pil:false,tm:false,steps:false};return checkState[k]}
function saveEx(i,done){getState().ex[i]=done}
function saveRun(done){getState().run=done}
function saveStr(done){getState().str=done}
function savePil(done){getState().pil=done}

function restoreChecks(){
const s=getState();
// Restore exercise checks
Object.keys(s.ex).forEach(i=>{
const el=$("ex-"+i);
if(el&&s.ex[i]){el.querySelector(".ex-check").classList.add("done");el.classList.add("checked")}
});
// Restore run check
const rc=$("run-check"),rl=$("run-label");
if(rc&&s.run){rc.classList.add("done");rl.classList.add("done");rl.textContent="Run complete ✓"}
// Restore strength check
const sc=$("str-check"),sl=$("str-label");
if(sc&&s.str){sc.classList.add("done");sl.classList.add("done");sl.textContent="Session complete ✓"}
// Restore pilates check
const pc=$("pil-check"),pl=$("pil-label");
if(pc&&s.pil){pc.classList.add("done");pl.classList.add("done");pl.textContent="Pilates complete ✓"}
// Restore treadmill check
const tc=$("tm-check"),tl=$("tm-label");
if(tc&&s.tm){tc.classList.add("done");tl.classList.add("done");tl.textContent="Treadmill complete ✓"}
// Restore steps check
const stc=$("steps-check"),stl=$("steps-label");
if(stc&&s.steps){stc.classList.add("done");stl.classList.add("done");stl.textContent="14k steps complete ✓"}
}

// Checkbox toggles
function toggleEx(i){
const el=$("ex-"+i);
const ch=el.querySelector(".ex-check");
const done=ch.classList.toggle("done");
el.classList.toggle("checked",done);
saveEx(i,done);
}
function toggleRun(){
const ch=$("run-check");
const lb=$("run-label");
const done=ch.classList.toggle("done");
lb.classList.toggle("done",done);
lb.textContent=done?"Run complete ✓":"Mark run complete";
saveRun(done);
}
function toggleStrength(){
const ch=$("str-check");
const lb=$("str-label");
const done=ch.classList.toggle("done");
lb.classList.toggle("done",done);
lb.textContent=done?"Session complete ✓":"Mark session complete";
saveStr(done);
}
function togglePilates(){
const ch=$("pil-check");
const lb=$("pil-label");
if(!ch)return;
const done=ch.classList.toggle("done");
lb.classList.toggle("done",done);
lb.textContent=done?"Pilates complete ✓":"Mark Pilates complete";
savePil(done);
}
function toggleTreadmill(){
const ch=$("tm-check");
const lb=$("tm-label");
if(!ch)return;
const done=ch.classList.toggle("done");
lb.classList.toggle("done",done);
lb.textContent=done?"Treadmill complete ✓":"Mark treadmill complete";
getState().tm=done;
}
function toggleSteps(){
const ch=$("steps-check");
const lb=$("steps-label");
if(!ch)return;
const done=ch.classList.toggle("done");
lb.classList.toggle("done",done);
lb.textContent=done?"14k steps complete ✓":"Mark 14k steps complete";
getState().steps=done;
}

render();
</script>

</body>
</html>
