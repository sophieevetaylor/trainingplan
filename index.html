<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Daily Training Plan</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#FDF2F5 0%,#F0ECF8 40%,#EBE8F5 100%);color:#3D2E4A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:520px;margin:0 auto;-webkit-tap-highlight-color:transparent;min-height:100vh}
.header{background:linear-gradient(135deg,#F8EEF2,#EDE6F2);padding:20px 16px 16px;border-bottom:1px solid rgba(180,160,190,0.2);position:sticky;top:0;z-index:10;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#B8A5C0;margin-bottom:4px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nav button{background:rgba(255,255,255,0.5);border:none;border-radius:8px;padding:8px 14px;color:#6B5B8A;cursor:pointer;font-size:16px;-webkit-appearance:none}
.nav button:active{background:rgba(255,255,255,0.7)}
.date-display{text-align:center;font-size:18px;font-weight:700;color:#3D2E4A}
.quick-nav{display:flex;gap:6px}
.quick-nav button{flex:1;padding:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.45);border:1px solid rgba(180,160,190,0.2);border-radius:6px;color:#8A7A9E;cursor:pointer;-webkit-appearance:none}
.quick-nav button:active{background:rgba(255,255,255,0.65)}
.quick-nav .race-btn{background:rgba(196,96,122,0.12);border-color:rgba(196,96,122,0.25);color:#C4607A}
.block-info{margin-top:12px;padding:10px 12px;border-radius:8px}
.block-name{font-size:14px;font-weight:700}
.block-detail{font-size:12px;color:#A898B0;margin-top:2px}
.content{padding:16px;display:flex;flex-direction:column;gap:14px}
.race-banner{text-align:center;padding:16px;background:linear-gradient(135deg,#D4607A,#C4507A,#D4607A);border-radius:12px;border:2px solid #E8889E}
.race-banner .icon{font-size:28px;margin-bottom:4px}
.race-banner .title{font-size:18px;font-weight:800;color:#FFF0F3;letter-spacing:1px}
.race-banner .sub{font-size:13px;color:#FDDDE5;margin-top:4px}
.run-card{border-radius:14px;padding:16px;border:0.5px solid rgba(180,160,190,0.2)}
.run-card.normal{background:rgba(255,255,255,0.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.run-card.race{background:linear-gradient(135deg,rgba(196,96,122,0.15),rgba(196,80,122,0.1));border-color:rgba(196,96,122,0.3)}
.run-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.run-type{font-size:16px;font-weight:700}
.run-type.normal{color:#5B8A5E}
.run-type.race{color:#C4607A}
.run-km{font-size:13px;font-weight:600;background:rgba(91,138,94,0.1);padding:3px 10px;border-radius:20px;color:#5B8A5E}
.run-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.run-label{font-size:11px;color:#A898B0;text-transform:uppercase;letter-spacing:0.5px}
.run-value{font-size:14px;color:#3D2E4A;font-weight:600}
.run-note{margin-top:10px;font-size:13px;color:#7A6B8A;line-height:1.5;border-top:0.5px solid rgba(180,160,190,0.2);padding-top:8px}
.strength-card{background:rgba(255,255,255,0.6);border-radius:14px;padding:16px;border:0.5px solid rgba(180,160,190,0.2);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.strength-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.strength-name{font-size:16px;font-weight:700;color:#6B5B8A}
.strength-dur{font-size:12px;color:#A898B0;background:rgba(107,91,138,0.08);padding:3px 8px;border-radius:12px}
.exercise{display:grid;grid-template-columns:22px 1fr auto;gap:4px 10px;padding:10px 14px;border-radius:8px;border-left:3px solid rgba(107,91,138,0.15);align-items:start}
.exercise:nth-child(odd){background:rgba(107,91,138,0.04)}
.ex-name{font-weight:600;color:#3D2E4A;font-size:14px}
.ex-sets{color:#6B5B8A;font-weight:600;font-size:14px;text-align:right;white-space:nowrap}
.ex-tags{grid-column:2/-1;display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.tag{font-size:12px;padding:2px 8px;border-radius:4px}
.tag-load{background:rgba(107,91,138,0.1);color:#6B5B8A}
.tag-tempo{background:rgba(200,160,80,0.12);color:#B8883E}
.tag-note{font-size:12px;color:#A898B0;font-style:italic}
.other-card{background:rgba(255,255,255,0.45);border-radius:14px;padding:12px 16px;border:0.5px solid rgba(180,160,190,0.15)}
.other-card.pilates{background:rgba(220,140,170,0.1);border:0.5px solid rgba(220,140,170,0.25)}
.other-label{font-size:13px;color:#A898B0}
.other-label.pilates{color:#C4607A;font-weight:600}
.other-text{font-size:14px;color:#3D2E4A;font-weight:500;margin-top:2px}
.other-text.pilates{color:#9E4060}
.notes-card{background:rgba(200,160,80,0.08);border-radius:14px;padding:12px 16px;border:0.5px solid rgba(200,160,80,0.2)}
.notes-title{font-size:13px;color:#B8883E;font-weight:600;margin-bottom:4px}
.notes-text{font-size:13px;color:#7A6B8A;line-height:1.5}
.rest-card{text-align:center;padding:40px 20px;background:rgba(255,255,255,0.35);border-radius:14px}
.rest-icon{font-size:32px;margin-bottom:8px}
.rest-title{font-size:16px;font-weight:600;color:#8A7A9E}
.rest-sub{font-size:13px;color:#B8A5C0;margin-top:4px}
.ex-form{grid-column:2/-1;margin-top:6px;padding:8px 10px;background:rgba(91,138,94,0.08);border:0.5px solid rgba(91,138,94,0.15);border-radius:6px}
.ex-form-text{font-size:12px;color:#4A7A4E;line-height:1.5}
.ex-video-link{display:inline-block;margin-top:6px;font-size:12px;font-weight:600;color:#5B8A5E;text-decoration:none;padding:3px 10px;background:rgba(91,138,94,0.1);border-radius:4px;border:0.5px solid rgba(91,138,94,0.2)}
.ex-video-link:active{background:rgba(91,138,94,0.2)}
.fuel-card{margin-top:10px;padding:10px 12px;background:rgba(200,160,80,0.08);border:0.5px solid rgba(200,160,80,0.15);border-radius:8px}
.fuel-title{font-size:13px;font-weight:700;color:#B8883E;margin-bottom:6px}
.fuel-row{font-size:12px;color:#7A6B8A;line-height:1.6;margin-bottom:4px}
.fuel-label{font-weight:600;color:#C49A4A}
.ex-check{display:flex;align-items:center;justify-content:center;width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid rgba(180,160,190,0.3);cursor:pointer;transition:all 0.2s;grid-row:1}
.ex-check.done{background:#5B8A5E;border-color:#5B8A5E}
.ex-check.done::after{content:"✓";color:white;font-size:13px;font-weight:700}
.exercise.checked .ex-name,.exercise.checked .ex-sets{opacity:0.4;text-decoration:line-through}
.run-check-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:8px;border-top:0.5px solid rgba(180,160,190,0.15);cursor:pointer}
.run-check-box{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid rgba(180,160,190,0.3);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.run-check-box.done{background:#5B8A5E;border-color:#5B8A5E}
.run-check-box.done::after{content:"✓";color:white;font-size:13px;font-weight:700}
.run-check-label{font-size:13px;color:#A898B0}
.run-check-label.done{color:#5B8A5E;font-weight:600}
.treadmill-card{background:rgba(200,160,80,0.08);border-radius:14px;padding:16px;border:0.5px solid rgba(200,160,80,0.2)}
.treadmill-header{font-size:16px;font-weight:700;color:#B8883E;margin-bottom:8px}
.treadmill-detail{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.treadmill-note{font-size:12px;color:#7A6B8A;line-height:1.5}
.steps-card{background:rgba(107,91,160,0.08);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(107,91,160,0.15)}
.steps-header{font-size:16px;font-weight:700;color:#6B5B8A;margin-bottom:4px}
.steps-target{font-size:14px;color:#8A7A9E;font-weight:500;margin-bottom:4px}
.spin-card{background:rgba(139,92,246,0.08);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(139,92,246,0.2)}
.spin-header{font-size:16px;font-weight:700;color:#8B5CF6;margin-bottom:4px}
.spin-detail{font-size:13px;color:#7A6B8A;line-height:1.5;margin-bottom:4px}
.protein-card{background:rgba(239,68,68,0.04);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(239,68,68,0.12)}
.protein-header{font-size:16px;font-weight:700;color:#DC2626;margin-bottom:10px}
.protein-ring-wrap{position:relative;width:100px;height:100px;margin:0 auto 8px}
.protein-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.protein-log-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(255,255,255,0.5);border-radius:8px;margin-bottom:3px;font-size:12px}
.protein-log-name{color:#3D2E4A;font-weight:500}
.protein-log-g{color:#6B5B8A;font-weight:600}
.protein-log-x{color:#C4607A;cursor:pointer;margin-left:8px;font-size:14px}
.protein-foods{display:flex;flex-wrap:wrap;gap:5px}
.protein-pill{padding:5px 10px;background:rgba(255,255,255,0.5);border-radius:16px;font-size:11px;color:#3D2E4A;border:0.5px solid rgba(180,160,190,0.2);cursor:pointer}
.protein-pill:active{background:rgba(107,91,138,0.1);transform:scale(0.96)}
.protein-pill .pg{color:#A898B0;margin-left:2px}
.protein-target{font-size:13px;color:#7A6B8A;margin-bottom:4px}
.water-card{background:rgba(59,130,246,0.06);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(59,130,246,0.15)}
.water-header{font-size:16px;font-weight:700;color:#3B82F6;margin-bottom:4px}
.water-target{font-size:13px;color:#7A6B8A;margin-bottom:4px}
.perfect-day{text-align:center;padding:14px;background:linear-gradient(135deg,rgba(91,138,94,0.12),rgba(16,185,129,0.08));border-radius:14px;border:1.5px solid rgba(91,138,94,0.3);margin-bottom:2px;animation:perfectPop 0.4s ease-out}
.perfect-day-icon{font-size:32px;margin-bottom:4px}
.perfect-day-title{font-size:16px;font-weight:800;color:#3D8A50;letter-spacing:0.5px}
.perfect-day-sub{font-size:12px;color:#5B8A5E;margin-top:2px}
@keyframes perfectPop{0%{transform:scale(0.9);opacity:0}100%{transform:scale(1);opacity:1}}
.dash{padding:16px;border-bottom:0.5px solid rgba(180,160,190,0.15)}
.dash-section{margin-bottom:14px}
.dash-section:last-child{margin-bottom:0}
.dash-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8A5C0;margin-bottom:8px}
.progress-wrap{background:rgba(107,91,138,0.08);border-radius:8px;height:8px;overflow:hidden;margin-top:6px}
.progress-bar{height:100%;border-radius:8px;transition:width 0.3s}
.progress-text{font-size:12px;color:#A898B0;margin-top:4px}
.week-strip{display:flex;gap:4px}
.week-day{flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.4);color:#A898B0;cursor:pointer;transition:all 0.2s}
.week-day.today{border:2px solid #6B5B8A;color:#6B5B8A}
.week-day.completed{background:rgba(91,138,94,0.15);color:#5B8A5E}
.week-day.completed.today{border-color:#5B8A5E}
.week-day.partial{background:rgba(200,160,80,0.12);color:#B8883E}
.streak-row{display:flex;align-items:center;gap:12px}
.streak-number{font-size:32px;font-weight:800;color:#3D2E4A}
.streak-label{font-size:13px;color:#A898B0;line-height:1.4}
.streak-fire{font-size:28px}
.race-countdown{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(196,96,122,0.08);border:0.5px solid rgba(196,96,122,0.2);border-radius:8px}
.race-countdown-days{font-size:24px;font-weight:800;color:#C4607A}
.race-countdown-label{font-size:13px;color:#C4607A}
.strava-run-item{padding:8px 0;border-bottom:0.5px solid rgba(180,160,190,0.1)}
.strava-run-item:last-child{border-bottom:none}
.strava-run-date{font-size:10px;color:#A898B0;text-transform:uppercase;letter-spacing:0.5px}
.strava-run-name{font-size:13px;font-weight:600;color:#3D2E4A;margin-top:1px}
.strava-run-stats{font-size:12px;color:#6B5B8A;margin-top:2px}
.strava-actual{padding:10px 14px;background:rgba(255,90,0,0.06);border-radius:10px;border:0.5px solid rgba(255,90,0,0.15)}
.strava-actual-header{font-size:13px;font-weight:700;color:#FC4C02;margin-bottom:4px}
.strava-actual-stats{font-size:12px;color:#7A6B8A}
.coach-card{background:rgba(255,255,255,0.55);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(180,160,190,0.2);margin-bottom:10px}
.coach-card-title{font-size:13px;font-weight:700;color:#6B5B8A;margin-bottom:8px}
.coach-stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid rgba(180,160,190,0.08)}
.coach-stat-row:last-child{border-bottom:none}
.coach-stat-label{font-size:12px;color:#A898B0}
.coach-stat-value{font-size:14px;font-weight:700;color:#3D2E4A}
.coach-stat-sub{font-size:11px;color:#A898B0}
.coach-feedback{padding:12px 14px;background:rgba(91,138,94,0.06);border-radius:12px;border:0.5px solid rgba(91,138,94,0.15);margin-bottom:10px}
.coach-feedback-title{font-size:13px;font-weight:700;color:#5B8A5E;margin-bottom:6px}
.coach-feedback-text{font-size:12px;color:#3D2E4A;line-height:1.6}
.coach-warn{background:rgba(200,160,80,0.08);border-color:rgba(200,160,80,0.2)}
.coach-warn .coach-feedback-title{color:#B8883E}
.coach-good{background:rgba(91,138,94,0.08);border-color:rgba(91,138,94,0.2)}
.coach-good .coach-feedback-title{color:#5B8A5E}
.coach-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:4px}
.coach-bar-bg{flex:1;height:6px;background:rgba(107,91,138,0.08);border-radius:3px;overflow:hidden}
.coach-bar-fill{height:100%;border-radius:3px}
.coach-bar-label{font-size:11px;color:#A898B0;min-width:35px;text-align:right}
.coach-long-run{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:6px}
.coach-long-bar{flex:1;background:rgba(91,138,94,0.3);border-radius:3px 3px 0 0;min-width:0}
.coach-long-bar.latest{background:#5B8A5E}
.coach-long-label{font-size:9px;color:#A898B0;text-align:center;margin-top:2px}
</style>
</head>
<body>
<div class="header">
  <div class="label">Daily Training Plan</div>
  <div class="nav">
    <button id="prev">←</button>
    <div class="date-display" id="dateDisplay"></div>
    <button id="next">→</button>
  </div>
  <div class="quick-nav">
    <button id="goToday">📍 Today</button>
    <button id="goHome">🏠 Home</button>
    <button id="goCoach">📊 Coach</button>
    <button id="goRace" class="race-btn">🏁 May 3 HM</button>

</div>
<div id="dashboard" class="dash"></div>
<div id="coachView" class="dash" style="display:none"></div>
<div class="content" id="content"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────
const BLOCKS=[{id:"preplan",name:"Pre-Plan: Getting Ready",startDate:"2026-03-27",endDate:"2026-03-29",weeks:1,weeklyKm:"~16",focus:"Final prep before plan starts Monday. 16 km long run Sunday.",color:"#10b981"},{id:"block1",name:"Block 1: Return to Base",startDate:"2026-03-30",endDate:"2026-04-26",weeks:4,weeklyKm:"28–38",focus:"Rebuild frequency to 4 runs, establish strength patterns, prep for May 3 HM",color:"#2563eb"},{id:"raceweek_hm1",name:"May 3 HM – Race Week",startDate:"2026-04-27",endDate:"2026-05-03",weeks:1,weeklyKm:"~20",focus:"Taper & race – target ~2:05",color:"#dc2626"},{id:"recovery1",name:"Post-Race Recovery",startDate:"2026-05-04",endDate:"2026-05-17",weeks:2,weeklyKm:"15–25",focus:"Absorb race, reset for aerobic build",color:"#6b7280"},{id:"block2",name:"Block 2: Aerobic Development",startDate:"2026-05-18",endDate:"2026-06-28",weeks:6,weeklyKm:"30–48",focus:"Build to 40–45 km/wk, introduce tempo, long runs to 18 km",color:"#0891b2"},{id:"block3",name:"Block 3: City2Surf Prep",startDate:"2026-06-29",endDate:"2026-08-09",weeks:6,weeklyKm:"40–48",focus:"Hill work, target sub-75 C2S",color:"#7c3aed"},{id:"block4",name:"Block 4: Volume Build",startDate:"2026-08-10",endDate:"2026-09-27",weeks:7,weeklyKm:"25→55",focus:"Post-C2S recovery → build to 55 km/wk",color:"#059669"},{id:"block5",name:"Block 5: HM Specific Build",startDate:"2026-09-28",endDate:"2026-11-08",weeks:6,weeklyKm:"50–55",focus:"Race-pace work → PEAK: Sub-2:00 Half Marathon",color:"#dc2626"},{id:"block6",name:"Block 6: Recovery & Strength",startDate:"2026-11-09",endDate:"2026-12-31",weeks:8,weeklyKm:"25–35",focus:"Glute hypertrophy focus, enjoy running",color:"#d97706"},{id:"block7",name:"Block 7: Aerobic Rebuild + Speed",startDate:"2027-01-01",endDate:"2027-02-28",weeks:8,weeklyKm:"40–50",focus:"400m/800m reps, speed development",color:"#2563eb"},{id:"block8",name:"Block 8: C2S Specific Peak",startDate:"2027-03-01",endDate:"2027-05-31",weeks:13,weeklyKm:"45–50",focus:"Hill power, sustai "Romanian deadlift":{form:"Feet hip-width, soft knees (slight bend, locked in position). Push hips BACK — the bar slides down your thighs. Feel the hamstring stretch. Back stays flat — the moment it rounds, that's your range of motion. Drive hips forward to return.",link:"https://www.youtube.com/watch?v=JCXUYuzwNrM"},
"Good mornings (light)":{form:"Bar on upper back (like a squat), feet hip-width. Soft knees, hinge at hips — push them back. Lower until torso is close to parallel. Flat back throughout. This is controlled and light — it's for injury prevention, not ego.",link:"https://www.youtube.com/watch?v=YA-h3n9L4YU"},
"Cable kickback":{form:"Face the cable, ankle strap on. Slight forward lean, brace core. Extend leg straight back — squeeze glute at the top. Don't arch your lower back to get more range. Controlled, no swinging.",link:"https://www.youtube.com/watch?v=dXMvr3uMmDc"},
"Nordic curl eccentric":{form:"Kneel on a pad, anchor your ankles (under a bar or have someone hold them). Hands ready to catch yourself. Slowly lower your body forward — fight gravity with your hamstrings for a full 5-sec count. Push back up with your hands. You're training the lowering phase only.",link:"https://www.youtube.com/watch?v=BpKadYwbGPo"},
"Lat pulldown":{form:"Grip just wider than shoulders. Lean back slightly (~15°). Pull the bar to your upper chest — lead with your elbows, drive them down and back. Squeeze your shoulder blades together at the bottom. Control the return.",link:"https://www.youtube.com/watch?v=CAwf7n6Luuc"},
"Seated cable row":{form:"Sit tall, slight knee bend. Pull handle to lower ribcage — drive elbows straight back. Squeeze shoulder blades together for 1 sec. Don't lean back to cheat — your torso stays still. Control the release.",link:"https://www.youtube.com/watch?v=GZbfZ033f74"},
"Bicep curls":{form:"Stand with elbows pinned to your sides. Curl up, rotating palms toward shoulders. Don't swing — if your torso rocks, the weight is too heavy. Slow lowering (2–3 sec eccentric).",link:"https://www.youtube.com/watch?v=ykJmrZ5v0Oo"},
"Dead bug":{form:"Lie on back, arms straight up, knees at 90°. Press lower back into the floor — it must NOT leave the ground. Extend opposite arm and leg simultaneously. Breathe out as you extend. If your back lifts, you've gone too far.",link:"https://www.youtube.com/watch?v=I5xbsA71v1A"},
"Banded lateral walks":{form:"Band just above knees (or ankles for harder). Quarter-squat position — stay low throughout. Step sideways, leading with the heel. Keep toes forward, don't let knees cave in. Feel the burn in the side of your glutes (gluteus medius).",link:"https://www.youtube.com/watch?v=zTOPFZrekbE"},
"Single-leg hip thrust":{form:"Shoulder blades on bench, one foot planted, other leg extended. Drive through the planted heel. At the top: ribs down, squeeze glute, hold 1–2 sec. Keep hips level. If you feel it in your lower back, reset your pelvis position.",link:"https://www.youtube.com/watch?v=BXKB1YE5ufY"},
"Single-leg hip thrust (weighted)":{form:"Same as bodyweight version but with a plate on your hip. Shoulder blades on bench, one foot planted. Drive through heel, squeeze at top with posterior pelvic tilt. Hold 1–2 sec. Keep hips level.",link:"https://www.youtube.com/watch?v=BXKB1YE5ufY"},
"Step-ups (low box)":{form:"Forward lean of ~20° — this shifts the load onto your glute instead of your quad. Step up driving through the heel of the working leg. Do NOT push off the back foot — that's cheating. Stand fully, squeeze glute, then lower controlled.",link:"https://www.youtube.com/watch?v=dQqApCGd5Ss"},
"Abductor machine":{form:"Sit tall with back against the pad — don't lean back or forward. Push knees apart against the pads, driving from the glutes. Squeeze hard at full open and hold 1 sec. Control the return — don't let the weight slam. You should feel this in the side of your glutes, not your hip flexors.",link:"https://www.youtube.com/watch?v=GNwKUo2FYGE"},
"Adductor machine":{form:"Sit tall, back against pad. Squeeze knees together against the pads, driving from your inner thighs. Hold at full close for 1 sec. Slow release — don't let the weight pull your legs apart. Keep your core braced throughout.",link:"https://www.youtube.com/watch?v=1e0dqMnkXYI"},
"Frog pump":{form:"Lie on back, soles of feet together, knees out wide (like a frog). Drive hips up squeezing glutes hard at top. Short range of motion — this is about the squeeze, not the height. High reps, constant tension.",link:"https://www.youtube.com/watch?v=3idsBMaqsR4"},
"Plank hold":{form:"Forearms and toes. Body in a straight line — no sagging hips, no piking up. Tuck your pelvis slightly (posterior tilt). Squeeze glutes, brace core like you're about to be punched. Breathe normally. If your form breaks, the set is over.",link:"https://www.youtube.com/watch?v=ASdvN_XEl_c"},
"Plank variations":{form:"Start with standard forearm plank. Progress to shoulder taps, plank walks, or plank with leg lift. Key cue for all: pelvis tucked, glutes engaged, no hip rocking side to side during variations.",link:"https://www.youtube.com/watch?v=ASdvN_XEl_c"},
"Bird dog":{form:"On all fours, wrists under shoulders, knees under hips. Extend opposite arm and leg simultaneously — reach long. Keep hips level (put a water bottle on your lower back — it shouldn't fall). Pause 2 sec extended, return controlled.",link:"https://www.youtube.com/watch?v=wiFNA3sqjCA"},
"Single-leg calf raises":{form:"Stand on the edge of a step on one foot. Lower heel below the step for full stretch. Rise up onto your toes, pause 1 sec at the top. Slow lowering. Hold a wall for balance if needed. Full range of motion matters here.",link:"https://www.youtube.com/watch?v=OsTQ4GKMMVU"},
"Face pulls":{form:"Cable at face height, rope attachment. Pull toward your face, splitting the rope — hands finish beside your ears. Elbows high, squeeze shoulder blades together. This is a rear delt/rotator cuff exercise — keep it light.",link:"https://www.youtube.com/watch?v=V8dZ3pyiCBo"},
"Incline treadmill walk":{form:"Set incline to 10–12%, speed 5.5–6.5 km/h. Walk tall — don't lean on the console or hold the handrails. Swing your arms naturally. Push through your heels on each step to engage glutes. You should feel this in your glutes and hamstrings, not your calves. If you're gripping the rails, drop the incline or speed.",link:"https://www.youtube.com/watch?v=aTxEJG2L-GI"},
};

// Normalize exercise name for lookup (strip weighted/barbell variants)
function getForm(name){
if(FORM[name])return FORM[name];
// Try partial matches
for(const k in FORM){if(name.includes(k)||k.includes(name))return FORM[k]}
return null;
}

function renderExercise(ex,i){
const f=getForm(ex.name);
let tags="";
if(ex.load)tags+=`<span class="tag tag-load">⚖️ ${ex.load}</span>`;
if(ex.tempo)tags+=`<span class="tag tag-tempo">⏱️ ${ex.tempo}</span>`;
if(ex.note)tags+=`<span class="tag-note">${ex.note}</span>`;

let formHtml="";
if(f){
formHtml=`<div class="ex-form"><div class="ex-form-text">📐 ${f.form}</div>${f.link?`<a href="${f.link}" target="_blank" rel="noopener" class="ex-video-link">▶ Watch form video</a>`:""}</div>`;
}

return`<div class="exercise" id="ex-${i}" style="${i%2===0?"background:rgba(255,255,255,0.04)":""}"><div class="ex-check" onclick="toggleEx(${i})"></div><div class="ex-name">${ex.name}</div><div class="ex-sets">${ex.sets} × ${ex.reps}</div>${tags?`<div class="ex-tags">${tags}</div>`:""}${formHtml}</div>`;
}

function getFuel(r){
if(!r||r.type.includes("RACE"))return null;
const km=parseFloat(r.km)||0;
const isQuality=r.int&&(r.int.includes("3")||r.int.includes("4")||r.int.includes("5"));
const isTempo=r.type.toLowerCase().includes("tempo")||r.type.toLowerCase().includes("interval")||r.type.toLowerCase().includes("hill")||r.type.toLowerCase().includes("speed");
const isLong=r.type.toLowerCase().includes("long");
const isRecovery=r.type.toLowerCase().includes("recovery")||r.type.toLowerCase().includes("opener");

let pre="",during="",after="";

if(km<=5&&!isTempo){
// Short easy run
pre="☕ Optional: coffee + small banana or nothing if running within 60 min of waking. Stay hydrated.";
during="💧 No fuel needed. Sip water if hot.";
after="🥛 Glass of water + small snack if hungry. No rush on recovery meal.";
}else if(km<=7&&!isTempo){
// Medium easy run
pre="🍌 Small banana or toast with honey 30–60 min before. Coffee fine.";
during="💧 No fuel needed. Carry water if hot/humid.";
after="🥛 20–30g protein within 45 min (yoghurt + fruit, protein shake, eggs on toast).";
}else if(isTempo||isQuality){
// Quality session (tempo, intervals, hills, speed)
pre="🍞 Carb-rich snack 60–90 min before: toast + banana, oats, or rice cakes with honey. You need fuel for intensity.";
during=km>8?"💧 Carry water. If session is 60+ min, consider a gel or 2–3 chews at the halfway mark.":"💧 Carry water. No gel needed for sessions under 60 min.";
after="🥛 Recovery meal within 30 min: 20–30g protein + carbs. E.g. protein shake + banana, eggs on toast, yoghurt + granola.";
}else if(isLong&&km>=14){
// Long run 14km+
pre="🍚 Proper meal 2–3 hrs before: oats with banana + honey, toast with PB, or rice + eggs. This is your fuel tank.";
during=km>=16?"⚡ Gel or chews at km 7 and km 14. Water every 3–4 km. PRACTISE this now — don't try new fuel on race day.":"💧 Water every 3–4 km. Optional: 1 gel at km 8–10 if going beyond 75 min.";
after="🥛 Recovery meal within 30 min: protein + carbs + electrolytes. E.g. protein shake + banana + pinch of salt, or a proper meal.";
}else if(isLong||km>=10){
// Moderate long run 10-13km
pre="🍌 Toast + banana or oats 60–90 min before. Don't skip this.";
during="💧 Carry water. If running 75+ min, take 1 gel or a few chews at ~45 min.";
after="🥛 20–30g protein + carbs within 45 min. Chocolate milk works in a pinch.";
}else if(isRecovery){
pre="☕ Light or nothing. This is a jog, not a session.";
during="💧 Sip water if needed.";
after="🥛 Normal meal timing, no rush.";
}else{
// Default medium run
pre="🍌 Small snack 30–60 min before if needed. Coffee fine.";
during="💧 Carry water if warm. No fuel needed under 60 min.";
after="🥛 20–30g protein within 45 min.";
}

return{pre,during,after};
}

function renderRun(r){
if(!r)return"";
const isRace=r.type.includes("RACE");
let fuelHtml="";
const fuel=getFuel(r);
if(fuel){
fuelHtml=`<div class="fuel-card"><div class="fuel-title">🍽️ Fuelling</div><div class="fuel-row"><span class="fuel-label">Before:</span> ${fuel.pre}</div><div class="fuel-row"><span class="fuel-label">During:</span> ${fuel.during}</div><div class="fuel-row"><span class="fuel-label">After:</span> ${fuel.after}</div></div>`;
}
return`<div class="run-card ${isRace?"race":"normal"}"><div class="run-header"><div class="run-type ${isRace?"race":"normal"}">${isRace?"🏁 ":"🏃‍♀️ "}${r.type}</div><div class="run-km">${r.km} km</div></div><div class="run-grid"><div><div class="run-label">Pace</div><div class="run-value">${r.pace}</div></div><div><div class="run-label">Intensity</div><div class="run-value">${r.int}</div></div></div>${r.note?`<div class="run-note">${r.note}</div>`:""}${fuelHtml}<div class="run-check-row" onclick="toggleRun()"><div class="run-check-box" id="run-check"></div><div class="run-check-label" id="run-label">Mark run complete</div></div></div>`;
}

function renderStrength(s){
if(!s)return"";
return`<div class="strength-card"><div class="strength-header"><div class="strength-name">💪 ${s.name}</div><div class="strength-dur">${s.duration}</div></div><div style="display:flex;flex-direction:column;gap:4px">${s.exercises.map((e,i)=>renderExercise(e,i)).join("")}<div class="run-check-row" onclick="toggleStrength()"><div class="run-check-box" id="str-check"></div><div class="run-check-label" id="str-label">Mark session complete</div></div></div></div>`+renderTreadmill();
}

function renderTreadmill(){
return`<div class="treadmill-card"><div class="treadmill-header">🚶‍♀️ Incline Treadmill Walk — 30 min</div><div class="treadmill-detail"><span class="tag tag-load">📐 10–12% incline, 5.5–6.5 km/h</span></div><div class="treadmill-note">Finish every gym session with this. Don't hold the handrails — swing your arms. Strong glute drive on the incline.</div><div class="run-check-row" onclick="toggleTreadmill()"><div class="run-check-box" id="tm-check"></div><div class="run-check-label" id="tm-label">Mark treadmill complete</div></div></div>`;
}

function renderDashboard(){
const today=new Date();
const todayNorm=new Date(today.getFullYear(),today.getMonth(),today.getDate(),12,0,0);
const block=getBlock(todayNorm);
let dhtml="";

// ── Block Progress ──
if(block){
const weekInBlock=getWeek(todayNorm,block);
const pct=Math.min(Math.round((weekInBlock/block.weeks)*100),100);
dhtml+=`<div class="dash-section"><div class="dash-title">Current Block</div><div class="block-name" style="color:${block.color};font-size:15px">${block.name}</div><div class="progress-text">Week ${weekInBlock} of ${block.weeks} • ${block.weeklyKm} km/week</div><div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${block.color}"></div></div></div>`;
}

// ── Race Countdown ──
const races=[{name:"Half Marathon",date:new Date(2026,4,3,12,0,0)},{name:"City2Surf",date:new Date(2026,7,9,12,0,0)},{name:"A-Race Half Marathon",date:new Date(2026,9,25,12,0,0)},{name:"City2Surf 2027",date:new Date(2027,7,8,12,0,0)}];
const nextRace=races.find(r=>r.date>todayNorm);
if(nextRace){
const daysUntil=Math.ceil((nextRace.date-todayNorm)/(864e5));
dhtml+=`<div class="dash-section"><div class="race-countdown"><div class="race-countdown-days">${daysUntil}</div><div class="race-countdown-label">days until<br><strong>${nextRace.name}</strong></div></div></div>`;
}

// ── This Week Strip ──
const monday=new Date(todayNorm);
const dow=monday.getDay();
const diff=dow===0?6:dow-1;
monday.setDate(monday.getDate()-diff);

const dayLabels=["M","T","W","T","F","S","S"];
let stripHtml="";
for(let i=0;i<7;i++){
const d=new Date(monday);
d.setDate(d.getDate()+i);
const dk="tp-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
const isToday=d.getDate()===todayNorm.getDate()&&d.getMonth()===todayNorm.getMonth();
let status="";
try{
const s=localStorage.getItem(dk);
if(s){
const st=JSON.parse(s);
const hasChecks=st.run||st.str||st.pil||st.tm||st.steps||Object.values(st.ex||{}).some(v=>v);
const allDone=st.steps&&(st.run||!getBlock(d)||(getBlock(d)&&st.str));
if(allDone)status="completed";
else if(hasChecks)status="partial";
}
}catch(e){}
const dateNum=d.getDate();
stripHtml+=`<div class="week-day ${isToday?"today":""} ${status}" onclick="navToDate(${d.getFullYear()},${d.getMonth()},${d.getDate()})">${dayLabels[i]}<br><span style="font-size:13px">${dateNum}</span></div>`;
}
dhtml+=`<div class="dash-section"><div class="dash-title">This Week</div><div class="week-strip">${stripHtml}</div></div>`;

// ── Weekly KM Total ──
let weeklyKm=0;
for(let i=0;i<7;i++){
const wd=new Date(monday);
wd.setDate(wd.getDate()+i);
const wp=getPlan(wd);
if(wp.run){const km=parseFloat(wp.run.km)||0;weeklyKm+=km}
}
dhtml+=`<div class="dash-section"><div class="dash-title">Weekly volume</div><div class="streak-row"><div class="streak-number">${Math.round(weeklyKm)}</div><div class="streak-label">km planned<br>this week</div><div style="font-size:28px">📏</div></div></div>`;

// ── Streak ──
let streak=0;
const checkDate=new Date(todayNorm);
// Don't count today unless it has checks
checkDate.setDate(checkDate.getDate()-1);
for(let i=0;i<365;i++){
const dk="tp-"+checkDate.getFullYear()+"-"+(checkDate.getMonth()+1)+"-"+checkDate.getDate();
try{
const s=localStorage.getItem(dk);
if(s){
const st=JSON.parse(s);
const hasChecks=st.run||st.str||st.pil||st.tm||st.steps||Object.values(st.ex||{}).some(v=>v);
if(hasChecks){streak++;checkDate.setDate(checkDate.getDate()-1)}
else break;
}else break;
}catch(e){break}
}
// Check if today has any checks too
const todayKey="tp-"+todayNorm.getFullYear()+"-"+(todayNorm.getMonth()+1)+"-"+todayNorm.getDate();
try{const ts=localStorage.getItem(todayKey);if(ts){const tst=JSON.parse(ts);if(tst.run||tst.str||tst.pil||tst.tm||tst.steps||Object.values(tst.ex||{}).some(v=>v))streak++}}catch(e){}

const fire=streak>=7?"🔥🔥🔥":streak>=3?"🔥🔥":streak>=1?"🔥":"";
dhtml+=`<div class="dash-section"><div class="dash-title">Consistency Streak</div><div class="streak-row"><div class="streak-number">${streak}</div><div class="streak-label">day${streak!==1?"s":""} in a row<br>with training logged</div><div class="streak-fire">${fire}</div></div></div>`;

dhtml+=`<div class="dash-section" id="strava-recent"></div>`;

$("dashboard").innerHTML=dhtml;

// Load Strava data async
loadStrava();
}

let stravaData=null;
let stravaLoaded=false;

async function loadStrava(){
if(stravaLoaded)return renderStravaWidgets();
try{
const res=await fetch("/.netlify/functions/strava");
const data=await res.json();
if(data.activities){stravaData=data.activities;stravaLoaded=true;renderStravaWidgets()}
}catch(e){console.log("Strava fetch failed:",e)}
}

function renderStravaWidgets(){
if(!stravaData)return;

// Dashboard: recent runs
const dashEl=$("strava-recent");
if(dashEl){
const runs=stravaData.filter(a=>a.type==="Run").slice(0,5);
if(runs.length){
let html=runs.map(r=>{
const d=new Date(r.date);
const day=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
const dd=d.getDate();
const mm=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
return`<div class="strava-run-item"><div class="strava-run-date">${day} ${dd} ${mm}</div><div class="strava-run-name">${r.name}</div><div class="strava-run-stats">${r.distance_km} km · ${r.pace_per_km}/km${r.avg_hr?" · "+Math.round(r.avg_hr)+" bpm":""}</div></div>`;
}).join("");
dashEl.innerHTML=`<div class="dash-title">Recent runs (Strava)</div>${html}`;
}
}

// Daily view: match Strava activity to today's date
const dailyEl=$("strava-daily");
if(dailyEl){
const dateStr=currentDate.getFullYear()+"-"+String(currentDate.getMonth()+1).padStart(2,"0")+"-"+String(currentDate.getDate()).padStart(2,"0");
const matches=stravaData.filter(a=>a.type==="Run"&&a.date.startsWith(dateStr));
if(matches.length){
const m=matches[0];
dailyEl.innerHTML=`<div class="strava-actual"><div class="strava-actual-header">📡 Strava: ${m.name}</div><div class="strava-actual-stats"><span>${m.distance_km} km</span> · <span>${m.pace_per_km}/km</span> · <span>${m.moving_time_min} min</span>${m.avg_hr?" · <span>"+Math.round(m.avg_hr)+" bpm</span>":""}</div></div>`;
}else{
dailyEl.innerHTML="";
}
}
}

function renderCoachView(){
const cv=$("coachView");
if(!stravaLoaded){
cv.innerHTML=`<div class="dash-section" style="text-align:center;padding:40px 20px"><div style="font-size:28px;margin-bottom:8px">📊</div><div style="color:#A898B0;font-size:14px">Loading Strava data...</div></div>`;
loadStrava().then(()=>{if(viewMode==="coach")renderCoachView()});
return;
}
if(!stravaData||!stravaData.length){
cv.innerHTML=`<div class="dash-section" style="text-align:center;padding:40px 20px"><div style="color:#A898B0;font-size:14px">No Strava data available</div></div>`;
return;
}

const runs=stravaData.filter(a=>a.type==="Run");
const today=new Date();
const todayNorm=new Date(today.getFullYear(),today.getMonth(),today.getDate(),12,0,0);
let html=`<div class="dash-section"><div class="dash-title" style="font-size:13px">📊 Coaching analysis</div></div>`;

// ── 1. Weekly Volume vs Plan ──
// Get this week's runs
const monday=new Date(todayNorm);
const dow=monday.getDay();
const diff=dow===0?6:dow-1;
monday.setDate(monday.getDate()-diff);
let actualKm=0;
runs.forEach(r=>{
const rd=new Date(r.date);
if(rd>=monday&&rd<=todayNorm)actualKm+=r.distance_km;
});
const block=getBlock(todayNorm);
const plannedRange=block?block.weeklyKm:"--";
const plannedMid=block?parseInt(block.weeklyKm.replace(/[^0-9]/g,"").substring(0,2)):30;
const volPct=Math.min(Math.round((actualKm/plannedMid)*100),150);
const volColor=volPct>=80?"#5B8A5E":volPct>=50?"#B8883E":"#C4607A";

html+=`<div class="coach-card"><div class="coach-card-title">Weekly volume</div>
<div class="coach-stat-row"><div class="coach-stat-label">Actual this week</div><div class="coach-stat-value">${Math.round(actualKm*10)/10} km</div></div>
<div class="coach-stat-row"><div class="coach-stat-label">Plan target</div><div class="coach-stat-value">${plannedRange} km</div></div>
<div class="coach-bar-wrap"><div class="coach-bar-bg"><div class="coach-bar-fill" style="width:${Math.min(volPct,100)}%;background:${volColor}"></div></div><div class="coach-bar-label">${volPct}%</div></div></div>`;

// Volume feedback
if(volPct>=90){
html+=`<div class="coach-feedback coach-good"><div class="coach-feedback-title">✅ Volume on track</div><div class="coach-feedback-text">You're hitting your planned distance for the week. This is exactly where you need to be heading into the May 3 half marathon.</div></div>`;
}else if(volPct>=60){
html+=`<div class="coach-feedback coach-warn"><div class="coach-feedback-title">⚠️ Volume slightly low</div><div class="coach-feedback-text">You're a bit under the planned volume. If you still have runs left this week, no stress — just make sure you get the long run in. The long run is the most important session.</div></div>`;
}else{
html+=`<div class="coach-feedback coach-warn"><div class="coach-feedback-title">⚠️ Volume well under plan</div><div class="coach-feedback-text">You're significantly under the planned km this week. If you missed runs due to illness or fatigue, that's fine — don't try to cram them in. Just resume the plan next week. If it's motivation, remember: consistency beats perfection.</div></div>`;
}

// ── 2. Easy Pace Trend ──
const easyRuns=runs.filter(r=>{
const km=r.distance_km;
const name=(r.name||"").toLowerCase();
return km>=4&&km<=8&&!name.includes("tempo")&&!name.includes("interval")&&!name.includes("hill")&&!name.includes("speed")&&!name.includes("race");
});

if(easyRuns.length>=2){
// Parse pace to seconds
function paceToSec(p){const pts=p.split(":");return parseInt(pts[0])*60+parseInt(pts[1])}
function secToStr(s){return Math.floor(s/60)+":"+String(Math.round(s%60)).padStart(2,"0")}

const recent5=easyRuns.slice(0,5);
const avgRecent=recent5.reduce((s,r)=>s+paceToSec(r.pace_per_km),0)/recent5.length;
const avgRecentStr=secToStr(avgRecent);
const fastest=Math.min(...recent5.map(r=>paceToSec(r.pace_per_km)));
const slowest=Math.max(...recent5.map(r=>paceToSec(r.pace_per_km)));
const fastestStr=secToStr(fastest);
const slowestStr=secToStr(slowest);
const range=slowest-fastest;

// Target zone
const zoneMin=5*60+50;// 5:50
const zoneMax=6*60+10;// 6:10

html+=`<div class="coach-card"><div class="coach-card-title">Easy run analysis</div>`;

// Individual runs list
html+=`<div style="margin-bottom:10px">`;
recent5.forEach(r=>{
const d=new Date(r.date);

// Checkbox state storage (persists across sessions via localStorage)
function dateKey(d){return"tp-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
function getState(){
const k=dateKey(currentDate);
try{const s=localStorage.getItem(k);if(s)return JSON.parse(s)}catch(e){}
return{ex:{},run:false,str:false,pil:false,tm:false,steps:false,spin:false,protein:false,water:false};
}
function setState(s){
const k=dateKey(currentDate);
try{localStorage.setItem(k,JSON.stringify(s))}catch(e){}
}
function saveEx(i,done){const s=getState();s.ex[i]=done;setState(s)}
function saveRun(done){const s=getState();s.run=done;setState(s)}
function saveStr(done){const s=getState();s.str=done;setState(s)}
function savePil(done){const s=getState();s.pil=done;setState(s)}

function restoreChecks(){
const s=getState();
// Restore exercise checks
Object.keys(s.ex).forEach(i=>{
const el=$("ex-"+i);
if(el&&s.ex[i]){el.querySelector(".ex-check").classList.add("done");el.classList.add("checked")}
});
// Restore run check
const rc=$("run-check"),rl=$("run-label");
if(rc&&s.run){rc.classList.add("done");rl.classList.add("done");rl.textContent="Run complete ✓"}
// Restore strength check
const sc=$("str-check"),sl=$("str-label");
if(sc&&s.str){sc.classList.add("done");sl.classList.add("done");sl.textContent="Session complete ✓"}
// Restore pilates check
const pc=$("pil-check"),pl=$("pil-label");
if(pc&&s.pil){pc.classList.add("done");pl.classList.add("done");pl.textContent="Pilates complete ✓"}
// Restore treadmill check
const tc=$("tm-check"),tl=$("tm-label");
if(tc&&s.tm){tc.classList.add("done");tl.classList.add("done");tl.textContent="Treadmill complete ✓"}
// Restore steps check
const stc=$("steps-check"),stl=$("steps-label");

// Restore spin check
const spc=$("spin-check"),spl=$("spin-label");
if(spc&&s.spin){spc.classList.add("done");spl.classList.add("done");spl.textContent="Spin complete ✓"}
// Restore protein check
const prc=$("protein-check"),prl=$("protein-label");

// Restore water check

// Check perfect day
checkPerfectDay();

// ── Protein Tracker ──
const PFOODS=[
{emoji:"🥩",name:"200g lean mince beef",g:42},
{emoji:"🥩",name:"Steak (150g)",g:42},
{emoji:"🥤",name:"Cali Press Arnold",g:36},
{emoji:"🍗",name:"200g minced chicken",g:34},
{emoji:"🐟",name:"Salmon portion",g:34},
{emoji:"🐟",name:"Can of tuna",g:25},
{emoji:"🥄",name:"Chobani Fit passionfruit",g:15},
{emoji:"🧀",name:"Cottage cheese (200g)",g:14},
{emoji:"☕",name:"Oat flat white",g:2},
];

function proteinKey(){return"tp-prot-"+currentDate.getFullYear()+"-"+(currentDate.getMonth()+1)+"-"+currentDate.getDate()}
function getProteinLog(){try{const s=localStorage.getItem(proteinKey());return s?JSON.parse(s):[]}catch(e){return[]}}
function saveProteinLog(log){try{localStorage.setItem(proteinKey(),JSON.stringify(log))}catch(e){}}

function addProtein(i){
const log=getProteinLog();
log.push({...PFOODS[i]});
saveProteinLog(log);
renderProtein();
}
function removeProtein(i){
const log=getProteinLog();
log.splice(i,1);
saveProteinLog(log);
renderProtein();
}

function renderProtein(){
const foodsEl=$("protein-foods");
const logEl=$("protein-log");
const totalEl=$("protein-total");
const ringEl=$("protein-ring");
const statusEl=$("protein-status");
const tipEl=$("protein-tip");
if(!foodsEl)return;

const log=getProteinLog();
const total=log.reduce((s,f)=>s+f.g,0);
const pct=Math.min(Math.round((total/110)*100),100);
const remaining=110-total;

foodsEl.innerHTML=PFOODS.map((f,i)=>`<div class="protein-pill" onclick="addProtein(${i})">${f.emoji} ${f.name} <span class="pg">${f.g}g</span></div>`).join("");

if(log.length===0){
logEl.innerHTML=`<div style="text-align:center;padding:8px;color:#B8A5C0;font-size:11px">Nothing logged yet</div>`;
}else{
logEl.innerHTML=log.map((f,i)=>`<div class="protein-log-item"><span class="protein-log-name">${f.emoji} ${f.name}</span><span><span class="protein-log-g">${f.g}g</span><span class="protein-log-x" onclick="removeProtein(${i})"> ×</span></span></div>`).join("");
}

totalEl.textContent=total+"g";
const circ=263.9;
const offset=circ-(pct/100)*circ;
ringEl.style.strokeDashoffset=offset;
ringEl.style.stroke=total>=110?"#5B8A5E":"#6B5B8A";

if(total>=110){statusEl.textContent="✅ Target hit! "+total+"g";statusEl.style.color="#5B8A5E"}
else if(total>0){statusEl.textContent=remaining+"g to go";statusEl.style.color="#6B5B8A"}
else{statusEl.textContent="Tap foods below to log";statusEl.style.color="#A898B0"}

if(total>=110){
const msgs=[
"That's "+Math.round(total/0.63)/100+"g/kg — right in the optimal range for muscle protein synthesis.",
"110g+ locks in recovery. Your muscles repair strongest in the 24 hrs after training.",
"Consistent protein > perfect protein. You're building the habit that builds the physique.",
"At 1.6–2.0g/kg, you're maximising lean muscle retention while cutting fat. Science says so.",
"Protein target hit. This is what separates people who train from people who transform.",
"Your body can only use ~30–40g per meal for muscle building. Spreading it across the day = smarter gains.",
"Fun fact: 110g protein requires ~440 calories. That's high satiety for relatively low energy — your appetite thanks you.",
"Recovery nutrition locked in. Tomorrow's session will feel better because of what you ate today.",
"Protein is the only macro that builds and repairs muscle tissue. You gave your body exactly what it needs.",
"Every day you hit this target, you're compounding. 30 days of this = visible change."
];
const dayIdx=currentDate.getDate()%msgs.length;
tipEl.innerHTML="✅ "+msgs[dayIdx];
}
else if(remaining<=25){tipEl.innerHTML="💡 Almost there! A Chobani Fit (15g) or a can of tuna (25g) closes the gap."}
else if(remaining<=50){tipEl.innerHTML="💡 "+remaining+"g to go. A can of tuna + Chobani Fit, or a chicken/salmon portion would do it."}
else if(total>0){tipEl.innerHTML="💡 "+remaining+"g remaining. 2–3 more protein-rich meals today."}
else{tipEl.innerHTML="💡 Target: 100–126g daily (1.6–2.0g/kg at 63 kg). Tap your meals above."}
}

render();
</script>
