<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Daily Training Plan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#FDF2F5 0%,#F0ECF8 40%,#EBE8F5 100%);color:#3D2E4A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:520px;margin:0 auto;-webkit-tap-highlight-color:transparent;min-height:100vh}
.header{background:linear-gradient(135deg,#F8EEF2,#EDE6F2);padding:20px 16px 16px;border-bottom:1px solid rgba(180,160,190,0.2);position:sticky;top:0;z-index:10;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#B8A5C0;margin-bottom:4px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nav button{background:rgba(255,255,255,0.5);border:none;border-radius:8px;padding:8px 14px;color:#6B5B8A;cursor:pointer;font-size:16px;-webkit-appearance:none}
.nav button:active{background:rgba(255,255,255,0.7)}
.date-display{text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;color:#B8A5C0}
.quick-nav{display:flex;gap:6px}
.quick-nav button{flex:1;padding:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.45);border:1px solid rgba(180,160,190,0.2);border-radius:6px;color:#8A7A9E;cursor:pointer;-webkit-appearance:none;transition:all 0.15s}
.quick-nav button:active{background:rgba(255,255,255,0.65)}
.quick-nav button.active{background:rgba(107,91,138,0.2);border-color:rgba(107,91,138,0.4);color:#3D2E4A}
.quick-nav .race-btn{background:rgba(196,96,122,0.12);border-color:rgba(196,96,122,0.25);color:#C4607A}
.quick-nav .race-btn.active{background:rgba(196,96,122,0.3);border-color:rgba(196,96,122,0.5);color:#9E3050}
.block-info{margin-top:12px;padding:10px 12px;border-radius:8px}
.block-name{font-size:14px;font-weight:700}
.block-detail{font-size:12px;color:#A898B0;margin-top:2px}
.content{padding:16px;display:flex;flex-direction:column;gap:12px}
.race-banner{text-align:center;padding:16px;background:linear-gradient(135deg,#D4607A,#C4507A,#D4607A);border-radius:14px;border:2px solid #E8889E}
.race-banner .icon{font-size:28px;margin-bottom:4px}
.race-banner .title{font-size:18px;font-weight:800;color:#FFF0F3;letter-spacing:1px}
.race-banner .sub{font-size:13px;color:#FDDDE5;margin-top:4px}

/* ── RUN CARD ── */
.run-card{border-radius:16px;padding:16px;border:0.5px solid rgba(180,160,190,0.18)}
.run-card.normal{background:rgba(255,255,255,0.7);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.run-card.race{background:linear-gradient(135deg,rgba(196,96,122,0.12),rgba(196,80,122,0.07));border-color:rgba(196,96,122,0.25)}
.run-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.run-icon-chip{width:36px;height:36px;min-width:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.run-icon-chip.normal{background:rgba(91,138,94,0.12)}
.run-icon-chip.race{background:rgba(196,96,122,0.12)}
.run-title-wrap{flex:1}
.run-type{font-size:15px;font-weight:700;line-height:1.2}
.run-type.normal{color:#4A7A50}
.run-type.race{color:#C4607A}
.run-sub{font-size:11px;color:#A898B0;margin-top:1px}
.run-km{font-size:12px;font-weight:700;background:rgba(91,138,94,0.1);padding:4px 11px;border-radius:20px;color:#4A7A50;border:0.5px solid rgba(91,138,94,0.15)}
.run-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.run-stat{background:rgba(91,138,94,0.05);border-radius:10px;padding:10px 12px;border:0.5px solid rgba(91,138,94,0.1)}
.run-label{font-size:10px;color:#A898B0;text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:3px}
.run-value{font-size:14px;color:#3D2E4A;font-weight:700;line-height:1.2}
.run-note{margin-top:10px;font-size:12px;color:#7A6B8A;line-height:1.55;padding:10px 12px;background:rgba(184,136,62,0.07);border-radius:8px;border-left:3px solid rgba(184,136,62,0.35)}

/* ── STRENGTH CARD ── */
.strength-card{background:rgba(255,255,255,0.7);border-radius:16px;padding:16px;border:0.5px solid rgba(107,91,138,0.14);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.strength-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.str-icon-chip{width:36px;height:36px;min-width:36px;border-radius:10px;background:rgba(107,91,138,0.1);display:flex;align-items:center;justify-content:center;font-size:18px}
.str-title-wrap{flex:1}
.strength-name{font-size:15px;font-weight:700;color:#5B4A7A;line-height:1.2}
.strength-dur{font-size:11px;color:#A898B0;margin-top:1px}
.str-dur-pill{font-size:11px;color:#A898B0;background:rgba(107,91,138,0.07);padding:4px 10px;border-radius:20px;white-space:nowrap;border:0.5px solid rgba(107,91,138,0.12)}

/* ── EXERCISE ROWS ── */
.exercise{display:grid;grid-template-columns:22px 1fr auto;gap:3px 10px;padding:9px 12px;border-radius:8px;align-items:start}
.exercise:nth-child(odd){background:rgba(107,91,138,0.035)}
.ex-name{font-weight:600;color:#3D2E4A;font-size:13px;line-height:1.3}
.ex-sets{color:#6B5B8A;font-weight:700;font-size:13px;text-align:right;white-space:nowrap}
.ex-tags{grid-column:2/-1;display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.tag{font-size:11px;padding:2px 7px;border-radius:4px}
.tag-load{background:rgba(107,91,138,0.08);color:#6B5B8A}
.tag-tempo{background:rgba(200,160,80,0.1);color:#A87830}
.tag-note{font-size:11px;color:#A898B0;font-style:italic}
.ex-form{grid-column:2/-1;margin-top:5px;padding:8px 10px;background:rgba(74,122,78,0.07);border:0.5px solid rgba(74,122,78,0.14);border-radius:6px}
.ex-form-text{font-size:11px;color:#4A7A4E;line-height:1.5}
.ex-video-link{display:inline-block;margin-top:5px;font-size:11px;font-weight:600;color:#5B8A5E;text-decoration:none;padding:3px 9px;background:rgba(91,138,94,0.09);border-radius:4px;border:0.5px solid rgba(91,138,94,0.18)}
.ex-check{display:flex;align-items:center;justify-content:center;width:22px;height:22px;min-width:22px;border-radius:6px;border:1.5px solid rgba(180,160,190,0.3);cursor:pointer;transition:all 0.18s;grid-row:1}
.ex-check.done{background:#5B8A5E;border-color:#5B8A5E}
.ex-check.done::after{content:“✓”;color:white;font-size:12px;font-weight:700}
.exercise.checked .ex-name,.exercise.checked .ex-sets{opacity:0.35;text-decoration:line-through}

/* ── CHECK ROW (shared) ── */
.run-check-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:10px;border-top:0.5px solid rgba(180,160,190,0.12);cursor:pointer}
.run-check-box{width:22px;height:22px;min-width:22px;border-radius:6px;border:1.5px solid rgba(180,160,190,0.3);display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.run-check-box.done{background:#5B8A5E;border-color:#5B8A5E}
.run-check-box.done::after{content:“✓”;color:white;font-size:12px;font-weight:700}
.run-check-label{font-size:13px;color:#A898B0;font-weight:500}
.run-check-label.done{color:#5B8A5E;font-weight:600}

/* ── FUEL CARD ── */
.fuel-card{margin-top:10px;padding:10px 12px;background:rgba(200,160,80,0.06);border:0.5px solid rgba(200,160,80,0.14);border-radius:8px}
.fuel-title{font-size:12px;font-weight:700;color:#B8883E;margin-bottom:5px}
.fuel-row{font-size:12px;color:#7A6B8A;line-height:1.6;margin-bottom:3px}
.fuel-label{font-weight:600;color:#C49A4A}

/* ── TREADMILL ── */
.treadmill-card{background:rgba(200,160,80,0.06);border-radius:14px;padding:13px 16px;border:0.5px solid rgba(200,160,80,0.18);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.treadmill-left{flex:1;min-width:0}
.treadmill-header{font-size:14px;font-weight:700;color:#B8883E;display:flex;align-items:center;gap:6px;margin-bottom:3px}
.treadmill-spec{font-size:11px;font-weight:600;color:rgba(184,136,62,0.7);background:rgba(184,136,62,0.09);padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:4px}
.treadmill-note{font-size:11px;color:#9A8060;line-height:1.45}
.treadmill-detail{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}

/* ── PILATES / OTHER ── */
.other-card{background:rgba(255,255,255,0.5);border-radius:14px;padding:13px 16px;border:0.5px solid rgba(180,160,190,0.15)}
.other-card.pilates{background:rgba(220,140,170,0.08);border-color:rgba(220,140,170,0.22)}
.other-label{font-size:11px;color:#A898B0;text-transform:uppercase;letter-spacing:0.8px;font-weight:600}
.other-label.pilates{color:#C4607A}
.other-text{font-size:14px;color:#3D2E4A;font-weight:500;margin-top:3px}
.other-text.pilates{color:#9E4060}

/* ── SPIN ── */
.spin-card{background:rgba(139,92,246,0.06);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(139,92,246,0.18)}
.spin-icon-chip{width:38px;height:38px;border-radius:10px;background:rgba(139,92,246,0.12);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.spin-header-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.spin-title{font-size:15px;font-weight:700;color:#7C3AED}
.spin-subtitle{font-size:12px;color:#7A6B8A;margin-top:1px}
.spin-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.spin-stat{background:rgba(255,255,255,0.5);border-radius:8px;padding:7px 10px}
.spin-stat-label{font-size:10px;font-weight:600;color:#A898B0;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.spin-stat-val{font-size:14px;font-weight:700;color:#3D2E4A}

/* ── STEPS ── */
.steps-card{background:rgba(107,91,160,0.06);border-radius:14px;padding:13px 16px;border:0.5px solid rgba(107,91,160,0.14);display:flex;align-items:center;gap:12px}
.steps-left{flex:1}
.steps-header{font-size:14px;font-weight:700;color:#6B5B8A;margin-bottom:2px}
.steps-target{font-size:12px;color:#A898B0}

/* ── NOTES ── */
.notes-card{background:rgba(200,160,80,0.07);border-radius:14px;padding:12px 16px;border:0.5px solid rgba(200,160,80,0.18)}
.notes-title{font-size:11px;color:#B8883E;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.notes-text{font-size:13px;color:#7A6B8A;line-height:1.55}
.rest-card{text-align:center;padding:40px 20px;background:rgba(255,255,255,0.35);border-radius:14px}
.rest-icon{font-size:32px;margin-bottom:8px}
.rest-title{font-size:16px;font-weight:600;color:#8A7A9E}
.rest-sub{font-size:13px;color:#B8A5C0;margin-top:4px}

/* ── PROTEIN ── */
.protein-card{background:rgba(239,68,68,0.03);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(239,68,68,0.1)}
.protein-header{font-size:16px;font-weight:700;color:#DC2626;margin-bottom:10px}
.protein-ring-wrap{position:relative;width:100px;height:100px;margin:0 auto 8px}
.protein-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.protein-log-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(255,255,255,0.5);border-radius:8px;margin-bottom:3px;font-size:12px}
.protein-log-name{color:#3D2E4A;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.protein-log-macros{display:flex;gap:8px;align-items:center;flex-shrink:0}
.protein-log-g{color:#6B5B8A;font-weight:600}
.protein-log-cal{color:#A898B0;font-size:11px}
.protein-log-x{color:#C4607A;cursor:pointer;margin-left:6px;font-size:14px}
.pf-search-wrap{position:relative;margin-bottom:10px}
.pf-search{width:100%;padding:9px 12px;border-radius:10px;border:1px solid rgba(180,160,190,0.3);font-size:14px;background:rgba(255,255,255,0.7);color:#3D2E4A;outline:none;-webkit-appearance:none;box-sizing:border-box}
.pf-search:focus{border-color:#6B5B8A;background:rgba(255,255,255,0.9)}
.pf-results{background:rgba(255,255,255,0.97);border-radius:10px;border:0.5px solid rgba(180,160,190,0.2);overflow:hidden;margin-bottom:8px;max-height:260px;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.pf-result{padding:10px 12px;cursor:pointer;border-bottom:0.5px solid rgba(180,160,190,0.1)}
.pf-result:last-child{border-bottom:none}
.pf-result:active{background:rgba(107,91,138,0.08)}
.pf-result-name{font-size:13px;font-weight:600;color:#3D2E4A;margin-bottom:2px}
.pf-result-brand{font-size:11px;color:#A898B0;margin-bottom:3px}
.pf-result-macros{display:flex;gap:10px;flex-wrap:wrap;font-size:11px}
.pf-result-macro{color:#6B5B8A;font-weight:600}
.pf-result-macro span{color:#A898B0;font-weight:400}
.pf-no-results{padding:12px;text-align:center;font-size:13px;color:#A898B0}
.pf-loading{padding:12px;text-align:center;font-size:13px;color:#A898B0}
.pf-portion-wrap{background:rgba(107,91,138,0.06);border-radius:10px;padding:12px;margin-bottom:8px;border:0.5px solid rgba(107,91,138,0.15)}
.pf-portion-name{font-size:13px;font-weight:600;color:#3D2E4A;margin-bottom:8px;line-height:1.4}
.pf-portion-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pf-portion-input{width:80px;padding:6px 10px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);font-size:16px;font-weight:700;background:rgba(255,255,255,0.8);color:#3D2E4A;text-align:center;-webkit-appearance:none;outline:none}
.pf-portion-unit{font-size:13px;color:#A898B0}
.pf-portion-preview{font-size:12px;color:#6B5B8A;margin-bottom:8px;min-height:18px;line-height:1.4}
.pf-portion-btns{display:flex;gap:8px}
.pf-portion-add{flex:2;padding:8px;border-radius:8px;border:none;background:#6B5B8A;font-size:13px;color:white;font-weight:600;cursor:pointer;-webkit-appearance:none}
.pf-portion-cancel{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);background:none;font-size:13px;color:#A898B0;cursor:pointer;-webkit-appearance:none}
.pf-quick-label{font-size:11px;font-weight:600;color:#6B5B8A;margin-bottom:6px;margin-top:8px}
.pf-quick-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.pf-quick-pill{padding:5px 10px;background:rgba(255,255,255,0.5);border-radius:16px;font-size:11px;color:#3D2E4A;border:0.5px solid rgba(180,160,190,0.2);cursor:pointer}
.pf-quick-pill:active{background:rgba(107,91,138,0.1)}
.pf-quick-pill .pg{color:#A898B0;margin-left:2px}
.water-card{background:rgba(59,130,246,0.06);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(59,130,246,0.15)}
.water-header{font-size:16px;font-weight:700;color:#3B82F6;margin-bottom:4px}
.water-target{font-size:13px;color:#7A6B8A;margin-bottom:4px}
.weight-card{background:rgba(168,85,247,0.06);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(168,85,247,0.15)}
.weight-header{font-size:16px;font-weight:700;color:#8B5CF6;margin-bottom:8px}
.weight-input-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.weight-input{width:80px;padding:6px 10px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);font-size:16px;font-weight:700;background:rgba(255,255,255,0.6);color:#3D2E4A;text-align:center;-webkit-appearance:none}
.weight-input:focus{outline:none;border-color:#8B5CF6}
.weight-unit{font-size:13px;color:#A898B0}
.weight-saved{font-size:12px;color:#5B8A5E;font-weight:600}
.sleep-card{background:rgba(99,102,241,0.06);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(99,102,241,0.15)}
.sleep-header{font-size:16px;font-weight:700;color:#6366F1;margin-bottom:8px}
.sleep-input-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sleep-input{width:60px;padding:6px 10px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);font-size:16px;font-weight:700;background:rgba(255,255,255,0.6);color:#3D2E4A;text-align:center;-webkit-appearance:none}
.sleep-input:focus{outline:none;border-color:#6366F1}
.sleep-quality{display:flex;gap:6px;margin-bottom:6px}
.sleep-pill{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(180,160,190,0.2);background:rgba(255,255,255,0.4);color:#A898B0}
.sleep-pill.active{border-color:#6366F1;background:rgba(99,102,241,0.12);color:#6366F1}
.add-session-btn{background:none;border:1.5px dashed rgba(107,91,138,0.3);border-radius:12px;padding:12px;font-size:13px;color:#6B5B8A;cursor:pointer;width:100%;text-align:center;font-weight:600;-webkit-appearance:none}
.add-option{padding:12px 14px;background:rgba(255,255,255,0.55);border-radius:10px;margin-bottom:6px;cursor:pointer;border:0.5px solid rgba(180,160,190,0.2);font-size:13px;color:#3D2E4A;font-weight:500}
.add-option:active{background:rgba(107,91,138,0.1)}
.add-option-sub{font-size:11px;color:#A898B0;margin-top:2px;font-weight:400}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#3D2E4A;color:white;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all 0.3s ease;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.move-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.move-modal{background:linear-gradient(135deg,#FDF2F5,#EDE6F2);border-radius:16px;padding:20px;width:100%;max-width:320px}
.move-modal-title{font-size:14px;font-weight:700;color:#3D2E4A;margin-bottom:4px}
.move-modal-sub{font-size:12px;color:#A898B0;margin-bottom:14px}
.move-day-option{padding:10px 14px;background:rgba(255,255,255,0.55);border-radius:10px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:0.5px solid rgba(180,160,190,0.2)}
.move-day-name{font-size:13px;font-weight:600;color:#3D2E4A}
.move-day-date{font-size:11px;color:#A898B0}
.move-cancel{text-align:center;padding:10px;font-size:13px;color:#C4607A;font-weight:600;cursor:pointer;margin-top:4px}
.perfect-day{text-align:center;padding:14px;background:linear-gradient(135deg,rgba(91,138,94,0.12),rgba(16,185,129,0.08));border-radius:14px;border:1.5px solid rgba(91,138,94,0.3);margin-bottom:2px;animation:perfectPop 0.4s ease-out}
.perfect-day-icon{font-size:32px;margin-bottom:4px}
.perfect-day-title{font-size:16px;font-weight:800;color:#3D8A50;letter-spacing:0.5px}
.perfect-day-sub{font-size:12px;color:#5B8A5E;margin-top:2px}
@keyframes perfectPop{0%{transform:scale(0.9);opacity:0}100%{transform:scale(1);opacity:1}}
.dash{padding:16px;border-bottom:0.5px solid rgba(180,160,190,0.15)}
.dash-section{margin-bottom:14px}
.dash-section:last-child{margin-bottom:0}
.dash-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8A5C0;margin-bottom:8px}

const GG_ARMS_START=new Date(2026,4,11,12,0,0);

function ggArmsActive(d){
const day=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);
return day>=GG_ARMS_START;
}

function getBridalArmsDay(){
const today=new Date(currentDate.getFullYear(),currentDate.getMonth(),currentDate.getDate(),12,0,0);

}

const FORM={
“Banded glute bridge (warm-up)”:{form:“Feet flat hip-width. Drive through heels. Squeeze glutes hard at top \u2014 2-sec hold. Don’t let knees cave.”,link:“https://www.youtube.com/watch?v=GmRSV_n2E_0”},
“Hip thrust (booty builder)”:{form:“Shoulder blades on pad edge. Chin tucked, look forward. Drive through heels. At lockout: ribs down, pelvis tucked (posterior pelvic tilt). Pause 2 sec and squeeze.”,link:“https://www.youtube.com/watch?v=xDmFkJxPzeM”},
“Single-leg glute bridge”:{form:“Back flat, one foot planted, other leg extended or knee held to chest. Drive through the planted heel. Hips level \u2014 don’t let the free side drop. Squeeze glute at top for 2 sec.”,link:“https://www.youtube.com/watch?v=AVAXhy6pl7o”},
“DB bench press”:{form:“Retract shoulder blades \u2014 squeeze them together and down. Slight arch in upper back. Lower DBs to chest, elbows at 45\u00B0. Press up and slightly inward.”,link:“https://www.youtube.com/watch?v=VmB1G1K7v94”},

“Pallof press”:{form:“Stand side-on to cable at chest height. Hold handle at chest. Press straight out \u2014 resist the rotation. Arms fully extended, hold 1 sec, return. Your core is fighting the cable’s pull.”,link:“https://www.youtube.com/watch?v=AH_QZLm_0-s”},
“Dead bug”:{form:“Back flat, arms straight up, knees at 90\u00B0. Press lower back into the floor \u2014 it must NOT leave the ground. Extend opposite arm and leg simultaneously. Breathe out as you extend.”,link:“https://www.youtube.com/watch?v=I5xbsA71v1A”},
“Banded clamshells (warm-up)”:{form:“Side-lying, band above knees, heels together. Open top knee like a clamshell \u2014 rotate from the hip, not lower back. Keep hips stacked vertically. Slow and controlled.”,link:“https://www.youtube.com/watch?v=cEaCnbGKmMQ”},
“Romanian deadlift”:{form:“Feet hip-width, soft knees locked in position. Push hips BACK \u2014 bar slides down your thighs. Feel the hamstring stretch. Back stays flat \u2014 the moment it rounds, that’s your range. Drive hips forward to return.”,link:“https://www.youtube.com/watch?v=JCXUYuzwNrM”},

“Lat pulldown”:{form:“Grip just wider than shoulders. Lean back ~15\u00B0. Pull bar to upper chest \u2014 lead with elbows, drive them down and back. Squeeze shoulder blades at the bottom. Control the return.”,link:“https://www.youtube.com/watch?v=CAwf7n6Luuc”},

function getForm(name){if(FORM[name])return FORM[name];for(const k in FORM){if(name.includes(k)||k.includes(name))return FORM[k]}return null}

function renderExercise(ex,i){
const f=getForm(ex.name);
let tags=””;
if(ex.load)tags+=’<span class="tag tag-load">\u2696\uFE0F ‘+(ex.load)+’</span>’;
if(ex.tempo)tags+=’<span class="tag tag-tempo">\u23F1\uFE0F ‘+(ex.tempo)+’</span>’;
if(ex.note)tags+=’<span class="tag-note">’+(ex.note)+’</span>’;
let formHtml=””;
if(f){formHtml=’<div class="ex-form"><div class="ex-form-text">\uD83D\uDCD0 ‘+f.form+’</div>’+(f.link?’<a href="'+f.link+'" target="_blank" rel="noopener" class="ex-video-link">\u25B6 Watch form video</a>’:’’)+’</div>’;}
const isBodyweight=!ex.load||ex.load.toLowerCase().includes(“bodyweight”)||[“plank”,“bird dog”,“dead bug”,“banded”,“frog”,“nordic”].some(k=>ex.name.toLowerCase().includes(k));
let trackerHtml=””;
if(!isBodyweight){trackerHtml=’<div class="ex-tracker" style="grid-column:2/-1;margin-top:4px;display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:#A898B0">Log:</span><input type="number" placeholder="kg" id="exw-'+(i)+'" style="width:50px;padding:3px 6px;border-radius:4px;border:0.5px solid rgba(180,160,190,0.3);font-size:11px;background:rgba(255,255,255,0.5);color:#3D2E4A" onchange="saveExLog('+(i)+')"><span style="font-size:10px;color:#A898B0">\u00D7</span><input type="number" placeholder="reps" id="exr-'+(i)+'" style="width:50px;padding:3px 6px;border-radius:4px;border:0.5px solid rgba(180,160,190,0.3);font-size:11px;background:rgba(255,255,255,0.5);color:#3D2E4A" onchange="saveExLog('+(i)+')"></div>’}
return’<div class="exercise" id="ex-'+i+'"><div class="ex-check" onclick="toggleEx('+i+')"></div><div class="ex-name">’+ex.name+’</div><div class="ex-sets">’+ex.sets+’ \u00D7 ‘+ex.reps+’</div>’+(tags?’<div class="ex-tags">’+tags+’</div>’:’’)+trackerHtml+formHtml+’</div>’;
}

function getFuel(r){
if(!r||r.type.includes(“RACE”))return null;
const km=parseFloat(r.km)||0;
const isTempo=r.type.toLowerCase().includes(“tempo”)||r.type.toLowerCase().includes(“interval”)||r.type.toLowerCase().includes(“hill”)||r.type.toLowerCase().includes(“speed”);
const isLong=r.type.toLowerCase().includes(“long”);
let pre=””,during=””,after=””;
if(km<=5&&!isTempo){pre=”\u2615 Optional: coffee + small banana. Stay hydrated.”;during=”\uD83D\uDCA7 No fuel needed.”;after=”\uD83E\uDD5B Small snack if hungry.”}
else if(km<=7&&!isTempo){pre=”\uD83C\uDF4C Small banana or toast with honey 30\u201360 min before.”;during=”\uD83D\uDCA7 No fuel needed. Carry water if hot.”;after=”\uD83E\uDD5B 20\u201330g protein within 45 min.”}
else if(isTempo){pre=”\uD83C\uDF5E Carb-rich snack 60\u201390 min before: toast + banana, oats, or rice cakes with honey.”;during=km>8?”\uD83D\uDCA7 Carry water. Consider a gel if session is 60+ min.”:”\uD83D\uDCA7 Carry water. No gel needed under 60 min.”;after=”\uD83E\uDD5B Recovery meal within 30 min: 20\u201330g protein + carbs.”}
else if(isLong&&km>=14){pre=”\uD83C\uDF5A Proper meal 2\u20133 hrs before: oats + banana + honey, toast with PB, or rice + eggs.”;during=km>=16?”\u26A1 Gel at km 7 and km 14. Water every 3\u20134 km.”:”\uD83D\uDCA7 Water every 3\u20134 km. Optional: 1 gel at km 8\u201310.”;after=”\uD83E\uDD5B Recovery meal within 30 min: protein + carbs + electrolytes.”}
else{pre=”\uD83C\uDF4C Toast + banana 60\u201390 min before if needed.”;during=”\uD83D\uDCA7 Carry water.”;after=”\uD83E\uDD5B 20\u201330g protein + carbs within 45 min.”}
return{pre,during,after};
}

function renderRun(r){
if(!r)return””;
var isRace=r.type.includes(“RACE”);
var fuelHtml=””;
var fuel=getFuel(r);
if(fuel){fuelHtml=’<div class="fuel-card"><div class="fuel-title">\uD83C\uDF7D\uFE0F Fuelling</div><div class="fuel-row"><span class="fuel-label">Before:</span> ‘+fuel.pre+’</div><div class="fuel-row"><span class="fuel-label">During:</span> ‘+fuel.during+’</div><div class="fuel-row"><span class="fuel-label">After:</span> ‘+fuel.after+’</div></div>’;}
var subLabel=isRace?“A-race \u00B7 Give everything”:r.int||””;
var subHtml=subLabel?’<div class="run-sub">’+subLabel+’</div>’:””;
var noteHtml=r.note?’<div class="run-note">’+r.note+’</div>’:””;
var icon=isRace?”\uD83C\uDFC1”:”\uD83C\uDFC3\u200D\u2640\uFE0F”;
return ‘<div class=“run-card ‘+(isRace?“race”:“normal”)+’”>’
+’<div class="run-header">’
+’<div class=“run-icon-chip ‘+(isRace?“race”:“normal”)+’”>’+icon+’</div>’
+’<div class="run-title-wrap">’
+’<div class=“run-type ‘+(isRace?“race”:“normal”)+’”>’+r.type+’</div>’
+subHtml
+’</div>’
+’<div class="run-km">’+r.km+’ km</div>’
+’</div>’
+’<div class="run-stats">’
+’<div class="run-stat"><div class="run-label">Pace</div><div class="run-value">’+r.pace+’</div></div>’
+’<div class="run-stat"><div class="run-label">Zone</div><div class="run-value">’+r.int+’</div></div>’
+’</div>’
+noteHtml
+fuelHtml
+’<div class="run-check-row" onclick="toggleRun()"><div class="run-check-box" id="run-check"></div><div class="run-check-label" id="run-label">Mark run complete</div></div>’
+(isRace?””:moveBtn(“run”,r.type))
+’</div>’;
}

function renderStrength(s){if(!s)return””;return’<div class="strength-card"><div class="strength-header"><div class="str-icon-chip">\uD83D\uDCAA</div><div class="str-title-wrap"><div class="strength-name">’+(s.name)+’</div></div><div class="str-dur-pill">’+(s.duration)+’</div></div><div style="display:flex;flex-direction:column;gap:3px">’+(s.exercises.map((e,i)=>renderExercise(e,i)).join(””))+’<div class="run-check-row" onclick="toggleStrength()"><div class="run-check-box" id="str-check"></div><div class="run-check-label" id="str-label">Mark session complete</div></div></div>’+(moveBtn(“str”,“Strength session”))+’</div>’+renderTreadmill()}
function renderTreadmill(){return’<div class="treadmill-card"><div class="treadmill-left"><div class="treadmill-header">\uD83D\uDEB6\u200d\u2640\uFE0F Incline Walk \u2014 30 min</div><span class="treadmill-spec">10\u201312% incline \u00B7 5.5\u20136.5 km/h</span><div class="treadmill-note">Don't hold the rails. Strong glute drive every step.</div></div><div class="run-check-row" style="margin:0;padding:0;border:none;flex-shrink:0" onclick="toggleTreadmill()"><div class="run-check-box" id="tm-check"></div><div class="run-check-label" id="tm-label" style="font-size:12px">Done</div></div></div>’}

let currentDate=new Date();currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth(),currentDate.getDate(),12,0,0);

function renderDashboard(){
const today=new Date();const todayNorm=new Date(today.getFullYear(),today.getMonth(),today.getDate(),12,0,0);
const block=getBlock(todayNorm);let dhtml=””;
if(block){const weekInBlock=getWeek(todayNorm,block);const pct=Math.min(Math.round((weekInBlock/block.weeks)*100),100);dhtml+=’<div class="dash-section"><div class="dash-title">Current Block</div><div class="block-name" style="color:'+(block.color)+';font-size:15px">’+(block.name)+’</div><div class="progress-text">Week ‘+(weekInBlock)+’ of ‘+(block.weeks)+’ \u2022 ‘+(block.weeklyKm)+’ km/week</div><div class="progress-wrap"><div class="progress-bar" style="width:'+(pct)+'%;background:'+(block.color)+'"></div></div></div>’}

function restoreChecks(){
const s=getState();
Object.keys(s.ex).forEach(i=>{const el=$(“ex-”+i);if(el&&s.ex[i]){el.querySelector(”.ex-check”).classList.add(“done”);el.classList.add(“checked”)}});
const pairs=[[“run-check”,“run-label”,“Run complete \u2713”],[“str-check”,“str-label”,“Session complete \u2713”],[“pil-check”,“pil-label”,“Pilates complete \u2713”],[“tm-check”,“tm-label”,“Treadmill complete \u2713”],[“steps-check”,“steps-label”,“14k steps complete \u2713”],[“spin-check”,“spin-label”,“Spin complete \u2713”],[“water-check”,“water-label”,“2L+ water hit \u2713”],[“ba-check”,“ba-label”,“Gabby George Arms complete \u2713”]];
const stateKeys=[“run”,“str”,“pil”,“tm”,“steps”,“spin”,“water”,“ba”];
pairs.forEach(([ck,cl,text],i)=>{const ch=$(ck),lb=$(cl);if(ch&&s[stateKeys[i]]){ch.classList.add(“done”);if(lb){lb.classList.add(“done”);lb.textContent=text}}});
checkPerfectDay();
}

function checkPerfectDay(){
const s=getState();const log=getProteinLog();const proteinHit=log.reduce((sum,f)=>sum+f.g,0)>=110;
let allDone=true;
[[“run-check”,“run”],[“str-check”,“str”],[“pil-check”,“pil”],[“tm-check”,“tm”],[“spin-check”,“spin”]].forEach(([ck,sk])=>{if($(ck)&&!s[sk])allDone=false});
if(!s.steps||!s.water||!proteinHit||(ggArmsActive(currentDate)&&!s.ba))allDone=false;
const existing=$(“perfect-day-banner”);
if(allDone&&!existing){const banner=document.createElement(“div”);banner.id=“perfect-day-banner”;banner.className=“perfect-day”;banner.innerHTML=’<div class="perfect-day-icon">\u2B50</div><div class="perfect-day-title">PERFECT DAY</div><div class="perfect-day-sub">Every box ticked. That's how champions are built.</div>’;$(“content”).insertBefore(banner,$(“content”).firstChild)}
else if(!allDone&&existing){existing.remove()}
}

function getCalTarget(date){
var plan=getPlan(date);
var hasHard=plan.run&&(plan.run.type.toLowerCase().indexOf(“tempo”)>=0||plan.run.type.toLowerCase().indexOf(“interval”)>=0||plan.run.type.toLowerCase().indexOf(“hill”)>=0||plan.run.type.toLowerCase().indexOf(“race”)>=0||plan.run.type.toLowerCase().indexOf(“long”)>=0);
var hasSession=!!(plan.run||plan.str||plan.spin);
if(hasHard)return 2000;
if(hasSession)return 1900;
return 1700;
}

function resolveCal(entry){if(entry.cal&&entry.cal>0)return entry.cal;var m=PFOODS.find(function(p){return p.name===entry.name;});return m?m.cal:0;}

function pfFetch(query){
var re=document.getElementById(“pf-results”);if(!re)return;
var key=“mkz1vuOZoZUlNnU1KhBDX6rHqwbkX97TizE9I4b5”;
var url=“https://api.nal.usda.gov/fdc/v1/foods/search?query=”+encodeURIComponent(query)+”&pageSize=12&dataType=Foundation,SR%20Legacy,Survey%20(FNDDS),Branded&api_key=”+key;
fetch(url).then(function(r){return r.json();}).then(function(data){
if(!re)return;
var foods=(data.foods||[]);
if(!foods.length){re.innerHTML=’<div class="pf-no-results">No results. Try different search terms.</div>’;return;}
window._pfProducts=foods;
re.innerHTML=foods.map(function(f,i){
var nuts=f.foodNutrients||[];
function getNut(name){var n=nuts.find(function(x){return x.nutrientName&&x.nutrientName.toLowerCase().indexOf(name)>=0;});return n?Math.round(n.value*10)/10:0;}
var cal=getNut(“energy”)||getNut(“kcal”);
// USDA returns energy in kJ sometimes \u2014 convert if suspiciously high
if(cal>900){cal=Math.round(cal/4.184);}
var prot=getNut(“protein”);
var carb=getNut(“carbohydrate”);
var fat=getNut(“total lipid”);
var brand=f.brandOwner||f.brandName||””;
var srv=f.servingSize?Math.round(f.servingSize)+“g”:f.householdServingFullText||“per 100g”;
return ‘<div class="pf-result" onclick="pfSelect('+i+')">’
+’<div class="pf-result-name">’+f.description+’</div>’
+(brand?’<div class="pf-result-brand">’+brand+’</div>’:””)
+’<div class="pf-result-macros">’
+’<div class="pf-result-macro">’+cal+’<span> kcal</span></div>’
+’<div class="pf-result-macro">’+prot+‘g<span> prot</span></div>’
+’<div class="pf-result-macro">’+carb+‘g<span> carbs</span></div>’
+’<div class="pf-result-macro">’+fat+‘g<span> fat</span></div>’
+’<div class="pf-result-macro" style="color:#B0A0B8;font-weight:400">’+srv+’</div>’
+’</div></div>’;
}).join(””);
}).catch(function(){if(re)re.innerHTML=’<div class="pf-no-results">Search failed. Check your connection.</div>’;});
}

if(/egg/.test(n))return”\uD83E\uDD5A”;

if(/yogurt|yoghurt|chobani|yopro/.test(n))return”\uD83E\uDD44”;
if(/cheese|cottage/.test(n))return”\uD83E\uDDC0”;

if(/bread|toast|wrap|tortilla|bagel/.test(n))return”\uD83C\uDF5E”;
if(/rice|pasta|noodle|spaghetti/.test(n))return”\uD83C\uDF5A”;
if(/banana|apple|berry|fruit|mango|orange/.test(n))return”\uD83C\uDF4C”;
if(/salad|spinach|lettuce|greens|kale/.test(n))return”\uD83E\uDD57”;
if(/vegetable|veg|broccoli|carrot|potato|sweet potato|zucchini/.test(n))return”\uD83E\uDD66”;
if(/nut|almond|peanut|cashew|walnut/.test(n))return”\uD83E\uDD5C”;
if(/coffee|latte|flat white|espresso/.test(n))return”\u2615”;
if(/chocolate|choc/.test(n))return”\uD83C\uDF6B”;
if(/soup|stew|chili|chilli|curry/.test(n))return”\uD83C\uDF72”;

if(!name||g<=0)return;

function renderProtein(){

var log=getProteinLog();
var needsSave=false;
log.forEach(function(e){var c=resolveCal(e);if(c>0&&e.cal!==c){e.cal=c;needsSave=true;}});

var totalProt=log.reduce(function(s,f){return s+(f.g||0);},0);
var totalCal=log.reduce(function(s,f){return s+resolveCal(f);},0);
var calTarget=getCalTarget(currentDate);
var protTarget=110;
var protPct=Math.min(Math.round((totalProt/protTarget)*100),100);
var calPct=Math.min(Math.round((totalCal/calTarget)*100),100);
var calRemaining=Math.max(calTarget-totalCal,0);
var protRemaining=Math.max(protTarget-totalProt,0);
var calOver=totalCal>calTarget;
var calColor=calOver?”#DC2626”:calPct>=85?”#B8883E”:”#6B5B8A”;
var plan=getPlan(currentDate);
var dayLabel=!!(plan.run||plan.str||plan.spin)?“training day”:“rest day”;

te.textContent=Math.round(totalProt*10)/10+“g”;

if(se){
if(totalProt>=protTarget){se.textContent=”\u2705 Protein hit! “+Math.round(totalProt)+“g”;se.style.color=”#5B8A5E”;}
else if(totalProt>0){se.textContent=Math.round(protRemaining)+“g protein to go”;se.style.color=”#6B5B8A”;}

}

if(le){
le.innerHTML=log.length===0?’<div style="text-align:center;padding:8px;color:#B8A5C0;font-size:11px">Nothing logged yet</div>’:
log.map(function(f,i){
var cal=resolveCal(f);
return ‘<div class="protein-log-item">’
+’<span class="protein-log-name">’+(f.emoji||”\uD83C\uDF7D\uFE0F”)+’ ‘+(f.name||””)+’</span>’
+’<span class="protein-log-macros">’
+’<span class="protein-log-g">’+Math.round((f.g||0)*10)/10+‘g</span>’
+’<span class="protein-log-cal">’+(cal||0)+’ cal</span>’
+’<span class="protein-log-x" onclick="removeProtein('+i+')">\u00D7</span>’
+’</span></div>’;
}).join(””);
}

// Calorie bar

cb.style.cssText=“margin-top:10px;padding:10px 12px;background:rgba(107,91,138,0.05);border-radius:10px;border:0.5px solid rgba(107,91,138,0.12)”;
if(se&&se.parentElement)se.parentElement.insertBefore(cb,se.nextSibling);
}
var overMsg=calOver?”<span style="color:#DC2626;font-weight:600">\u26A0\uFE0F “+(totalCal-calTarget)+” cal over</span>”:calRemaining+” cal remaining”;
cb.innerHTML=’<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">’
+’<div style="font-size:12px;font-weight:700;color:#6B5B8A">\uD83D\uDD25 Calories \u2014 ‘+dayLabel+’</div>’
+’<div style="font-size:11px;font-weight:700;color:'+calColor+'">’+totalCal+’ <span style="font-weight:400;color:#A898B0">/ ‘+calTarget+’</span></div>’
+’</div>’
+’<div style="background:rgba(180,160,190,0.15);border-radius:4px;height:7px;overflow:hidden;margin-bottom:6px">’
+’<div style="height:100%;width:'+Math.min(calPct,100)+'%;background:'+(calOver?'linear-gradient(90deg,#DC2626,#EF4444)':'linear-gradient(90deg,#6B5B8A,rgba(107,91,138,0.6))')+';border-radius:4px;transition:width 0.3s"></div>’
+’</div>’
+’<div style="display:flex;justify-content:space-between;font-size:11px">’
+’<span style="color:#A898B0">’+overMsg+’</span>’
+’<span style="color:#A898B0">500 cal deficit</span>’
+’</div>’;

// Quick-add pills
if(fe){
var qh=’<div class="pf-quick-label">Quick add \u2014 your usual foods</div><div class="pf-quick-pills">’;
qh+=PFOODS.map(function(f,i){return ‘<div class="pf-quick-pill" onclick="addProtein('+i+',false)">’+(f.emoji)+’ ‘+(f.name)+’ <span class="pg">’+f.g+‘g \u00B7 ‘+f.cal+‘cal</span></div>’;}).join(””);

if(cf.length){qh+=cf.map(function(f,i){return ‘<div class="pf-quick-pill" onclick="addProtein('+i+',true)">’+(f.emoji||”\uD83C\uDF7D\uFE0F”)+’ ‘+(f.name)+’ <span class="pg">’+f.g+‘g’+(f.cal?’ \u00B7 ‘+f.cal+‘cal’:’’)+’ <span onclick="event.stopPropagation();deleteCustomFood('+i+')" style="color:#C4607A;margin-left:4px;cursor:pointer">\u00D7</span></span></div>’;}).join(””);}
qh+=’</div>’;
qh+=’<div id="custom-food-form" style="display:none;margin-top:10px;padding:12px;background:rgba(107,91,138,0.06);border-radius:10px;border:0.5px solid rgba(107,91,138,0.2)">’
+’<div style="font-size:12px;font-weight:700;color:#6B5B8A;margin-bottom:8px">Add Custom Food</div>’
+’<div style="display:flex;gap:8px;margin-bottom:8px"><input id="cf-emoji" type="text" placeholder="\uD83C\uDF7D\uFE0F" maxlength="2" style="width:48px;text-align:center;font-size:18px;border:1px solid rgba(180,160,190,0.3);border-radius:8px;padding:6px;background:rgba(255,255,255,0.6);outline:none"><input id="cf-name" type="text" placeholder="Food name" style="flex:1;border:1px solid rgba(180,160,190,0.3);border-radius:8px;padding:6px 10px;font-size:13px;background:rgba(255,255,255,0.6);outline:none;color:#3D2E4A"></div>’

+’<div><div style="font-size:11px;color:#A898B0;margin-bottom:4px">Calories</div><div style="display:flex;align-items:center;gap:6px"><button onclick="adjustCals(-25)" style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:16px;color:#6B5B8A;cursor:pointer">\u2212</button><span id="cf-cals" style="font-size:16px;font-weight:700;color:#3D2E4A;min-width:32px;text-align:center">200</span><button onclick="adjustCals(25)" style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:16px;color:#6B5B8A;cursor:pointer">+</button></div></div>’
+’</div>’
+’<div style="display:flex;gap:8px"><button onclick="toggleCustomForm()" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);background:none;font-size:13px;color:#A898B0;cursor:pointer">Cancel</button><button onclick="addCustomFood()" style="flex:2;padding:8px;border-radius:8px;border:none;background:#6B5B8A;font-size:13px;color:white;font-weight:600;cursor:pointer">Save Food</button></div>’

if(tip){

else if(totalProt>=protTarget&&totalCal<=calTarget)tip.innerHTML=”\u2705 Protein and calories on track. Perfect day.”;
else if(totalProt>=protTarget)tip.innerHTML=”\u2705 Protein hit. “+calRemaining+” cal left \u2014 veg and protein only.”;
else if(protRemaining<=25)tip.innerHTML=”\uD83D\uDCA1 Almost there. “+calRemaining+” cal left \u2014 tuna or Chobani closes both gaps.”;

}

function sleepKey(d){return”tp-sleep-”+d.getFullYear()+”-”+(d.getMonth()+1)+”-”+d.getDate()}
function getSleep(d){try{const v=localStorage.getItem(sleepKey(d));return v?JSON.parse(v):null}catch(e){return null}}
function saveSleep(){const sc=$(“sleep-score”),ho=$(“sleep-hours”);if(!sc)return;const score=parseInt(sc.value)||0,hours=parseFloat(ho.value)||0,q=document.querySelector(”.sleep-pill.active”),qv=q?q.dataset.val:””;try{localStorage.setItem(sleepKey(currentDate),JSON.stringify({score,hours,quality:qv}))}catch(e){}const sv=$(“sleep-saved”);if(sv)sv.textContent=”\u2713”;renderSleepSpark()}
function setSleepQuality(val){document.querySelectorAll(”.sleep-pill”).forEach(p=>p.classList.remove(“active”));const el=document.querySelector(’.sleep-pill[data-val=”’+val+’”]’);if(el)el.classList.add(“active”);saveSleep()}
function restoreSleep(){const sc=$(“sleep-score”),ho=$(“sleep-hours”),qd=$(“sleep-quality”);if(!sc)return;qd.innerHTML=[’\uD83D\uDE34 Poor’,’\uD83D\uDE10 OK’,’\uD83D\uDE0A Good’,’\uD83C\uDF1F Great’].map((l,i)=>{const v=[“poor”,“ok”,“good”,“great”][i];return’<div class="sleep-pill" data-val="'+(v)+'" onclick="setSleepQuality(\''+(v)+'\')">’+(l)+’</div>’}).join(””);const data=getSleep(currentDate);if(data){if(data.score)sc.value=data.score;if(data.hours)ho.value=data.hours;if(data.quality){const el=document.querySelector(’.sleep-pill[data-val=”’+data.quality+’”]’);if(el)el.classList.add(“active”)}$(“sleep-saved”).textContent=”\u2713”}renderSleepSpark()}
function renderSleepSpark(){const c=$(“sleep-spark-container”);if(!c)return;const h=[];const d=new Date(currentDate);for(let i=0;i<14;i++){const s=getSleep(d);if(s&&s.score>0)h.push(s.score);d.setDate(d.getDate()-1)}h.reverse();if(h.length<2){c.innerHTML=’<div style="font-size:11px;color:#A898B0;text-align:center;padding:4px 0">Log sleep to start tracking</div>’;return}const avg=Math.round(h.reduce((s,v)=>s+v,0)/h.length);const latest=h[h.length-1];const latestColor=latest>=80?”#5B8A5E”:latest>=60?”#B8883E”:”#DC2626”;const W=300,H=44,padX=6,padY=6;const min=Math.min(…h),max=Math.max(…h),range=max-min||10;const pts=h.map((v,i)=>{const x=padX+i*((W-padX*2)/(h.length-1));const y=padY+(1-(v-min)/range)*(H-padY*2);return[Math.round(x*10)/10,Math.round(y*10)/10]});const poly=pts.map(p=>p[0]+”,”+p[1]).join(” “);const area=poly+” “+pts[pts.length-1][0]+”,”+(H+2)+” “+pts[0][0]+”,”+(H+2);const lp=pts[pts.length-1];const dotS=pts.map((p,i)=>i===pts.length-1?’<circle cx="'+p[0]+'" cy="'+p[1]+'" r="4" fill="#6366F1" stroke="white" stroke-width="2"/>’:’’).join(’’);
c.innerHTML=’<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="margin-top:8px;overflow:visible" preserveAspectRatio="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/><stop offset="100%" stop-color="#6366F1" stop-opacity="0"/></linearGradient></defs><polygon points="'+area+'" fill="url(#sg)"/><polyline points="'+poly+'" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>’+dotS+’</svg><div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px"><span style="color:#A898B0">Avg: ‘+avg+’/100</span><span style="font-weight:700;color:'+latestColor+'">’+latest+’/100</span></div>’;}

// \u2500\u2500\u2500 WEIGHT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500

c.innerHTML=’<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="margin-top:8px;overflow:visible" preserveAspectRatio="none"><defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/></linearGradient></defs><polygon points="'+area+'" fill="url(#wg)"/><polyline points="'+poly+'" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>’+dotW+’</svg><div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px"><span style="color:#A898B0">’+latest+’ kg now</span><span style="font-weight:700;color:'+diffColor+'">’+diffSign+diff+’ kg</span></div>’;}

function showMoveModal(type,label){moveTarget={type,label};moveSourceDate=new Date(currentDate.getFullYear(),currentDate.getMonth(),currentDate.getDate(),12,0,0);const DN=[“Sun”,“Mon”,“Tue”,“Wed”,“Thu”,“Fri”,“Sat”],MN=[“Jan”,“Feb”,“Mar”,“Apr”,“May”,“Jun”,“Jul”,“Aug”,“Sep”,“Oct”,“Nov”,“Dec”];let prevHtml=””,nextHtml=””;for(let i=-6;i<=6;i++){if(i===0)continue;const d=new Date(moveSourceDate);d.setDate(d.getDate()+i);const opt=’<div class="move-day-option" onclick="moveSession('+(d.getFullYear())+','+(d.getMonth())+','+(d.getDate())+')"><div class="move-day-name">’+(DN[d.getDay()])+’ ‘+(d.getDate())+’ ‘+(MN[d.getMonth()])+’</div><div class="move-day-date">’+(i<0?Math.abs(i)+” days ago”:“in “+i+” day”+(i>1?“s”:””))+’</div></div>’;if(i<0)prevHtml+=opt;else nextHtml+=opt}const ov=document.createElement(“div”);ov.className=“move-overlay”;ov.id=“moveOverlay”;ov.innerHTML=’<div class="move-modal" style="max-height:85vh;overflow-y:auto"><div class="move-modal-title">Move: ‘+(label)+’</div><div class="move-modal-sub">Pick a day</div>’+(prevHtml)+(nextHtml)+’<div class="move-cancel" onclick="closeMoveModal()">Cancel</div></div>’;document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)closeMoveModal()}}

function deleteSession(type){
var confirmed=window.confirm(“Delete this session from today?”);
if(!confirmed)return;
try{
var fk=movedKeyFor(currentDate);
var fm=JSON.parse(localStorage.getItem(fk)||”[]”);
// Remove any existing entry for this type
fm=fm.filter(function(x){return x.type!==type;});
// Check if this is a moved-in session (added from another day)
var wasMovedIn=getMovedIn(currentDate).find(function(x){return x.type===type;});
if(wasMovedIn){
// Just remove the moved-in entry
localStorage.setItem(fk,JSON.stringify(fm));
} else {
// Mark as removed from its original day
fm.push({type:type,label:type,action:“removed”});
localStorage.setItem(fk,JSON.stringify(fm));
}
}catch(e){}
render();
}
function movedKeyFor(d){return”tp-moved-”+d.getFullYear()+”-”+(d.getMonth()+1)+”-”+d.getDate()}
function getMovedOut(d){try{return JSON.parse(localStorage.getItem(movedKeyFor(d))||”[]”).filter(x=>x.action===“removed”).map(x=>x.type)}catch(e){return[]}}
function getMovedIn(d){try{return JSON.parse(localStorage.getItem(movedKeyFor(d))||”[]”).filter(x=>x.action===“added”)}catch(e){return[]}}
function moveSession(y,m,d){if(!moveTarget||!moveSourceDate)return;const src=moveSourceDate;try{const fk=movedKeyFor(src);let fm=JSON.parse(localStorage.getItem(fk)||”[]”);const ea=fm.find(x=>x.type===moveTarget.type&&x.action===“added”);let ty,tm2,td;if(ea&&ea.originY!==undefined){ty=ea.originY;tm2=ea.originM;td=ea.originD;fm=fm.filter(x=>!(x.type===moveTarget.type&&x.action===“added”))}else{ty=src.getFullYear();tm2=src.getMonth();td=src.getDate();fm=fm.filter(x=>!(x.type===moveTarget.type&&x.action===“removed”));fm.push({type:moveTarget.type,label:moveTarget.label,action:“removed”})}localStorage.setItem(fk,JSON.stringify(fm));const toDate=new Date(y,m,d,12,0,0),tk=movedKeyFor(toDate);let tms=JSON.parse(localStorage.getItem(tk)||”[]”);tms=tms.filter(x=>!(x.type===moveTarget.type&&x.action===“added”));tms.push({type:moveTarget.type,label:moveTarget.label,action:“added”,originY:ty,originM:tm2,originD:td});localStorage.setItem(tk,JSON.stringify(tms))}catch(e){}closeMoveModal();render()}

// \u2500\u2500\u2500 ADD SESSION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function addedSessionsKey(d){return”tp-added-”+d.getFullYear()+”-”+(d.getMonth()+1)+”-”+d.getDate()}
function getAddedSessions(d){try{return JSON.parse(localStorage.getItem(addedSessionsKey(d))||”[]”)}catch(e){return[]}}
function saveAddedSession(type){try{const added=getAddedSessions(currentDate);added.push({type});localStorage.setItem(addedSessionsKey(currentDate),JSON.stringify(added))}catch(e){}closeMoveModal();showToast(”\u2705 Session added”);render()}
function removeAddedSession(i){try{const added=getAddedSessions(currentDate);added.splice(i,1);localStorage.setItem(addedSessionsKey(currentDate),JSON.stringify(added))}catch(e){}render()}
function showAddSessionModal(){const ov=document.createElement(“div”);ov.className=“move-overlay”;ov.id=“moveOverlay”;const p=phase(getBlock(currentDate)?getBlock(currentDate).id:“block1”);ov.innerHTML=’<div class="move-modal" style="max-height:85vh;overflow-y:auto"><div class="move-modal-title">Add a Session</div><div class="move-modal-sub">Pick what to add to today</div><div class="add-option" onclick="saveAddedSession(\'strA\')">\uD83D\uDCAA Strength A \u2014 Glute + Push<div class="add-option-sub">Hip thrust, glute bridge, bench, shoulder press</div></div><div class="add-option" onclick="saveAddedSession(\'strB\')">\uD83D\uDCAA Strength B \u2014 Posterior + Pull<div class="add-option-sub">RDL, kickback, lat pulldown, seated row</div></div><div class="add-option" onclick="saveAddedSession(\'strC\')">\uD83D\uDCAA Strength C \u2014 Glute Activation + Core<div class="add-option-sub">Hip thrust, step-ups, frog pumps, core</div></div><div class="add-option" onclick="saveAddedSession(\'easyRun\')">\uD83C\uDFC3\u200d\u2640\uFE0F Easy Run<div class="add-option-sub">5\u20136 km @ 5:50\u20136:10/km, Zone 2</div></div><div class="add-option" onclick="saveAddedSession(\'longRun\')">\uD83C\uDFC3\u200d\u2640\uFE0F Long Run<div class="add-option-sub">14+ km @ 5:50\u20136:15/km, Zone 2</div></div><div class="add-option" onclick="saveAddedSession(\'spin\')">\uD83D\uDEB4\u200d\u2640\uFE0F Spin Class<div class="add-option-sub">45 min, Zone 2 cardio</div></div><div class="add-option" onclick="saveAddedSession(\'pilates\')">\uD83E\uDDD8\u200d\u2640\uFE0F Pilates<div class="add-option-sub">Flexibility + core session</div></div><div class="add-option" onclick="saveAddedSession(\'treadmill\')">\uD83D\uDEB6\u200d\u2640\uFE0F Incline Treadmill<div class="add-option-sub">30 min, 10\u201312% incline</div></div><div class="move-cancel" onclick="closeMoveModal()">Cancel</div></div>’;document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)closeMoveModal()}}
function renderAddedSessions(){const added=getAddedSessions(currentDate);const p=phase(getBlock(currentDate)?getBlock(currentDate).id:“block1”);let html=””;added.forEach((item,i)=>{const badge=’<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div style="font-size:10px;color:#6B5B8A;font-weight:600;padding:3px 8px;background:rgba(107,91,138,0.1);border-radius:4px;display:inline-block">\uFF0B Added</div><button onclick="removeAddedSession('+(i)+')" style="background:none;border:none;font-size:11px;color:#C4607A;cursor:pointer;padding:4px 8px">Remove</button></div>’;if(item.type===“strA”)html+=badge+renderStrength(SA(p));else if(item.type===“strB”)html+=badge+renderStrength(SB(p));else if(item.type===“strC”)html+=badge+renderStrength(SC(p));else if(item.type===“easyRun”)html+=badge+renderRun({type:“Easy run (added)”,km:“5\u20136”,pace:“5:50\u20136:10/km”,int:“Zone 2”,note:””});else if(item.type===“longRun”)html+=badge+renderRun({type:“Long run (added)”,km:“14”,pace:“5:50\u20136:15/km”,int:“Zone 2”,note:””});else if(item.type===“spin”)html+=badge+’<div class="spin-card"><div class="spin-left"><div class="spin-header">\uD83D\uDEB4\u200d\u2640\uFE0F Spin Class</div><div class="spin-detail">45 min \u00B7 Zone 2.</div></div></div>’;else if(item.type===“pilates”)html+=badge+’<div class="other-card pilates"><div class="other-label pilates">\uD83E\uDDD8\u200d\u2640\uFE0F Pilates</div><div class="other-text pilates">Added session</div></div>’;else if(item.type===“treadmill”)html+=badge+renderTreadmill();});return html}

// \u2500\u2500\u2500 WAIST TRACKER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function waistKey(d){return”tp-waist-”+d.getFullYear()+”-”+(d.getMonth()+1)+”-”+d.getDate()}
function getWaist(d){try{const v=localStorage.getItem(waistKey(d));return v?JSON.parse(v):null}catch(e){return null}}
function getMondayOf(d){const day=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);const dow=day.getDay();const diff=dow===0?6:dow-1;day.setDate(day.getDate()-diff);return day}
function saveWaist(){const input=$(“waist-input”);if(!input||!input.value)return;const w=parseFloat(input.value);if(isNaN(w)||w<40||w>120)return;const monday=getMondayOf(currentDate);try{localStorage.setItem(waistKey(monday),JSON.stringify(w))}catch(e){}const sv=$(“waist-saved”);if(sv)sv.textContent=”\u2713 Saved”;renderWaistSpark()}
function restoreWaist(){
const area=$(“waist-input-area”);if(!area)return;
const isMonday=currentDate.getDay()===1;
const monday=getMondayOf(currentDate);
const existing=getWaist(monday);
if(isMonday){
area.innerHTML=’<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><input type="number" step="0.1" placeholder="72.0" id="waist-input" style="width:80px;padding:6px 10px;border-radius:8px;border:1px solid rgba(196,96,122,0.25);font-size:16px;font-weight:700;background:rgba(255,255,255,0.6);color:#3D2E4A;text-align:center;-webkit-appearance:none" onchange="saveWaist()"><span style="font-size:13px;color:#A898B0">cm</span><span style="font-size:12px;font-weight:600;color:#5B8A5E" id="waist-saved"></span></div>’;
if(existing){$(“waist-input”).value=existing;$(“waist-saved”).textContent=”\u2713 Saved”}
}else{
const lastMonday=getMondayOf(currentDate);
const lastVal=getWaist(lastMonday);
area.innerHTML=lastVal?’<div style="font-size:13px;color:#7A6B8A">This week's measurement: <strong style="color:#C4607A">’+(lastVal)+’ cm</strong></div><div style="font-size:11px;color:#A898B0;margin-top:4px">Log each Monday morning before eating</div>’:’<div style="font-size:12px;color:#A898B0">No measurement this week yet \u2014 log next Monday morning.</div>’;
}
renderWaistSpark();}
function renderWaistSpark(){
const c=$(“waist-spark-container”);if(!c)return;
const entries=[];const d=new Date(currentDate);
// Walk back up to 16 weeks of Mondays
for(let i=0;i<16;i++){const mon=getMondayOf(d);const w=getWaist(mon);if(w&&(entries.length===0||entries[entries.length-1].date.getTime()!==mon.getTime())){entries.push({date:new Date(mon),w})}d.setDate(d.getDate()-7);}
entries.reverse();
if(entries.length<2){c.innerHTML=’<div style="font-size:11px;color:#A898B0;text-align:center;padding:6px 0">Log 2+ weeks to see your trend</div>’;return}
const vals=entries.map(e=>e.w);const min=Math.min(…vals),max=Math.max(…vals),range=max-min||1;
const latest=vals[vals.length-1],first=vals[0],diff=Math.round((latest-first)*10)/10;
const diffColor=diff<0?”#5B8A5E”:diff>0?”#C4607A”:”#6B5B8A”;
const W=300,H=50,padX=6,padY=8;
const pts=vals.map((v,i)=>{const x=padX+i*((W-padX*2)/(vals.length-1));const y=padY+(1-(v-min)/range)*(H-padY*2);return[Math.round(x*10)/10,Math.round(y*10)/10]});
const poly=pts.map(p=>p[0]+”,”+p[1]).join(” “);
const area=poly+” “+pts[pts.length-1][0]+”,”+(H+2)+” “+pts[0][0]+”,”+(H+2);
const lp=pts[pts.length-1];
// Date labels for first and last
const mns=[“Jan”,“Feb”,“Mar”,“Apr”,“May”,“Jun”,“Jul”,“Aug”,“Sep”,“Oct”,“Nov”,“Dec”];
const firstLabel=entries[0].date.getDate()+” “+mns[entries[0].date.getMonth()];
const lastLabel=entries[entries.length-1].date.getDate()+” “+mns[entries[entries.length-1].date.getMonth()];
const dotWst=pts.map(function(p,i){return i===pts.length-1?’<circle cx="'+p[0]+'" cy="'+p[1]+'" r="4" fill="#C4607A" stroke="white" stroke-width="2"/>’:’<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.5" fill="rgba(196,96,122,0.4)"/>’;}).join(’’);
const diffSign2=diff<0?’’:’+’;
c.innerHTML=’<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="margin-top:10px;overflow:visible" preserveAspectRatio="none"><defs><linearGradient id="wstg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C4607A" stop-opacity="0.15"/><stop offset="100%" stop-color="#C4607A" stop-opacity="0"/></linearGradient></defs><polygon points="'+area+'" fill="url(#wstg)"/><polyline points="'+poly+'" fill="none" stroke="#C4607A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>’+dotWst+’</svg><div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px"><span style="color:#A898B0">’+firstLabel+’ \u2014 ‘+lastLabel+’</span><span style="font-weight:700;color:'+diffColor+'">’+diffSign2+diff+’ cm</span></div>’;
}

// \u2500\u2500\u2500 CLEANUP & INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
try{if(!localStorage.getItem(“tp-move-cleanup-v3”)){for(let ci=localStorage.length-1;ci>=0;ci–){const ck=localStorage.key(ci);if(ck&&ck.startsWith(“tp-moved”))localStorage.removeItem(ck)}localStorage.setItem(“tp-move-cleanup-v3”,“done”)}}catch(e){}

window.addEventListener(‘error’, function(e){
var d = document.getElementById(‘dashboard’) || document.body;
if(d){ d.style.display = ‘block’;
d.innerHTML = ‘<div style="padding:20px;background:white;color:red;font-size:13px;font-family:monospace;word-break:break-all"><b>JS ERROR:</b><br>’ + (e.message||‘unknown’) + ‘<br>Line: ’ + e.lineno + ‘</div>’; }
});
if(document.readyState === ‘loading’){
document.addEventListener(‘DOMContentLoaded’, function(){
try{render();}catch(e){
var d=document.getElementById(‘dashboard’);
if(d){d.style.display=‘block’;d.innerHTML=’<div style="padding:20px;color:red;font-size:13px">RENDER ERROR: ‘+e.message+’</div>’;}
}
});
} else {
try{render();}catch(e){
var d=document.getElementById(‘dashboard’);
if(d){d.style.display=‘block’;d.innerHTML=’<div style="padding:20px;color:red;font-size:13px">RENDER ERROR: ‘+e.message+’</div>’;}
}
}
</script>
