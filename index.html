<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Daily Training Plan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#FDF2F5 0%,#F0ECF8 40%,#EBE8F5 100%);color:#3D2E4A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:520px;margin:0 auto;-webkit-tap-highlight-color:transparent;min-height:100vh}
.header{background:linear-gradient(135deg,#F8EEF2,#EDE6F2);padding:20px 16px 16px;border-bottom:1px solid rgba(180,160,190,0.2);position:sticky;top:0;z-index:10;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#B8A5C0;margin-bottom:4px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nav button{background:rgba(255,255,255,0.5);border:none;border-radius:8px;padding:8px 14px;color:#6B5B8A;cursor:pointer;font-size:16px;-webkit-appearance:none}
.nav button:active{background:rgba(255,255,255,0.7)}
.date-display{text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;color:#B8A5C0}
.quick-nav{display:flex;gap:6px}
.quick-nav button{flex:1;padding:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.45);border:1px solid rgba(180,160,190,0.2);border-radius:6px;color:#8A7A9E;cursor:pointer;-webkit-appearance:none;transition:all 0.15s}
.quick-nav button:active{background:rgba(255,255,255,0.65)}
.quick-nav button.active{background:rgba(107,91,138,0.2);border-color:rgba(107,91,138,0.4);color:#3D2E4A}
.quick-nav .race-btn{background:rgba(196,96,122,0.12);border-color:rgba(196,96,122,0.25);color:#C4607A}
.quick-nav .race-btn.active{background:rgba(196,96,122,0.3);border-color:rgba(196,96,122,0.5);color:#9E3050}
.block-info{margin-top:12px;padding:10px 12px;border-radius:8px}
.block-name{font-size:14px;font-weight:700}
.block-detail{font-size:12px;color:#A898B0;margin-top:2px}
.content{padding:16px;display:flex;flex-direction:column;gap:12px}
.race-banner{text-align:center;padding:16px;background:linear-gradient(135deg,#D4607A,#C4507A,#D4607A);border-radius:14px;border:2px solid #E8889E}
.race-banner .icon{font-size:28px;margin-bottom:4px}
.race-banner .title{font-size:18px;font-weight:800;color:#FFF0F3;letter-spacing:1px}
.race-banner .sub{font-size:13px;color:#FDDDE5;margin-top:4px}

/* ── RUN CARD ── */
.run-card{border-radius:16px;padding:16px;border:0.5px solid rgba(180,160,190,0.18)}
.run-card.normal{background:rgba(255,255,255,0.7);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.run-card.race{background:linear-gradient(135deg,rgba(196,96,122,0.12),rgba(196,80,122,0.07));border-color:rgba(196,96,122,0.25)}
.run-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.run-icon-chip{width:36px;height:36px;min-width:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.run-icon-chip.normal{background:rgba(91,138,94,0.12)}
.run-icon-chip.race{background:rgba(196,96,122,0.12)}
.run-title-wrap{flex:1}
.run-type{font-size:15px;font-weight:700;line-height:1.2}
.run-type.normal{color:#4A7A50}
.run-type.race{color:#C4607A}
.run-sub{font-size:11px;color:#A898B0;margin-top:1px}
.run-km{font-size:12px;font-weight:700;background:rgba(91,138,94,0.1);padding:4px 11px;border-radius:20px;color:#4A7A50;border:0.5px solid rgba(91,138,94,0.15)}
.run-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.run-stat{background:rgba(91,138,94,0.05);border-radius:10px;padding:10px 12px;border:0.5px solid rgba(91,138,94,0.1)}
.run-label{font-size:10px;color:#A898B0;text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:3px}
.run-value{font-size:14px;color:#3D2E4A;font-weight:700;line-height:1.2}
.run-note{margin-top:10px;font-size:12px;color:#7A6B8A;line-height:1.55;padding:10px 12px;background:rgba(184,136,62,0.07);border-radius:8px;border-left:3px solid rgba(184,136,62,0.35)}

/* ── STRENGTH CARD ── */
.strength-card{background:rgba(255,255,255,0.7);border-radius:16px;padding:16px;border:0.5px solid rgba(107,91,138,0.14);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.strength-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.str-icon-chip{width:36px;height:36px;min-width:36px;border-radius:10px;background:rgba(107,91,138,0.1);display:flex;align-items:center;justify-content:center;font-size:18px}
.str-title-wrap{flex:1}
.strength-name{font-size:15px;font-weight:700;color:#5B4A7A;line-height:1.2}
.strength-dur{font-size:11px;color:#A898B0;margin-top:1px}
.str-dur-pill{font-size:11px;color:#A898B0;background:rgba(107,91,138,0.07);padding:4px 10px;border-radius:20px;white-space:nowrap;border:0.5px solid rgba(107,91,138,0.12)}

/* ── EXERCISE ROWS ── */
.exercise{display:grid;grid-template-columns:22px 1fr auto;gap:3px 10px;padding:9px 12px;border-radius:8px;align-items:start}
.exercise:nth-child(odd){background:rgba(107,91,138,0.035)}
.ex-name{font-weight:600;color:#3D2E4A;font-size:13px;line-height:1.3}
.ex-sets{color:#6B5B8A;font-weight:700;font-size:13px;text-align:right;white-space:nowrap}
.ex-tags{grid-column:2/-1;display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.tag{font-size:11px;padding:2px 7px;border-radius:4px}
.tag-load{background:rgba(107,91,138,0.08);color:#6B5B8A}
.tag-tempo{background:rgba(200,160,80,0.1);color:#A87830}
.tag-note{font-size:11px;color:#A898B0;font-style:italic}
.ex-form{grid-column:2/-1;margin-top:5px;padding:8px 10px;background:rgba(74,122,78,0.07);border:0.5px solid rgba(74,122,78,0.14);border-radius:6px}
.ex-form-text{font-size:11px;color:#4A7A4E;line-height:1.5}
.ex-video-link{display:inline-block;margin-top:5px;font-size:11px;font-weight:600;color:#5B8A5E;text-decoration:none;padding:3px 9px;background:rgba(91,138,94,0.09);border-radius:4px;border:0.5px solid rgba(91,138,94,0.18)}
.ex-check{display:flex;align-items:center;justify-content:center;width:22px;height:22px;min-width:22px;border-radius:6px;border:1.5px solid rgba(180,160,190,0.3);cursor:pointer;transition:all 0.18s;grid-row:1}
.ex-check.done{background:#5B8A5E;border-color:#5B8A5E}
.ex-check.done::after{content:"✓";color:white;font-size:12px;font-weight:700}
.exercise.checked .ex-name,.exercise.checked .ex-sets{opacity:0.35;text-decoration:line-through}

/* ── CHECK ROW (shared) ── */
.run-check-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:10px;border-top:0.5px solid rgba(180,160,190,0.12);cursor:pointer}
.run-check-box{width:22px;height:22px;min-width:22px;border-radius:6px;border:1.5px solid rgba(180,160,190,0.3);display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.run-check-box.done{background:#5B8A5E;border-color:#5B8A5E}
.run-check-box.done::after{content:"✓";color:white;font-size:12px;font-weight:700}
.run-check-label{font-size:13px;color:#A898B0;font-weight:500}
.run-check-label.done{color:#5B8A5E;font-weight:600}

/* ── FUEL CARD ── */
.fuel-card{margin-top:10px;padding:10px 12px;background:rgba(200,160,80,0.06);border:0.5px solid rgba(200,160,80,0.14);border-radius:8px}
.fuel-title{font-size:12px;font-weight:700;color:#B8883E;margin-bottom:5px}
.fuel-row{font-size:12px;color:#7A6B8A;line-height:1.6;margin-bottom:3px}
.fuel-label{font-weight:600;color:#C49A4A}

/* ── TREADMILL ── */
.treadmill-card{background:rgba(200,160,80,0.06);border-radius:14px;padding:13px 16px;border:0.5px solid rgba(200,160,80,0.18);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.treadmill-left{flex:1;min-width:0}
.treadmill-header{font-size:14px;font-weight:700;color:#B8883E;display:flex;align-items:center;gap:6px;margin-bottom:3px}
.treadmill-spec{font-size:11px;font-weight:600;color:rgba(184,136,62,0.7);background:rgba(184,136,62,0.09);padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:4px}
.treadmill-note{font-size:11px;color:#9A8060;line-height:1.45}
.treadmill-detail{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}

/* ── PILATES / OTHER ── */
.other-card{background:rgba(255,255,255,0.5);border-radius:14px;padding:13px 16px;border:0.5px solid rgba(180,160,190,0.15)}
.other-card.pilates{background:rgba(220,140,170,0.08);border-color:rgba(220,140,170,0.22)}
.other-label{font-size:11px;color:#A898B0;text-transform:uppercase;letter-spacing:0.8px;font-weight:600}
.other-label.pilates{color:#C4607A}
.other-text{font-size:14px;color:#3D2E4A;font-weight:500;margin-top:3px}
.other-text.pilates{color:#9E4060}

/* ── SPIN ── */
.spin-card{background:rgba(139,92,246,0.06);border-radius:14px;padding:13px 16px;border:0.5px solid rgba(139,92,246,0.18);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.spin-left{flex:1}
.spin-header{font-size:14px;font-weight:700;color:#7C3AED;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.spin-detail{font-size:12px;color:#7A6B8A;line-height:1.5}

/* ── STEPS ── */
.steps-card{background:rgba(107,91,160,0.06);border-radius:14px;padding:13px 16px;border:0.5px solid rgba(107,91,160,0.14);display:flex;align-items:center;gap:12px}
.steps-left{flex:1}
.steps-header{font-size:14px;font-weight:700;color:#6B5B8A;margin-bottom:2px}
.steps-target{font-size:12px;color:#A898B0}

/* ── NOTES ── */
.notes-card{background:rgba(200,160,80,0.07);border-radius:14px;padding:12px 16px;border:0.5px solid rgba(200,160,80,0.18)}
.notes-title{font-size:11px;color:#B8883E;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.notes-text{font-size:13px;color:#7A6B8A;line-height:1.55}
.rest-card{text-align:center;padding:40px 20px;background:rgba(255,255,255,0.35);border-radius:14px}
.rest-icon{font-size:32px;margin-bottom:8px}
.rest-title{font-size:16px;font-weight:600;color:#8A7A9E}
.rest-sub{font-size:13px;color:#B8A5C0;margin-top:4px}

/* ── PROTEIN ── */
.protein-card{background:rgba(239,68,68,0.03);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(239,68,68,0.1)}
.protein-header{font-size:16px;font-weight:700;color:#DC2626;margin-bottom:10px}
.protein-ring-wrap{position:relative;width:100px;height:100px;margin:0 auto 8px}
.protein-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.protein-log-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(255,255,255,0.5);border-radius:8px;margin-bottom:3px;font-size:12px}
.protein-log-name{color:#3D2E4A;font-weight:500}
.protein-log-g{color:#6B5B8A;font-weight:600}
.protein-log-x{color:#C4607A;cursor:pointer;margin-left:8px;font-size:14px}
.protein-foods{display:flex;flex-wrap:wrap;gap:5px}
.protein-pill{padding:5px 10px;background:rgba(255,255,255,0.5);border-radius:16px;font-size:11px;color:#3D2E4A;border:0.5px solid rgba(180,160,190,0.2);cursor:pointer}
.protein-pill:active{background:rgba(107,91,138,0.1);transform:scale(0.96)}
.protein-pill .pg{color:#A898B0;margin-left:2px}
.water-card{background:rgba(59,130,246,0.06);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(59,130,246,0.15)}
.water-header{font-size:16px;font-weight:700;color:#3B82F6;margin-bottom:4px}
.water-target{font-size:13px;color:#7A6B8A;margin-bottom:4px}
.weight-card{background:rgba(168,85,247,0.06);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(168,85,247,0.15)}
.weight-header{font-size:16px;font-weight:700;color:#8B5CF6;margin-bottom:8px}
.weight-input-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.weight-input{width:80px;padding:6px 10px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);font-size:16px;font-weight:700;background:rgba(255,255,255,0.6);color:#3D2E4A;text-align:center;-webkit-appearance:none}
.weight-input:focus{outline:none;border-color:#8B5CF6}
.weight-unit{font-size:13px;color:#A898B0}
.weight-saved{font-size:12px;color:#5B8A5E;font-weight:600}
.sleep-card{background:rgba(99,102,241,0.06);border-radius:14px;padding:14px 16px;border:0.5px solid rgba(99,102,241,0.15)}
.sleep-header{font-size:16px;font-weight:700;color:#6366F1;margin-bottom:8px}
.sleep-input-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sleep-input{width:60px;padding:6px 10px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);font-size:16px;font-weight:700;background:rgba(255,255,255,0.6);color:#3D2E4A;text-align:center;-webkit-appearance:none}
.sleep-input:focus{outline:none;border-color:#6366F1}
.sleep-quality{display:flex;gap:6px;margin-bottom:6px}
.sleep-pill{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(180,160,190,0.2);background:rgba(255,255,255,0.4);color:#A898B0}
.sleep-pill.active{border-color:#6366F1;background:rgba(99,102,241,0.12);color:#6366F1}
.add-session-btn{background:none;border:1.5px dashed rgba(107,91,138,0.3);border-radius:12px;padding:12px;font-size:13px;color:#6B5B8A;cursor:pointer;width:100%;text-align:center;font-weight:600;-webkit-appearance:none}
.add-option{padding:12px 14px;background:rgba(255,255,255,0.55);border-radius:10px;margin-bottom:6px;cursor:pointer;border:0.5px solid rgba(180,160,190,0.2);font-size:13px;color:#3D2E4A;font-weight:500}
.add-option:active{background:rgba(107,91,138,0.1)}
.add-option-sub{font-size:11px;color:#A898B0;margin-top:2px;font-weight:400}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#3D2E4A;color:white;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all 0.3s ease;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.move-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.move-modal{background:linear-gradient(135deg,#FDF2F5,#EDE6F2);border-radius:16px;padding:20px;width:100%;max-width:320px}
.move-modal-title{font-size:14px;font-weight:700;color:#3D2E4A;margin-bottom:4px}
.move-modal-sub{font-size:12px;color:#A898B0;margin-bottom:14px}
.move-day-option{padding:10px 14px;background:rgba(255,255,255,0.55);border-radius:10px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:0.5px solid rgba(180,160,190,0.2)}
.move-day-name{font-size:13px;font-weight:600;color:#3D2E4A}
.move-day-date{font-size:11px;color:#A898B0}
.move-cancel{text-align:center;padding:10px;font-size:13px;color:#C4607A;font-weight:600;cursor:pointer;margin-top:4px}
.perfect-day{text-align:center;padding:14px;background:linear-gradient(135deg,rgba(91,138,94,0.12),rgba(16,185,129,0.08));border-radius:14px;border:1.5px solid rgba(91,138,94,0.3);margin-bottom:2px;animation:perfectPop 0.4s ease-out}
.perfect-day-icon{font-size:32px;margin-bottom:4px}
.perfect-day-title{font-size:16px;font-weight:800;color:#3D8A50;letter-spacing:0.5px}
.perfect-day-sub{font-size:12px;color:#5B8A5E;margin-top:2px}
@keyframes perfectPop{0%{transform:scale(0.9);opacity:0}100%{transform:scale(1);opacity:1}}
.dash{padding:16px;border-bottom:0.5px solid rgba(180,160,190,0.15)}
.dash-section{margin-bottom:14px}
.dash-section:last-child{margin-bottom:0}
.dash-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8A5C0;margin-bottom:8px}
.progress-wrap{background:rgba(107,91,138,0.08);border-radius:8px;height:8px;overflow:hidden;margin-top:6px}
.progress-bar{height:100%;border-radius:8px;transition:width 0.3s}
.progress-text{font-size:12px;color:#A898B0;margin-top:4px}
.week-strip{display:flex;gap:4px}
.week-day{flex:1;text-align:center;padding:8px 0 6px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.4);color:#A898B0;cursor:pointer;transition:all 0.2s;min-height:62px}
.week-day.today{border:2px solid #6B5B8A;color:#6B5B8A}
.week-day.perfect{background:rgba(61,138,80,0.2);color:#3D8A50}
.week-day.perfect.today{border-color:#3D8A50}
.week-day.partial{background:rgba(200,160,80,0.15);color:#B8883E}
.week-day.partial.today{border-color:#B8883E}
.week-day.concern{background:rgba(220,38,38,0.12);color:#DC2626}
.week-day.concern.today{border-color:#DC2626}
.week-day.missed{background:rgba(220,38,38,0.08);color:rgba(220,38,38,0.4)}
.race-countdown{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(196,96,122,0.08);border:0.5px solid rgba(196,96,122,0.2);border-radius:8px}
.race-countdown-days{font-size:24px;font-weight:800;color:#C4607A}
.race-countdown-label{font-size:13px;color:#C4607A}
.strava-run-item{padding:8px 0;border-bottom:0.5px solid rgba(180,160,190,0.1)}
.strava-run-item:last-child{border-bottom:none}
.strava-run-date{font-size:10px;color:#A898B0;text-transform:uppercase;letter-spacing:0.5px}
.strava-run-name{font-size:13px;font-weight:600;color:#3D2E4A;margin-top:1px}
.strava-run-stats{font-size:12px;color:#6B5B8A;margin-top:2px}
/* BRIDAL ARMS CARD */
.bridal-arms-card{background:linear-gradient(135deg,rgba(236,72,153,0.08),rgba(219,39,119,0.04));border-radius:14px;padding:16px;border:1px solid rgba(236,72,153,0.2)}
.bridal-arms-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bridal-arms-title{font-size:16px;font-weight:700;color:#DB2777}
.bridal-arms-badge{font-size:11px;font-weight:700;background:rgba(236,72,153,0.15);color:#BE185D;padding:3px 10px;border-radius:12px}
.bridal-arms-meta{font-size:12px;color:#9D4070;margin-bottom:10px}
.bridal-arms-focus{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.ba-focus-tag{font-size:11px;padding:3px 8px;border-radius:4px;background:rgba(236,72,153,0.08);color:#BE185D;font-weight:600}
.bridal-arms-exercise{display:grid;grid-template-columns:18px 1fr auto;gap:3px 10px;padding:9px 12px;border-radius:8px;align-items:start;border-left:3px solid rgba(236,72,153,0.2)}
.bridal-arms-exercise:nth-child(odd){background:rgba(236,72,153,0.04)}
.ba-num{font-size:11px;color:#EC4899;font-weight:700;padding-top:2px}
.ba-name{font-size:13px;font-weight:600;color:#3D2E4A}
.ba-detail{font-size:12px;font-weight:600;color:#DB2777;text-align:right;white-space:nowrap}
.ba-cue{grid-column:2/-1;font-size:11px;color:#9D4070;margin-top:2px;font-style:italic}

// Gabby George Arms starts Monday 11 May 2026
const GG_ARMS_START=new Date(2026,4,11,12,0,0);

function ggArmsActive(d){
  const day=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);
  return day>=GG_ARMS_START;
}

function getBridalArmsDay(){
  const today=new Date(currentDate.getFullYear(),currentDate.getMonth(),currentDate.getDate(),12,0,0);
  if(!ggArmsActive(today))return null;
  const diff=Math.floor((today-GG_ARMS_START)/864e5);
  return(diff%14)+1;
}

function renderBridalArms(){
  if(!ggArmsActive(currentDate))return"";
  const dayNum=getBridalArmsDay();
  const s=BRIDAL_ARMS[dayNum-1];
  const focusTags=s.focus.map(f=>`<span class="ba-focus-tag">${f}</span>`).join('');
  const exs=s.exercises.map((e,i)=>`<div class="bridal-arms-exercise"><div class="ba-num">${i+1}</div><div class="ba-name">${e.name}</div><div class="ba-detail">${e.detail}</div><div class="ba-cue">${e.cue}</div></div>`).join('');
  const spiceNum=parseFloat(s.spice)||9;const filledDots=Math.round(spiceNum);
  const dots=Array.from({length:10},(_,i)=>`<div style="width:7px;height:7px;border-radius:50%;background:${i<filledDots?"#DB2777":"rgba(219,39,119,0.15)"};flex-shrink:0"></div>`).join('');
  const spiceRow=`<div style="display:flex;align-items:center;gap:6px;margin-top:10px;padding:8px 10px;background:rgba(219,39,119,0.04);border-radius:8px;border:0.5px solid rgba(219,39,119,0.1)"><div style="display:flex;gap:3px">${dots}</div><div style="font-size:11px;font-weight:600;color:#BE185D;margin-left:2px">Spice ${s.spice} · ${s.duration} · ${s.weight}</div></div>`;
  return`<div class="bridal-arms-card"><div class="bridal-arms-header"><div class="bridal-arms-title">💪 Gabby George Arms — Day ${dayNum} of 14</div><div class="bridal-arms-badge">🌶 ${s.spice}/10</div></div><div class="bridal-arms-meta">${s.title}</div><div class="bridal-arms-focus">${focusTags}</div><div style="display:flex;flex-direction:column;gap:4px;margin-bottom:4px">${exs}</div>${spiceRow}<div style="font-size:11px;color:#9D4070;margin-top:8px">💡 1–3 lb weights or bodyweight. High rep, minimal rest = the formula. Cycles daily through all 14 days.</div><a href="https://www.tiktok.com/@gabbylgeorge" target="_blank" rel="noopener" class="ba-link">▶ Follow along on Gabby's TikTok</a><div class="run-check-row" onclick="toggleBridalArms()"><div class="run-check-box" id="ba-check"></div><div class="run-check-label" id="ba-label">Mark Gabby George Arms complete</div></div></div>`;
}

function parseLocal(s){const p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2],12,0,0)}
function getBlock(d){const c=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);for(const b of BLOCKS){if(c>=parseLocal(b.startDate)&&c<=parseLocal(b.endDate))return b}return null}
function getWeek(d,b){const c=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);return Math.floor((c-parseLocal(b.startDate))/(864e5*7))+1}
function phase(id){if(id==="block6")return"hypertrophy";if(id==="block5"||id==="block9")return"maintenance";return"base"}

function getPlan(date){
const b=getBlock(date);if(!b)return{block:null,message:"No training scheduled."};
const w=getWeek(date,b),d=date.getDay(),p=phase(b.id);

let tags="";
if(ex.load)tags+=`<span class="tag tag-load">⚖️ ${ex.load}</span>`;

let formHtml="";
if(f){formHtml=`<div class="ex-form"><div class="ex-form-text">📐 ${f.form}</div>${f.link?`<a href="${f.link}" target="_blank" rel="noopener" class="ex-video-link">▶ Watch form video</a>`:""}</div>`}
const isBodyweight=!ex.load||ex.load.toLowerCase().includes("bodyweight")||["plank","bird dog","dead bug","banded","frog","nordic"].some(k=>ex.name.toLowerCase().includes(k));
let trackerHtml="";
if(!isBodyweight){trackerHtml=`<div class="ex-tracker" style="grid-column:2/-1;margin-top:4px;display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:#A898B0">Log:</span><input type="number" placeholder="kg" id="exw-${i}" style="width:50px;padding:3px 6px;border-radius:4px;border:0.5px solid rgba(180,160,190,0.3);font-size:11px;background:rgba(255,255,255,0.5);color:#3D2E4A" onchange="saveExLog(${i})"><span style="font-size:10px;color:#A898B0">×</span><input type="number" placeholder="reps" id="exr-${i}" style="width:50px;padding:3px 6px;border-radius:4px;border:0.5px solid rgba(180,160,190,0.3);font-size:11px;background:rgba(255,255,255,0.5);color:#3D2E4A" onchange="saveExLog(${i})"></div>`}
return`<div class="exercise" id="ex-${i}"><div class="ex-check" onclick="toggleEx(${i})"></div><div class="ex-name">${ex.name}</div><div class="ex-sets">${ex.sets} × ${ex.reps}</div>${tags?`<div class="ex-tags">${tags}</div>`:""}${trackerHtml}${formHtml}</div>`;
}

function getFuel(r){
if(!r||r.type.includes("RACE"))return null;
const km=parseFloat(r.km)||0;
const isTempo=r.type.toLowerCase().includes("tempo")||r.type.toLowerCase().includes("interval")||r.type.toLowerCase().includes("hill")||r.type.toLowerCase().includes("speed");
const isLong=r.type.toLowerCase().includes("long");
let pre="",during="",after="";
if(km<=5&&!isTempo){pre="☕ Optional: coffee + small banana. Stay hydrated.";during="💧 No fuel needed.";after="🥛 Small snack if hungry."}
else if(km<=7&&!isTempo){pre="🍌 Small banana or toast with honey 30–60 min before.";during="💧 No fuel needed. Carry water if hot.";after="🥛 20–30g protein within 45 min."}
else if(isTempo){pre="🍞 Carb-rich snack 60–90 min before: toast + banana, oats, or rice cakes with honey.";during=km>8?"💧 Carry water. Consider a gel if session is 60+ min.":"💧 Carry water. No gel needed under 60 min.";after="🥛 Recovery meal within 30 min: 20–30g protein + carbs."}
else if(isLong&&km>=14){pre="🍚 Proper meal 2–3 hrs before: oats + banana + honey, toast with PB, or rice + eggs.";during=km>=16?"⚡ Gel at km 7 and km 14. Water every 3–4 km.":"💧 Water every 3–4 km. Optional: 1 gel at km 8–10.";after="🥛 Recovery meal within 30 min: protein + carbs + electrolytes."}
else{pre="🍌 Toast + banana 60–90 min before if needed.";during="💧 Carry water.";after="🥛 20–30g protein + carbs within 45 min."}
return{pre,during,after};
}

function renderRun(r){
if(!r)return"";
const isRace=r.type.includes("RACE");
let fuelHtml="";
const fuel=getFuel(r);
if(fuel){fuelHtml=`<div class="fuel-card"><div class="fuel-title">🍽️ Fuelling</div><div class="fuel-row"><span class="fuel-label">Before:</span> ${fuel.pre}</div><div class="fuel-row"><span class="fuel-label">During:</span> ${fuel.during}</div><div class="fuel-row"><span class="fuel-label">After:</span> ${fuel.after}</div></div>`}
const subLabel=isRace?"A-race · Give everything":r.int||"";

function renderDashboard(){
const today=new Date();const todayNorm=new Date(today.getFullYear(),today.getMonth(),today.getDate(),12,0,0);
const block=getBlock(todayNorm);let dhtml="";
if(block){const weekInBlock=getWeek(todayNorm,block);const pct=Math.min(Math.round((weekInBlock/block.weeks)*100),100);dhtml+=`<div class="dash-section"><div class="dash-title">Current Block</div><div class="block-name" style="color:${block.color};font-size:15px">${block.name}</div><div class="progress-text">Week ${weekInBlock} of ${block.weeks} • ${block.weeklyKm} km/week</div><div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${block.color}"></div></div></div>`}
const races=[{name:"Half Marathon",date:new Date(2026,4,3,12,0,0),goal:"~2:05",dist:"21.1 km"},{name:"City2Surf",date:new Date(2026,7,9,12,0,0),goal:"sub-75 min",dist:"14.4 km"},{name:"A-Race Half Marathon",date:new Date(2026,9,25,12,0,0),goal:"sub-2:00",dist:"21.1 km"},{name:"City2Surf 2027",date:new Date(2027,7,8,12,0,0),goal:"sub-70 min",dist:"14.4 km"}];
const nextRace=races.find(r=>r.date>todayNorm);
if(nextRace){const daysUntil=Math.ceil((nextRace.date-todayNorm)/(864e5));dhtml+=`<div class="dash-section"><div class="race-countdown"><div class="race-countdown-days">${daysUntil}</div><div class="race-countdown-label">days until<br><strong>${nextRace.name}</strong><br><span style="font-size:11px;font-weight:500;opacity:0.85">${nextRace.goal} · ${nextRace.dist}</span></div></div></div>`}
const monday=new Date(todayNorm);const dow=monday.getDay();const diff=dow===0?6:dow-1;monday.setDate(monday.getDate()-diff);
const dayLabels=["M","T","W","T","F","S","S"];let stripHtml="";
for(let i=0;i<7;i++){
const d=new Date(monday);d.setDate(d.getDate()+i);
const isToday=d.getDate()===todayNorm.getDate()&&d.getMonth()===todayNorm.getMonth();
const isPast=d<todayNorm;let status="";
try{const s=localStorage.getItem("tp-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate());if(s){const st=JSON.parse(s);const protKey="tp-prot-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();let proteinHit=false;try{const pl=localStorage.getItem(protKey);if(pl){proteinHit=JSON.parse(pl).reduce((s2,f)=>s2+f.g,0)>=110}}catch(e2){}const dp=getPlan(d);let needed=[];if(dp.run)needed.push(st.run);if(dp.str){needed.push(st.str);needed.push(st.tm)}if(dp.spin)needed.push(st.spin);if(dp.other&&dp.other.toLowerCase().includes("pilates"))needed.push(st.pil);if(ggArmsActive(d))needed.push(st.ba);needed.push(st.steps);needed.push(st.water);needed.push(proteinHit);const allDone=needed.every(v=>v===true);const doneCt=needed.filter(Boolean).length;const totalCt=needed.length;if(allDone&&totalCt>=3)status="perfect";else if(doneCt>=Math.floor(totalCt*0.6))status="partial";else if(isPast&&doneCt>=1)status="concern";else if(doneCt>=1)status="partial";}else if(isPast&&!isToday){status="missed"}}catch(e){}
// Build activity dots — up to 3 dots representing done/total ratio
let dotsHtml="";
try{
const s=localStorage.getItem("tp-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate());
if(s||(!isPast&&isToday)){
const st=s?JSON.parse(s):{};
const dp=getPlan(d);
// Key boxes: run, str (counts as 2 with tm), ba, steps+water+protein as 1 lifestyle dot
const hasTrain=!!(dp.run||dp.str||dp.spin);
const trainDone=(dp.run&&st.run)||(dp.str&&st.str&&st.tm)||(dp.spin&&st.spin);
const armsDone=!!st.ba&&ggArmsActive(d);
const lifeDone=!!(st.steps&&st.water);
const dotColor=status==="perfect"?"rgba(91,138,94,0.9)":status==="partial"?"rgba(184,136,62,0.7)":"rgba(180,160,190,0.3)";
const dotStyle=(filled,color)=>`width:5px;height:5px;border-radius:50%;background:${filled?color:"rgba(180,160,190,0.2)"}`;
if(hasTrain){dotsHtml+=`<div style="${dotStyle(!!trainDone,dotColor)}"></div>`;}
if(ggArmsActive(d)){dotsHtml+=`<div style="${dotStyle(armsDone,"rgba(219,39,119,0.7)")}"></div>`;}
dotsHtml+=`<div style="${dotStyle(lifeDone,dotColor)}"></div>`;
}
}catch(e){}
stripHtml+=`<div class="week-day ${isToday?"today":""} ${status}" onclick="navToDate(${d.getFullYear()},${d.getMonth()},${d.getDate()})" style="padding-bottom:6px">${dayLabels[i]}<br><span style="font-size:13px">${d.getDate()}</span>${dotsHtml?`<br><div style="display:flex;gap:3px;justify-content:center;margin-top:4px">${dotsHtml}</div>`:""}</div>`;
}
dhtml+=`<div class="dash-section"><div class="dash-title">This Week</div><div class="week-strip">${stripHtml}</div></div>`;
const weekPlanLabels=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];let planOverview="";
for(let i=0;i<7;i++){
const wd=new Date(monday);wd.setDate(wd.getDate()+i);const wp=getPlan(wd);let items=[];
if(wp.str)items.push("💪 "+wp.str.name);
if(wp.run)items.push("🏃‍♀️ "+wp.run.type+(wp.run.km?" · "+wp.run.km+" km":""));
if(wp.spin)items.push("🚴‍♀️ Spin Class");
if(wp.other&&wp.other.toLowerCase().includes("pilates"))items.push("🧘‍♀️ Pilates");
if(ggArmsActive(wd))items.push("💪 Gabby George Arms — every day");
if(!wp.str&&!wp.run&&!wp.spin&&(!wp.notes||!wp.notes.length))items=[ggArmsActive(wd)?"😴 Rest + 💪 Gabby George Arms":"😴 Rest"];
const isToday2=wd.getDate()===todayNorm.getDate()&&wd.getMonth()===todayNorm.getMonth();
planOverview+=`<div style="padding:8px 0;border-bottom:0.5px solid rgba(180,160,190,0.08);${isToday2?"background:rgba(107,91,138,0.06);border-radius:6px;padding:8px 10px;margin:0 -10px":""}"><div style="font-size:12px;font-weight:700;color:${isToday2?"#6B5B8A":"#3D2E4A"}">${weekPlanLabels[i]}${isToday2?" ← today":""}</div><div style="font-size:11px;color:#7A6B8A;margin-top:2px;line-height:1.6">${items.join("<br>")}</div></div>`;
}
dhtml+=`<div class="dash-section"><div class="dash-title">Week at a Glance</div>${planOverview}</div>`;
$("dashboard").innerHTML=dhtml;loadStrava();
}

let stravaData=null,stravaLoaded=false;
async function loadStrava(){if(stravaLoaded)return renderStravaWidgets();try{const res=await fetch("/.netlify/functions/strava");if(!res.ok)return;const ct=res.headers.get("content-type")||"";if(!ct.includes("application/json"))return;const data=await res.json();if(data.activities){stravaData=data.activities;stravaLoaded=true;renderStravaWidgets()}}catch(e){}}

const dailyEl=$("strava-daily");if(dailyEl)dailyEl.innerHTML="";

// ─── STATE ───────────────────────────────────────────────────────────
function dateKey(d){return"tp-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
function getState(){const k=dateKey(currentDate);try{const s=localStorage.getItem(k);if(s)return JSON.parse(s)}catch(e){}return{ex:{},run:false,str:false,pil:false,tm:false,steps:false,spin:false,protein:false,water:false,ba:false}}
function setState(s){const k=dateKey(currentDate);try{localStorage.setItem(k,JSON.stringify(s))}catch(e){}}
function saveRun(done){const s=getState();s.run=done;setState(s)}
function saveStr(done){const s=getState();s.str=done;setState(s)}
function savePil(done){const s=getState();s.pil=done;setState(s)}

function restoreChecks(){
const s=getState();
Object.keys(s.ex).forEach(i=>{const el=$("ex-"+i);if(el&&s.ex[i]){el.querySelector(".ex-check").classList.add("done");el.classList.add("checked")}});
const pairs=[["run-check","run-label","Run complete ✓"],["str-check","str-label","Session complete ✓"],["pil-check","pil-label","Pilates complete ✓"],["tm-check","tm-label","Treadmill complete ✓"],["steps-check","steps-label","14k steps complete ✓"],["spin-check","spin-label","Spin complete ✓"],["water-check","water-label","2L+ water hit ✓"],["ba-check","ba-label","Gabby George Arms complete ✓"]];
const stateKeys=["run","str","pil","tm","steps","spin","water","ba"];
pairs.forEach(([ck,cl,text],i)=>{const ch=$(ck),lb=$(cl);if(ch&&s[stateKeys[i]]){ch.classList.add("done");if(lb){lb.classList.add("done");lb.textContent=text}}});
checkPerfectDay();
}

function checkPerfectDay(){
const s=getState();const log=getProteinLog();const proteinHit=log.reduce((sum,f)=>sum+f.g,0)>=110;
let allDone=true;
[["run-check","run"],["str-check","str"],["pil-check","pil"],["tm-check","tm"],["spin-check","spin"]].forEach(([ck,sk])=>{if($(ck)&&!s[sk])allDone=false});
if(!s.steps||!s.water||!proteinHit||(ggArmsActive(currentDate)&&!s.ba))allDone=false;
const existing=$("perfect-day-banner");
if(allDone&&!existing){const banner=document.createElement("div");banner.id="perfect-day-banner";banner.className="perfect-day";banner.innerHTML=`<div class="perfect-day-icon">⭐</div><div class="perfect-day-title">PERFECT DAY</div><div class="perfect-day-sub">Every box ticked. That's how champions are built.</div>`;$("content").insertBefore(banner,$("content").firstChild)}
else if(!allDone&&existing){existing.remove()}
}

function toggleEx(i){const el=$("ex-"+i);const ch=el.querySelector(".ex-check");const done=ch.classList.toggle("done");el.classList.toggle("checked",done);const s=getState();s.ex[i]=done;setState(s);checkPerfectDay()}
function toggleRun(){const ch=$("run-check"),lb=$("run-label"),done=ch.classList.toggle("done");lb.classList.toggle("done",done);lb.textContent=done?"Run complete ✓":"Mark run complete";saveRun(done);checkPerfectDay()}
function toggleStrength(){const ch=$("str-check"),lb=$("str-label"),done=ch.classList.toggle("done");lb.classList.toggle("done",done);lb.textContent=done?"Session complete ✓":"Mark session complete";saveStr(done);checkPerfectDay()}
function togglePilates(){const ch=$("pil-check"),lb=$("pil-label");if(!ch)return;const done=ch.classList.toggle("done");lb.classList.toggle("done",done);lb.textContent=done?"Pilates complete ✓":"Mark Pilates complete";savePil(done);checkPerfectDay()}
function toggleTreadmill(){const ch=$("tm-check"),lb=$("tm-label");if(!ch)return;const done=ch.classList.toggle("done");lb.classList.toggle("done",done);lb.textContent=done?"Treadmill complete ✓":"Mark treadmill complete";const s=getState();s.tm=done;setState(s);checkPerfectDay()}
function toggleSteps(){const ch=$("steps-check"),lb=$("steps-label");if(!ch)return;const done=ch.classList.toggle("done");lb.classList.toggle("done",done);lb.textContent=done?"14k steps complete ✓":"Mark 14k steps complete";const s=getState();s.steps=done;setState(s);checkPerfectDay()}
function toggleSpin(){const ch=$("spin-check"),lb=$("spin-label");if(!ch)return;const done=ch.classList.toggle("done");lb.classList.toggle("done",done);lb.textContent=done?"Spin complete ✓":"Mark spin complete";const s=getState();s.spin=done;setState(s);checkPerfectDay()}
function toggleWater(){const ch=$("water-check"),lb=$("water-label");if(!ch)return;const done=ch.classList.toggle("done");lb.classList.toggle("done",done);lb.textContent=done?"2L+ water hit ✓":"Hit 2L+ water";const s=getState();s.water=done;setState(s);checkPerfectDay()}

// ─── PROTEIN ─────────────────────────────────────────────────────────
const PFOODS=[{emoji:"🥩",name:"200g lean mince beef",g:42},{emoji:"🥩",name:"Steak (150g)",g:42},{emoji:"🥤",name:"Cali Press Arnold",g:36},{emoji:"🍗",name:"200g minced chicken",g:34},{emoji:"🐟",name:"Salmon portion",g:34},{emoji:"🐟",name:"Can of tuna",g:25},{emoji:"🥄",name:"Chobani Fit passionfruit",g:15},{emoji:"🧀",name:"Cottage cheese (200g)",g:14},{emoji:"☕",name:"Oat flat white",g:2}];
function proteinKey(){return"tp-prot-"+currentDate.getFullYear()+"-"+(currentDate.getMonth()+1)+"-"+currentDate.getDate()}
function getProteinLog(){try{const s=localStorage.getItem(proteinKey());return s?JSON.parse(s):[]}catch(e){return[]}}
function saveProteinLog(log){try{localStorage.setItem(proteinKey(),JSON.stringify(log))}catch(e){}}
const CFK="tp-custom-foods";
function getCustomFoods(){try{return JSON.parse(localStorage.getItem(CFK)||"[]")}catch(e){return[]}}
function saveCustomFoods(f){try{localStorage.setItem(CFK,JSON.stringify(f))}catch(e){}}
function addProtein(i,isCustom){const log=getProteinLog();const food=isCustom?getCustomFoods()[i]:PFOODS[i];if(!food)return;log.push({emoji:food.emoji,name:food.name,g:food.g});saveProteinLog(log);renderProtein()}
function removeProtein(i){const log=getProteinLog();log.splice(i,1);saveProteinLog(log);renderProtein()}
function addCustomFood(){const emoji=$("cf-emoji")?$("cf-emoji").value.trim()||"🍽️":"🍽️";const name=$("cf-name")?$("cf-name").value.trim():"";const gEl=$("cf-grams");const g=gEl?parseInt(gEl.textContent)||0:0;if(!name||g<=0)return;const c=getCustomFoods();c.push({emoji,name,g});saveCustomFoods(c);if($("cf-name"))$("cf-name").value="";if(gEl)gEl.textContent="20";var f=$("custom-food-form");if(f)f.style.display="none";renderProtein()}
function deleteCustomFood(i){const c=getCustomFoods();c.splice(i,1);saveCustomFoods(c);renderProtein()}
function adjustGrams(delta){const el=$("cf-grams");if(!el)return;el.textContent=Math.max(1,Math.min(200,(parseInt(el.textContent)||20)+delta))}
function toggleCustomForm(){var f=$("custom-food-form");if(!f)return;f.style.display=f.style.display==="none"?"block":"none"}
function renderProtein(){
const fe=$("protein-foods"),le=$("protein-log"),te=$("protein-total"),re=$("protein-ring"),se=$("protein-status"),tip=$("protein-tip");if(!fe)return;
const log=getProteinLog();const total=log.reduce((s,f)=>s+f.g,0);const pct=Math.min(Math.round((total/110)*100),100);const rem=110-total;
fe.innerHTML=PFOODS.map((f,i)=>`<div class="protein-pill" onclick="addProtein(${i},false)">${f.emoji} ${f.name} <span class="pg">${f.g}g</span></div>`).join("")+getCustomFoods().map((f,i)=>`<div class="protein-pill" style="position:relative;padding-right:22px" onclick="addProtein(${i},true)">${f.emoji} ${f.name} <span class="pg">${f.g}g</span><span onclick="event.stopPropagation();deleteCustomFood(${i})" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);color:#C4607A;font-size:13px;cursor:pointer">×</span></div>`).join("")+`<div class="protein-pill" onclick="toggleCustomForm()" style="border-style:dashed;color:#6B5B8A">＋ Add food</div>`;
if(!$("custom-food-form")){const fd=document.createElement("div");fd.id="custom-food-form";fd.style.cssText="display:none;margin-top:10px;padding:12px;background:rgba(107,91,138,0.06);border-radius:10px;border:0.5px solid rgba(107,91,138,0.2)";fd.innerHTML=`<div style="font-size:12px;font-weight:700;color:#6B5B8A;margin-bottom:8px">Add Custom Food</div><div style="display:flex;gap:8px;margin-bottom:8px"><input id="cf-emoji" type="text" placeholder="🍽️" maxlength="2" style="width:48px;text-align:center;font-size:18px;border:1px solid rgba(180,160,190,0.3);border-radius:8px;padding:6px;background:rgba(255,255,255,0.6);outline:none"><input id="cf-name" type="text" placeholder="Food name" style="flex:1;border:1px solid rgba(180,160,190,0.3);border-radius:8px;padding:6px 10px;font-size:13px;background:rgba(255,255,255,0.6);outline:none;color:#3D2E4A"></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:12px;color:#A898B0">Protein (g)</div><div style="display:flex;align-items:center;gap:10px"><button onclick="adjustGrams(-5)" style="width:32px;height:32px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:18px;color:#6B5B8A;cursor:pointer">−</button><span id="cf-grams" style="font-size:18px;font-weight:700;color:#3D2E4A;min-width:32px;text-align:center">20</span><button onclick="adjustGrams(5)" style="width:32px;height:32px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);background:rgba(255,255,255,0.6);font-size:18px;color:#6B5B8A;cursor:pointer">＋</button></div></div><div style="display:flex;gap:8px"><button onclick="toggleCustomForm()" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(180,160,190,0.3);background:none;font-size:13px;color:#A898B0;cursor:pointer">Cancel</button><button onclick="addCustomFood()" style="flex:2;padding:8px;border-radius:8px;border:none;background:#6B5B8A;font-size:13px;color:white;font-weight:600;cursor:pointer">Save Food</button></div>`;fe.parentNode.insertBefore(fd,fe.nextSibling)}
le.innerHTML=log.length===0?`<div style="text-align:center;padding:8px;color:#B8A5C0;font-size:11px">Nothing logged yet</div>`:log.map((f,i)=>`<div class="protein-log-item"><span class="protein-log-name">${f.emoji} ${f.name}</span><span><span class="protein-log-g">${f.g}g</span><span class="protein-log-x" onclick="removeProtein(${i})"> ×</span></span></div>`).join("");
te.textContent=total+"g";const circ=263.9;re.style.strokeDashoffset=circ-(pct/100)*circ;re.style.stroke=total>=110?"#5B8A5E":"#6B5B8A";
se.textContent=total>=110?"✅ Target hit! "+total+"g":total>0?rem+"g to go":"Tap foods below to log";se.style.color=total>=110?"#5B8A5E":total>0?"#6B5B8A":"#A898B0";
tip.innerHTML=total>=110?"✅ Protein target hit. Recovery locked in.":rem<=25?"💡 Almost there! Chobani Fit (15g) or can of tuna (25g) closes the gap.":total>0?"💡 "+rem+"g remaining. 2–3 more protein-rich meals today.":"💡 Target: 100–126g daily (1.6–2.0g/kg). Tap meals above.";
}

// ─── SLEEP ───────────────────────────────────────────────────────────
function sleepKey(d){return"tp-sleep-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
function getSleep(d){try{const v=localStorage.getItem(sleepKey(d));return v?JSON.parse(v):null}catch(e){return null}}
function saveSleep(){const sc=$("sleep-score"),ho=$("sleep-hours");if(!sc)return;const score=parseInt(sc.value)||0,hours=parseFloat(ho.value)||0,q=document.querySelector(".sleep-pill.active"),qv=q?q.dataset.val:"";try{localStorage.setItem(sleepKey(currentDate),JSON.stringify({score,hours,quality:qv}))}catch(e){}const sv=$("sleep-saved");if(sv)sv.textContent="✓";renderSleepSpark()}
function setSleepQuality(val){document.querySelectorAll(".sleep-pill").forEach(p=>p.classList.remove("active"));const el=document.querySelector('.sleep-pill[data-val="'+val+'"]');if(el)el.classList.add("active");saveSleep()}
function restoreSleep(){const sc=$("sleep-score"),ho=$("sleep-hours"),qd=$("sleep-quality");if(!sc)return;qd.innerHTML=['😴 Poor','😐 OK','😊 Good','🌟 Great'].map((l,i)=>{const v=["poor","ok","good","great"][i];return`<div class="sleep-pill" data-val="${v}" onclick="setSleepQuality('${v}')">${l}</div>`}).join("");const data=getSleep(currentDate);if(data){if(data.score)sc.value=data.score;if(data.hours)ho.value=data.hours;if(data.quality){const el=document.querySelector('.sleep-pill[data-val="'+data.quality+'"]');if(el)el.classList.add("active")}$("sleep-saved").textContent="✓"}renderSleepSpark()}
function renderSleepSpark(){const c=$("sleep-spark-container");if(!c)return;const h=[];const d=new Date(currentDate);for(let i=0;i<14;i++){const s=getSleep(d);if(s&&s.score>0)h.push(s.score);d.setDate(d.getDate()-1)}h.reverse();if(h.length<2){c.innerHTML='<div style="font-size:11px;color:#A898B0;text-align:center;padding:4px 0">Log sleep to start tracking</div>';return}const avg=Math.round(h.reduce((s,v)=>s+v,0)/h.length);const latest=h[h.length-1];c.innerHTML=`<div style="display:flex;align-items:flex-end;gap:2px;height:30px;margin-top:6px">${h.map((v,i)=>`<div style="flex:1;height:${Math.max(Math.round(v/100*100),15)}%;background:${i===h.length-1?"#6366F1":"rgba(99,102,241,0.3)"};border-radius:2px 2px 0 0"></div>`).join("")}</div><div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px"><span style="color:#A898B0">Avg: ${avg}/100</span><span style="font-weight:700;color:${latest>=80?"#5B8A5E":latest>=60?"#B8883E":"#DC2626"}">${latest}/100</span></div>`}

// ─── WEIGHT ──────────────────────────────────────────────────────────
function weightKey(d){return"tp-weight-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
function getWeight(d){try{const v=localStorage.getItem(weightKey(d));return v?JSON.parse(v):null}catch(e){return null}}
function saveWeight(){const input=$("weight-input");if(!input||!input.value)return;const w=parseFloat(input.value);if(isNaN(w)||w<30||w>200)return;try{localStorage.setItem(weightKey(currentDate),JSON.stringify(w))}catch(e){}const sv=$("weight-saved");if(sv)sv.textContent="✓ Saved";renderWeightSpark()}
function restoreWeight(){const input=$("weight-input");if(!input)return;const w=getWeight(currentDate);if(w){input.value=w;const sv=$("weight-saved");if(sv)sv.textContent="✓ Saved"}renderWeightSpark()}
function renderWeightSpark(){const c=$("weight-spark-container");if(!c)return;const e=[];const d=new Date(currentDate);for(let i=0;i<14;i++){const w=getWeight(d);if(w)e.push(w);d.setDate(d.getDate()-1)}e.reverse();if(e.length<2){c.innerHTML=`<div style="font-size:11px;color:#A898B0;text-align:center;padding:4px 0">Log weight to start tracking</div>`;return}const min=Math.min(...e),max=Math.max(...e),range=max-min||0.5,latest=e[e.length-1],diff=Math.round((latest-e[0])*10)/10;c.innerHTML=`<div style="display:flex;align-items:flex-end;gap:2px;height:30px;margin-top:6px">${e.map((v,i)=>`<div style="flex:1;height:${Math.max(Math.round(((v-min)/range)*100),15)}%;background:${i===e.length-1?"#8B5CF6":"rgba(139,92,246,0.3)"};border-radius:2px 2px 0 0"></div>`).join("")}</div><div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px"><span style="color:#A898B0">${latest} kg</span><span style="font-weight:700;color:${diff<0?"#5B8A5E":diff>0?"#C4607A":"#6B5B8A"}">${diff>0?"+":""}${diff} kg</span></div>`}

function exLogKey(date){return"tp-exlog-"+date.getFullYear()+"-"+(date.getMonth()+1)+"-"+date.getDate()}
function getExLog(){try{const s=localStorage.getItem(exLogKey(currentDate));return s?JSON.parse(s):{}}catch(e){return{}}}
function saveExLog(i){const w=$("exw-"+i),r=$("exr-"+i);if(!w||!r)return;const log=getExLog();log[i]={w:w.value,r:r.value};try{localStorage.setItem(exLogKey(currentDate),JSON.stringify(log))}catch(e){}}

// ─── MOVE MODAL ───────────────────────────────────────────────────────
let moveTarget=null,moveSourceDate=null;
function showToast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.classList.add("show"),10);setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300)},2000)}
function moveBtn(type,label){return`<div style="margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(180,160,190,0.12)"><button onclick="event.stopPropagation();showMoveModal('${type}','${label.replace(/'/g,"\\'")}')" style="background:none;border:1px dashed rgba(180,160,190,0.35);border-radius:8px;padding:6px 12px;font-size:11px;color:#A898B0;cursor:pointer;width:100%;-webkit-appearance:none">📅 Move to another day</button></div>`}
function showMoveModal(type,label){moveTarget={type,label};moveSourceDate=new Date(currentDate.getFullYear(),currentDate.getMonth(),currentDate.getDate(),12,0,0);const DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];let prevHtml="",nextHtml="";for(let i=-6;i<=6;i++){if(i===0)continue;const d=new Date(moveSourceDate);d.setDate(d.getDate()+i);const opt=`<div class="move-day-option" onclick="moveSession(${d.getFullYear()},${d.getMonth()},${d.getDate()})"><div class="move-day-name">${DN[d.getDay()]} ${d.getDate()} ${MN[d.getMonth()]}</div><div class="move-day-date">${i<0?Math.abs(i)+" days ago":"in "+i+" day"+(i>1?"s":"")}</div></div>`;if(i<0)prevHtml+=opt;else nextHtml+=opt}const ov=document.createElement("div");ov.className="move-overlay";ov.id="moveOverlay";ov.innerHTML=`<div class="move-modal" style="max-height:85vh;overflow-y:auto"><div class="move-modal-title">Move: ${label}</div><div class="move-modal-sub">Pick a day</div>${prevHtml}${nextHtml}<div class="move-cancel" onclick="closeMoveModal()">Cancel</div></div>`;document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)closeMoveModal()}}
function closeMoveModal(){const o=$("moveOverlay");if(o)o.remove();moveTarget=null}
function movedKeyFor(d){return"tp-moved-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
function getMovedOut(d){try{return JSON.parse(localStorage.getItem(movedKeyFor(d))||"[]").filter(x=>x.action==="removed").map(x=>x.type)}catch(e){return[]}}
function getMovedIn(d){try{return JSON.parse(localStorage.getItem(movedKeyFor(d))||"[]").filter(x=>x.action==="added")}catch(e){return[]}}
function moveSession(y,m,d){if(!moveTarget||!moveSourceDate)return;const src=moveSourceDate;try{const fk=movedKeyFor(src);let fm=JSON.parse(localStorage.getItem(fk)||"[]");const ea=fm.find(x=>x.type===moveTarget.type&&x.action==="added");let ty,tm2,td;if(ea&&ea.originY!==undefined){ty=ea.originY;tm2=ea.originM;td=ea.originD;fm=fm.filter(x=>!(x.type===moveTarget.type&&x.action==="added"))}else{ty=src.getFullYear();tm2=src.getMonth();td=src.getDate();fm=fm.filter(x=>!(x.type===moveTarget.type&&x.action==="removed"));fm.push({type:moveTarget.type,label:moveTarget.label,action:"removed"})}localStorage.setItem(fk,JSON.stringify(fm));const toDate=new Date(y,m,d,12,0,0),tk=movedKeyFor(toDate);let tms=JSON.parse(localStorage.getItem(tk)||"[]");tms=tms.filter(x=>!(x.type===moveTarget.type&&x.action==="added"));tms.push({type:moveTarget.type,label:moveTarget.label,action:"added",originY:ty,originM:tm2,originD:td});localStorage.setItem(tk,JSON.stringify(tms))}catch(e){}closeMoveModal();render()}

// ─── ADD SESSION ──────────────────────────────────────────────────────
function addedSessionsKey(d){return"tp-added-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
function getAddedSessions(d){try{return JSON.parse(localStorage.getItem(addedSessionsKey(d))||"[]")}catch(e){return[]}}
function saveAddedSession(type){try{const added=getAddedSessions(currentDate);added.push({type});localStorage.setItem(addedSessionsKey(currentDate),JSON.stringify(added))}catch(e){}closeMoveModal();showToast("✅ Session added");render()}
function removeAddedSession(i){try{const added=getAddedSessions(currentDate);added.splice(i,1);localStorage.setItem(addedSessionsKey(currentDate),JSON.stringify(added))}catch(e){}render()}
function showAddSessionModal(){const ov=document.createElement("div");ov.className="move-overlay";ov.id="moveOverlay";const p=phase(getBlock(currentDate)?getBlock(currentDate).id:"block1");ov.innerHTML=`<div class="move-modal" style="max-height:85vh;overflow-y:auto"><div class="move-modal-title">Add a Session</div><div class="move-modal-sub">Pick what to add to today</div><div class="add-option" onclick="saveAddedSession('strA')">💪 Strength A — Glute + Push<div class="add-option-sub">Hip thrust, glute bridge, bench, shoulder press</div></div><div class="add-option" onclick="saveAddedSession('strB')">💪 Strength B — Posterior + Pull<div class="add-option-sub">RDL, kickback, lat pulldown, seated row</div></div><div class="add-option" onclick="saveAddedSession('strC')">💪 Strength C — Glute Activation + Core<div class="add-option-sub">Hip thrust, step-ups, frog pumps, core</div></div><div class="add-option" onclick="saveAddedSession('easyRun')">🏃‍♀️ Easy Run<div class="add-option-sub">5–6 km @ 5:50–6:10/km, Zone 2</div></div><div class="add-option" onclick="saveAddedSession('longRun')">🏃‍♀️ Long Run<div class="add-option-sub">14+ km @ 5:50–6:15/km, Zone 2</div></div><div class="add-option" onclick="saveAddedSession('spin')">🚴‍♀️ Spin Class<div class="add-option-sub">45 min, Zone 2 cardio</div></div><div class="add-option" onclick="saveAddedSession('pilates')">🧘‍♀️ Pilates<div class="add-option-sub">Flexibility + core session</div></div><div class="add-option" onclick="saveAddedSession('treadmill')">🚶‍♀️ Incline Treadmill<div class="add-option-sub">30 min, 10–12% incline</div></div><div class="move-cancel" onclick="closeMoveModal()">Cancel</div></div>`;document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)closeMoveModal()}}
function renderAddedSessions(){const added=getAddedSessions(currentDate);const p=phase(getBlock(currentDate)?getBlock(currentDate).id:"block1");let html="";added.forEach((item,i)=>{const badge=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div style="font-size:10px;color:#6B5B8A;font-weight:600;padding:3px 8px;background:rgba(107,91,138,0.1);border-radius:4px;display:inline-block">＋ Added</div><button onclick="removeAddedSession(${i})" style="background:none;border:none;font-size:11px;color:#C4607A;cursor:pointer;padding:4px 8px">Remove</button></div>`;if(item.type==="strA")html+=badge+renderStrength(SA(p));else if(item.type==="strB")html+=badge+renderStrength(SB(p));else if(item.type==="strC")html+=badge+renderStrength(SC(p));else if(item.type==="easyRun")html+=badge+renderRun({type:"Easy run (added)",km:"5–6",pace:"5:50–6:10/km",int:"Zone 2",note:""});else if(item.type==="longRun")html+=badge+renderRun({type:"Long run (added)",km:"14",pace:"5:50–6:15/km",int:"Zone 2",note:""});else if(item.type==="spin")html+=badge+`<div class="spin-card"><div class="spin-left"><div class="spin-header">🚴‍♀️ Spin Class</div><div class="spin-detail">45 min · Zone 2.</div></div></div>`;else if(item.type==="pilates")html+=badge+`<div class="other-card pilates"><div class="other-label pilates">🧘‍♀️ Pilates</div><div class="other-text pilates">Added session</div></div>`;else if(item.type==="treadmill")html+=badge+renderTreadmill();});return html}

// ─── CLEANUP & INIT ───────────────────────────────────────────────────
try{if(!localStorage.getItem("tp-move-cleanup-v3")){for(let ci=localStorage.length-1;ci>=0;ci--){const ck=localStorage.key(ci);if(ck&&ck.startsWith("tp-moved"))localStorage.removeItem(ck)}localStorage.setItem("tp-move-cleanup-v3","done")}}catch(e){}

render();
</script>
</body>
